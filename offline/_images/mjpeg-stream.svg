<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>MJPEG over HTTP: a multipart/x-mixed-replace stream from the camera to the browser</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Party boxes -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="60" y="30" width="120" height="40" rx="4"/>
    <rect x="580" y="30" width="120" height="40" rx="4"/>
  </g>
  <g fill="currentColor" font-size="14" text-anchor="middle">
    <text x="120" y="56">browser</text>
    <text x="640" y="56">camera</text>
  </g>

  <!-- Lifelines -->
  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
    <line x1="120" y1="70" x2="120" y2="460"/>
    <line x1="640" y1="70" x2="640" y2="460"/>
  </g>

  <!-- Request -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="380" y="100">GET /stream.jpg HTTP/1.0</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="120" y1="112" x2="640" y2="112"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="632,108 632,116 640,112"/>
  </g>

  <!-- Response headers -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="380" y="142">HTTP/1.0 200 OK</text>
    <text x="380" y="158">Content-Type: multipart/x-mixed-replace; boundary=frame</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="640" y1="172" x2="120" y2="172"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="128,168 128,176 120,172"/>
  </g>

  <!-- Frames separator -->
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="4,4" opacity="0.5">
    <line x1="120" y1="205" x2="640" y2="205"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="380" y="196">repeating frames (until the browser disconnects)</text>
  </g>

  <!-- Frame 1 -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="380" y="226">--frame</text>
    <text x="380" y="242">Content-Type: image/jpeg</text>
    <text x="380" y="258">&lt;jpeg bytes&gt;</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="640" y1="272" x2="120" y2="272"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="128,268 128,276 120,272"/>
  </g>

  <!-- Frame 2 -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="380" y="298">--frame</text>
    <text x="380" y="314">Content-Type: image/jpeg</text>
    <text x="380" y="330">&lt;jpeg bytes&gt;</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="640" y1="344" x2="120" y2="344"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="128,340 128,348 120,344"/>
  </g>

  <!-- ... -->
  <g fill="currentColor" font-size="14" text-anchor="middle" opacity="0.7">
    <text x="380" y="378">. . .</text>
  </g>

  <!-- Close -->
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="4,4" opacity="0.5">
    <line x1="120" y1="413" x2="640" y2="413"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="380" y="404">browser closes the connection -- generator stops</text>
  </g>
</svg>

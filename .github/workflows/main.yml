name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"

# The docs build only ever runs for the rolling "dev" channel, on master. The
# version a build documents is conf.py's `openmv_version` -- the git tag does NOT
# drive the build. A "vX.Y.Z" tag instead triggers the *release* job, which is a
# fast COPY of the already-built, already-committed docs/dev -> docs/vX.Y.Z (with
# the channel string rechanneled), then moves the tag onto that commit so it sits
# on the committed docs (like the historical v4.x tags) and OpenMV Studio, cloning
# the tag, gets the real snapshot. No rebuild on release.
jobs:
  gate:
    runs-on: ubuntu-22.04
    outputs:
      mode: ${{ steps.g.outputs.mode }}        # dev | release | "" (skip)
      channel: ${{ steps.g.outputs.channel }}  # dev | vX.Y.Z
    steps:
    - name: Decide mode
      id: g
      run: |
        ref="${GITHUB_REF}"; mode=""; channel=""
        if [[ "$ref" == refs/heads/master ]]; then
          mode=dev; channel=dev
        elif [[ "$ref" == refs/tags/v* ]]; then
          # Legacy v4.x and earlier tags are frozen history -- never release them.
          tag="${ref#refs/tags/}"; major="${tag#v}"; major="${major%%.*}"
          if [[ "$major" =~ ^[0-9]+$ ]] && [ "$major" -ge 5 ]; then
            mode=release; channel="$tag"
          fi
        fi
        echo "ref=$ref mode=$mode channel=$channel"
        { echo "mode=$mode"; echo "channel=$channel"; } >> "$GITHUB_OUTPUT"
        # NB: the release job moves the tag using GITHUB_TOKEN, and pushes made
        # with GITHUB_TOKEN do not trigger another workflow run -- so there is no
        # re-trigger loop and no guard is needed here.

  # =========================================================================
  # DEV BUILD (master) -- the single heavy Sphinx build. Produces docs/dev/,
  # the offline/ bundle, the rolling "development" html.zip release, and pings
  # Studio. Releases are copies of this, so this is the only place docs are built.
  # =========================================================================
  dev-build:
    needs: gate
    if: needs.gate.outputs.mode == 'dev'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'
        fetch-depth: 1

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      # Pillow + minify-html drive the post-build size-optimization steps.
      run: pip install -U -r micropython/docs/requirements.txt Pillow minify-html

    - name: Generate CPython differences (genrst)
      working-directory: micropython
      run: |
        make -C mpy-cross -j"$(nproc)"
        make -C ports/unix submodules
        make -C ports/unix -j"$(nproc)"
        (cd tools && python gen-cpydiff.py)

    - name: Build docs
      working-directory: micropython/docs
      env:
        OPENMV_DOCS_CHANNEL: dev
        # Channel-root build: conf.py emits llms.txt/llms-full.txt here only (the
        # per-language builds below leave it unset and skip the ~5 MB x26 dump).
        OPENMV_DOCS_ROOT_BUILD: '1'
      run: python -m sphinx -b html -d build/doctrees . build/html

    - name: Build translations
      working-directory: micropython/docs
      # One Sphinx build per locale/<lang>/ into build/html/<lang>/, in parallel.
      env:
        OPENMV_DOCS_CHANNEL: dev
      run: |
        ls -d locale/*/ | xargs -n1 basename | xargs -P "$(nproc)" -I {} \
          python -m sphinx -q -b html -D language={} -d "build/doctrees-{}" . "build/html/{}"

    - name: Deduplicate per-language assets
      working-directory: micropython/docs
      # Drop the byte-identical _images/_downloads/_sources copies in each locale
      # and repoint its HTML at the channel-root copy (one extra "../").
      run: python ../../.ci/dedup_assets.py build/html --locales-dir locale

    - name: Optimize images
      working-directory: micropython/docs
      run: python ../../.ci/optimize_images.py build/html

    - name: Minify HTML
      working-directory: micropython/docs
      run: python ../../.ci/minify_docs.py build/html

    - name: Generate Python stubs
      run: |
        python genpyi.py \
          --docs-dir micropython/docs/build/html/_sources/library/ \
          --pyi-dir micropython/docs/build/stubs

    - name: Verify stubs match the documented API
      run: |
        python verify_stubs.py \
          --docs-dir micropython/docs/build/html/_sources/library/ \
          --pyi-dir micropython/docs/build/stubs

    - uses: actions/upload-artifact@v4
      with:
        name: html
        path: micropython/docs/build/html/

    - uses: actions/upload-artifact@v4
      with:
        name: stubs
        path: micropython/docs/build/stubs/

    - name: Sync dev docs into repository
      run: |
        set -euo pipefail
        # Replace only docs/dev. Every frozen release snapshot, the CNAME, and the
        # root files are preserved.
        rm -rf docs/dev && mkdir -p docs/dev
        cp -r micropython/docs/build/html/* docs/dev/
        # Prebuilt stubs ship only in the offline/ bundle, not the online docs.
        touch docs/.nojekyll
        cp .ci/404.html docs/404.html
        python .ci/gen_versions.py docs
        # Keep dev + the current latest release fully translated; reduce other
        # v5.0.0+ snapshots to English-only. Idempotent; legacy v4.x untouched.
        python .ci/snapshot_english.py reconcile docs --locales-dir micropython/docs/locale
        # Rebuild the committed offline/ bundle (English-only, switchers hidden,
        # with _sources/ + stubs) for the desktop apps from this dev build.
        python .ci/snapshot_english.py offline micropython/docs/build/html offline \
          --locales-dir micropython/docs/locale --stubs micropython/docs/build/stubs
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs offline
        git commit -m "Update documentation (dev)" -a || true

    - name: Push documentation changes
      uses: ad-m/github-push-action@master
      with:
        branch: master
        github_token: ${{ secrets.GITHUB_TOKEN }}

    # Tell OpenMV Studio to re-pull the docs (it reads docs/dev/_sources for dev).
    # continue-on-error so a missing app-token secret never fails the deploy.
    - name: Generate app token for OpenMV Studio
      id: studio-token
      continue-on-error: true
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}
        repositories: openmv-studio
    - name: Trigger OpenMV Studio resources update
      if: steps.studio-token.outputs.token != ''
      continue-on-error: true
      env:
        GH_TOKEN: ${{ steps.studio-token.outputs.token }}
      run: gh workflow run resources.yml --repo ${{ github.repository_owner }}/openmv-studio

    # Rolling "development" html.zip release (offline bundle under html/, so it
    # unzips into the OpenMV IDE's share/qtcreator/ layout).
    - name: Package offline bundle as html.zip
      run: |
        rm -rf _pkg && mkdir -p _pkg/html
        cp -a offline/. _pkg/html/
        (cd _pkg && zip -rqX ../openmv-doc-html.zip html)
        du -h openmv-doc-html.zip
    - name: Publish development html release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete development --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
        gh release create development openmv-doc-html.zip \
          --repo "$GITHUB_REPOSITORY" \
          --prerelease \
          --title "Development Build" \
          --notes "Rolling development build of the offline OpenMV documentation (English). Unzips to html/ for the OpenMV IDE. Changelog: https://docs.openmv.io/dev/changelog/"

  # =========================================================================
  # RELEASE (vX.Y.Z tag) -- NO rebuild. Copy the committed docs/dev -> docs/<tag>,
  # rechannel the baked /dev/ URLs to /<tag>/, regenerate versions.json, then
  # commit + move the tag onto that commit (so it's on the committed docs), and
  # publish the html.zip release + push to the IDE.
  # =========================================================================
  release:
    needs: gate
    if: needs.gate.outputs.mode == 'release'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      TAG: ${{ needs.gate.outputs.channel }}
    steps:
    - name: Checkout master (carries the committed dev build)
      uses: actions/checkout@v4
      with:
        ref: master
        submodules: 'true'
        fetch-depth: 1

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Snapshot dev -> ${{ env.TAG }} (copy + rechannel, no rebuild)
      run: |
        set -euo pipefail
        rm -rf "docs/$TAG"
        cp -r docs/dev "docs/$TAG"
        # Rewrite the baked /dev/ channel in canonical/og/hreflang/lang-switcher.
        python .ci/rechannel.py "docs/$TAG" dev "$TAG"
        # The offline bundle is the same content for this release; rechannel it too.
        python .ci/rechannel.py offline dev "$TAG"
        cp .ci/404.html docs/404.html
        # latest -> <tag>; "/" and "/latest/" now resolve to it.
        python .ci/gen_versions.py docs
        # New release is the latest (stays full); demote the previous latest to
        # English-only. No-op for the first release.
        python .ci/snapshot_english.py reconcile docs --locales-dir micropython/docs/locale

    - name: Commit, push, and move the tag onto the committed docs
      run: |
        set -euo pipefail
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs offline
        git commit -m "Release documentation ($TAG)" -a
        git push origin HEAD:master
        # Re-point the tag at the commit that actually contains docs/<tag>/.
        # Pushed with GITHUB_TOKEN, so this does NOT re-trigger the workflow.
        git tag -f "$TAG"
        git push -f origin "refs/tags/$TAG"

    - name: Package offline bundle as html.zip
      run: |
        rm -rf _pkg && mkdir -p _pkg/html
        cp -a offline/. _pkg/html/
        (cd _pkg && zip -rqX ../openmv-doc-html.zip html)
        du -h openmv-doc-html.zip

    - name: Publish tagged html release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Auto-published (not a draft). Add --draft to require manual review.
        gh release create "$TAG" openmv-doc-html.zip \
          --repo "$GITHUB_REPOSITORY" \
          --title "$TAG" \
          --notes "Offline OpenMV documentation (English) for $TAG. Unzips to html/ for the OpenMV IDE. Changelog: https://docs.openmv.io/$TAG/changelog/" \
          || gh release upload "$TAG" openmv-doc-html.zip --clobber --repo "$GITHUB_REPOSITORY"

    - name: Generate app token for OpenMV Studio
      id: studio-token
      continue-on-error: true
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}
        repositories: openmv-studio
    - name: Trigger OpenMV Studio resources update
      if: steps.studio-token.outputs.token != ''
      continue-on-error: true
      env:
        GH_TOKEN: ${{ steps.studio-token.outputs.token }}
      run: gh workflow run resources.yml --repo ${{ github.repository_owner }}/openmv-studio

    # Ship the offline bundle to the Qt IDE. LAST step on purpose: a failed IDE
    # push (e.g. a bad SSH key) must not skip the html.zip release above it.
    - name: Push release docs into the OpenMV IDE
      uses: cpina/github-action-push-to-another-repository@main
      env:
        SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
      with:
        source-directory: 'offline'
        destination-github-username: 'openmv'
        destination-repository-name: 'qt-creator'
        target-branch: openmv-qtc-14.0.2
        target-directory: 'share/qtcreator/html'

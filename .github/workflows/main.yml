name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'
        fetch-depth: 1

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -U -r micropython/docs/requirements.txt

    - name: Generate CPython differences (genrst)
      working-directory: micropython
      run: |
        make -C mpy-cross -j"$(nproc)"
        make -C ports/unix submodules
        make -C ports/unix -j"$(nproc)"
        (cd tools && python gen-cpydiff.py)

    - name: Build docs
      working-directory: micropython/docs
      run: python -m sphinx -b html -d build/doctrees . build/html

    - name: Build translations
      working-directory: micropython/docs
      # Each translated language is a full build emitted into its own
      # subdirectory (build/html/<lang>/), matching the URL patterns in
      # conf.py's html_context["languages"] switcher. Sphinx compiles the
      # committed .po catalogs to .mo automatically (gettext_auto_build).
      # The "Sync built docs" step below then deploys these subdirs along
      # with the English root.
      run: |
        for lang in zh_CN zh_TW de ja es ru fr ko it pt_BR nl ro hr cs pl fi sv hu tr he ar; do
          echo "::group::$lang"
          python -m sphinx -b html -D language="$lang" -d "build/doctrees-$lang" . "build/html/$lang"
          echo "::endgroup::"
        done

    - name: Generate Python stubs
      run: |
        python genpyi.py \
          --docs-dir micropython/docs/build/html/_sources/library/ \
          --pyi-dir micropython/docs/build/stubs

    - name: Verify stubs match the documented API
      run: |
        python verify_stubs.py \
          --docs-dir micropython/docs/build/html/_sources/library/ \
          --pyi-dir micropython/docs/build/stubs

    - uses: actions/upload-artifact@v4
      with:
        name: html
        path: micropython/docs/build/html/

    - uses: actions/upload-artifact@v4
      with:
        name: stubs
        path: micropython/docs/build/stubs/

    - name: Sync built docs into repository
      run: |
        # Clean first (preserving the hand-placed CNAME) so pages removed
        # from the documentation do not linger in docs/ and on GitHub Pages
        # forever; cp -r alone never deletes anything.
        find docs -mindepth 1 -maxdepth 1 ! -name CNAME -exec rm -rf {} +
        cp -r micropython/docs/build/html/* docs/
        cp -r micropython/docs/build/stubs docs/stubs
        touch docs/.nojekyll
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs
        git commit -m "Update documentation" -a || true
        # Commit fails if no changes; ignore.

    - name: Push documentation changes
      uses: ad-m/github-push-action@master
      with:
        branch: master
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Stage docs with stubs for the IDE push
      if: startsWith(github.ref, 'refs/tags/v')
      # Local copy so build/html itself (uploaded artifacts, docs/ sync, and
      # the OpenMV Studio resources flow) is not modified.
      run: |
        cp -r micropython/docs/build/html micropython/docs/build/html-with-stubs
        cp -r micropython/docs/build/stubs micropython/docs/build/html-with-stubs/stubs

    - name: Pushes to another repository
      if: startsWith(github.ref, 'refs/tags/v')
      uses: cpina/github-action-push-to-another-repository@main
      env:
        SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
      with:
        source-directory: 'micropython/docs/build/html-with-stubs'
        destination-github-username: 'openmv'
        destination-repository-name: 'qt-creator'
        target-branch: openmv-qtc-14.0.2
        target-directory: 'share/qtcreator/html'

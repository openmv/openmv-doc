name: CI

on:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  # Only master (the "dev" channel) and v5.0.0+ release tags build. Legacy tags
  # (v4.x and earlier) exist on this repo purely for historical tracking; their
  # docs are frozen HTML snapshots committed directly under docs/<version>/ and
  # must never be rebuilt with current tooling. The workflow triggers on every
  # "v*" tag push, so this gate stops those legacy pushes from doing real work.
  gate:
    runs-on: ubuntu-22.04
    outputs:
      proceed: ${{ steps.g.outputs.proceed }}
    steps:
    - name: Decide whether to build
      id: g
      run: |
        ref="${GITHUB_REF}"
        proceed=false
        if [[ "$ref" == refs/heads/master ]]; then
          proceed=true
        elif [[ "$ref" == refs/tags/v* ]]; then
          major="${ref#refs/tags/v}"; major="${major%%.*}"
          if [[ "$major" =~ ^[0-9]+$ ]] && [ "$major" -ge 5 ]; then
            proceed=true
          fi
        fi
        echo "ref=$ref proceed=$proceed"
        echo "proceed=$proceed" >> "$GITHUB_OUTPUT"

  build:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'
        fetch-depth: 1

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      # Pillow + minify-html drive the post-build size-optimization steps
      # (.ci/optimize_images.py and .ci/minify_docs.py).
      run: pip install -U -r micropython/docs/requirements.txt Pillow minify-html

    - name: Generate CPython differences (genrst)
      working-directory: micropython
      run: |
        make -C mpy-cross -j"$(nproc)"
        make -C ports/unix submodules
        make -C ports/unix -j"$(nproc)"
        (cd tools && python gen-cpydiff.py)

    # The docs are versioned: a master push builds the rolling "dev" channel;
    # a "vX.Y.Z" tag builds that frozen release snapshot. The channel is the
    # top-level URL segment (docs.openmv.io/<channel>/...) and is read by
    # conf.py via OPENMV_DOCS_CHANNEL.
    - name: Determine version channel
      id: channel
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          echo "channel=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "is_release=true" >> "$GITHUB_OUTPUT"
        else
          echo "channel=dev" >> "$GITHUB_OUTPUT"
          echo "is_release=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build docs
      working-directory: micropython/docs
      env:
        OPENMV_DOCS_CHANNEL: ${{ steps.channel.outputs.channel }}
        # Mark this as the channel-root build so conf.py emits llms.txt /
        # llms-full.txt here only. The dump is English source regardless of
        # build language, so the per-language builds below leave it unset and
        # skip it -- avoiding ~5 MB x26 of duplication and the generation time,
        # with no per-language copies to clean up. (_images/_downloads/_sources
        # are still emitted per build -- Sphinx has no switch to share them and
        # _sources backs the Copy-page dropdown -- so the dedup step below
        # removes those per-language copies.)
        OPENMV_DOCS_ROOT_BUILD: '1'
      run: python -m sphinx -b html -d build/doctrees . build/html

    - name: Build translations
      working-directory: micropython/docs
      # Build every committed translation (one per locale/<lang>/ directory)
      # into build/html/<lang>/, in parallel across the runner's cores. The
      # language set is derived from locale/, so adding a translation needs no
      # change here. Same OPENMV_DOCS_CHANNEL so their switcher URLs match.
      env:
        OPENMV_DOCS_CHANNEL: ${{ steps.channel.outputs.channel }}
      run: |
        ls -d locale/*/ | xargs -n1 basename | xargs -P "$(nproc)" -I {} \
          python -m sphinx -q -b html -D language={} -d "build/doctrees-{}" . "build/html/{}"

    - name: Deduplicate per-language assets
      working-directory: micropython/docs
      # Each per-language build copies the byte-identical _images/, _downloads/,
      # _sources/ trees and the home-page hero video; that duplication is the
      # bulk of the channel's size (~3.1 GB on dev). Drop the per-language
      # copies and repoint each locale's HTML at the channel-root copy (one
      # extra "../", correct at every page depth). Runs after all locale builds
      # and before Sync, on build/html/. Root _sources (used by the stub steps
      # below) is left untouched.
      run: python ../../.ci/dedup_assets.py build/html --locales-dir locale

    - name: Optimize images
      working-directory: micropython/docs
      # Palette-quantize flat-colour diagram PNGs and re-compress photos in
      # place (same filenames, no HTML changes). Images are gzip-immune, so this
      # is the biggest reduction in what GitHub Pages actually serves. Runs after
      # dedup so it only touches the single channel-root _images copy.
      run: python ../../.ci/optimize_images.py build/html

    - name: Minify HTML
      working-directory: micropython/docs
      # Collapse whitespace / minify inline CSS in every page (code blocks and
      # inline JS are preserved). ~10% off the raw HTML. Negligible for web
      # visitors (Pages already gzips), but it shrinks the committed folder and,
      # most usefully, the English IDE bundle (served from local files, no gzip).
      run: python ../../.ci/minify_docs.py build/html

    - name: Generate Python stubs
      run: |
        python genpyi.py \
          --docs-dir micropython/docs/build/html/_sources/library/ \
          --pyi-dir micropython/docs/build/stubs

    - name: Verify stubs match the documented API
      run: |
        python verify_stubs.py \
          --docs-dir micropython/docs/build/html/_sources/library/ \
          --pyi-dir micropython/docs/build/stubs

    - uses: actions/upload-artifact@v4
      with:
        name: html
        path: micropython/docs/build/html/

    - uses: actions/upload-artifact@v4
      with:
        name: stubs
        path: micropython/docs/build/stubs/

    - name: Sync built docs into repository
      env:
        CHANNEL: ${{ steps.channel.outputs.channel }}
      run: |
        set -euo pipefail
        # Replace ONLY this channel's folder. Every other version snapshot,
        # the CNAME, and the root files are preserved -- frozen releases are
        # never rebuilt, so the build stays bounded no matter how many pile up.
        rm -rf "docs/${CHANNEL}"
        mkdir -p "docs/${CHANNEL}"
        cp -r micropython/docs/build/html/* "docs/${CHANNEL}/"
        cp -r micropython/docs/build/stubs "docs/${CHANNEL}/stubs"
        touch docs/.nojekyll

        # 404 redirect shim (old flat URLs + /latest/ deep links -> channels).
        cp .ci/404.html docs/404.html
        # Regenerate versions.json + root and /latest/ redirects from the
        # version folders now present.
        python .ci/gen_versions.py docs

        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs
        git commit -m "Update documentation (${CHANNEL})" -a || true
        # Commit fails if no changes; ignore.

    - name: Push documentation changes
      uses: ad-m/github-push-action@master
      with:
        branch: master
        github_token: ${{ secrets.GITHUB_TOKEN }}

    # Tell OpenMV Studio to re-pull the docs and rebuild its stubs. Same
    # trigger-and-pull pattern the firmware (openmv) and SDK (openmv-sdk) use:
    # Studio's package-resources.sh clones openmv-doc (HEAD for dev, the stable
    # tag for stable) and reads docs/<channel>/_sources/library/. Fires on dev
    # (master) and releases (tags). continue-on-error so a missing app-token
    # secret never fails an otherwise-good docs deploy.
    - name: Generate app token for OpenMV Studio
      id: studio-token
      continue-on-error: true
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}
        repositories: openmv-studio
    - name: Trigger OpenMV Studio resources update
      if: steps.studio-token.outputs.token != ''
      continue-on-error: true
      env:
        GH_TOKEN: ${{ steps.studio-token.outputs.token }}
      run: gh workflow run resources.yml --repo ${{ github.repository_owner }}/openmv-studio

    # Bundle the docs into the (legacy) OpenMV IDE / Qt Creator. Tag-gated, so
    # this only runs on a release build (the gate already blocks tags < v5.0.0).
    # Ship the docs for the release being built -- docs/<channel> is the
    # vX.Y.Z tree the Sync step just produced -- so the IDE always carries the
    # latest released docs, not the rolling dev channel.
    - name: Push release docs into the OpenMV IDE
      if: startsWith(github.ref, 'refs/tags/v')
      uses: cpina/github-action-push-to-another-repository@main
      env:
        SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
      with:
        source-directory: 'docs/${{ steps.channel.outputs.channel }}'
        destination-github-username: 'openmv'
        destination-repository-name: 'qt-creator'
        target-branch: openmv-qtc-14.0.2
        target-directory: 'share/qtcreator/html'

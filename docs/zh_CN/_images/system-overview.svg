<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Host PC connects to a cam over USB; the cam exposes three channels -- a frame channel for image data, a config channel for typed widget values, and the built-in stdout channel for prints -- and the host script reads or writes each one.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Host PC box (left) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="30" y="100" width="180" height="80" rx="6"/>
  </g>
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="120" y="132">host PC</text>
    <text x="120" y="152" font-size="11" opacity="0.75">openmv.camera.Camera</text>
  </g>

  <!-- Cam box (right) with three channel sub-boxes -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="490" y="40" width="220" height="200" rx="6"/>
  </g>
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="600" y="62">the cam</text>
  </g>

  <!-- Channel sub-boxes -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.85">
    <rect x="510" y="80" width="180" height="44" rx="4"/>
    <rect x="510" y="132" width="180" height="44" rx="4"/>
    <rect x="510" y="184" width="180" height="44" rx="4"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="600" y="100">stdout</text>
    <text x="600" y="118" font-size="11" opacity="0.75">built-in</text>
    <text x="600" y="152">frame</text>
    <text x="600" y="170" font-size="11" opacity="0.75">read-only</text>
    <text x="600" y="204">config</text>
    <text x="600" y="222" font-size="11" opacity="0.75">read + write</text>
  </g>

  <!-- USB cable arrow (host -> cam) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="210" y1="140" x2="490" y2="140"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="482,136 482,144 490,140"/>
    <polygon points="218,136 218,144 210,140"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="350" y="130">USB / UART</text>
    <text x="350" y="158">channel-multiplexed protocol</text>
  </g>

  <!-- Footer annotation -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="380" y="265">one transport, many channels; each channel a Python class on the cam</text>
  </g>
</svg>

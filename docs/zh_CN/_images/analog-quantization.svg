<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Analog signal versus its digital (quantized) approximation</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrQ" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- X-axis (time) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrQ)">
    <line x1="80" y1="270" x2="500" y2="270"/>
  </g>
  <g fill="currentColor">
    <text x="510" y="274">t</text>
  </g>

  <!-- Y-axis (voltage) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrQ)">
    <line x1="80" y1="270" x2="80" y2="45"/>
  </g>
  <g fill="currentColor" text-anchor="end">
    <text x="74" y="40">V</text>
  </g>

  <!-- Quantization levels (light dashed horizontal lines) -->
  <g stroke="currentColor" fill="none" stroke-width="1" stroke-dasharray="3 3" opacity="0.4">
    <line x1="80" y1="230" x2="480" y2="230"/>
    <line x1="80" y1="190" x2="480" y2="190"/>
    <line x1="80" y1="150" x2="480" y2="150"/>
    <line x1="80" y1="110" x2="480" y2="110"/>
    <line x1="80" y1="70" x2="480" y2="70"/>
  </g>

  <!-- Continuous analog curve (sine-like, one full lobe) -->
  <g stroke="currentColor" fill="none" stroke-width="2.2" opacity="0.85">
    <path d="M 80,270 C 180,270 180,70 280,70 C 380,70 380,270 480,270"/>
  </g>

  <!-- Stepped (digital) approximation: jumps at each half-level
       crossing of the analog curve so the steps straddle the
       curve symmetrically -->
  <g stroke="currentColor" fill="none" stroke-width="2" stroke-dasharray="6 3">
    <polyline points="80,270 130,270 130,230 159,230 159,190 180,190 180,150 201,150 201,110 230,110 230,70 330,70 330,110 359,110 359,150 380,150 380,190 401,190 401,230 430,230 430,270 480,270"/>
  </g>

  <!-- Legend -->
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="280" y="300">analog signal (solid) and its digital approximation (dashed)</text>
  </g>
</svg>

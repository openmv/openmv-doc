<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>The layout of a single protocol packet: a 10-byte header containing the 2-byte sync word, sequence number, channel ID, flags, opcode, payload length, and header CRC, followed by the variable-length payload and a 4-byte payload CRC.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Byte boxes — 10 header bytes + payload region + 4 trailer bytes -->
  <!-- viewBox 760 wide; box width 36; 10 header boxes 360 + payload 160 + 4 trailer 144 = 664; centred starting x=(760-664)/2 = 48 -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <!-- 10 header bytes -->
    <rect x="48"  y="100" width="36" height="50"/>
    <rect x="84"  y="100" width="36" height="50"/>
    <rect x="120" y="100" width="36" height="50"/>
    <rect x="156" y="100" width="36" height="50"/>
    <rect x="192" y="100" width="36" height="50"/>
    <rect x="228" y="100" width="36" height="50"/>
    <rect x="264" y="100" width="36" height="50"/>
    <rect x="300" y="100" width="36" height="50"/>
    <rect x="336" y="100" width="36" height="50"/>
    <rect x="372" y="100" width="36" height="50"/>
    <!-- Payload (variable, drawn as wider box) -->
    <rect x="408" y="100" width="160" height="50"/>
    <!-- 4 trailer bytes -->
    <rect x="568" y="100" width="36" height="50"/>
    <rect x="604" y="100" width="36" height="50"/>
    <rect x="640" y="100" width="36" height="50"/>
    <rect x="676" y="100" width="36" height="50"/>
  </g>

  <!-- Per-byte values / labels -->
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="66"  y="128">sync</text>
    <text x="102" y="128">sync</text>
    <text x="138" y="128">seq</text>
    <text x="174" y="128">chan</text>
    <text x="210" y="128">flags</text>
    <text x="246" y="128">op</text>
    <text x="282" y="128">len</text>
    <text x="318" y="128">len</text>
    <text x="354" y="128">crc</text>
    <text x="390" y="128">crc</text>
    <text x="488" y="128">payload</text>
    <text x="488" y="142" font-size="10" opacity="0.65">(0..N bytes)</text>
    <text x="586" y="128">crc</text>
    <text x="622" y="128">crc</text>
    <text x="658" y="128">crc</text>
    <text x="694" y="128">crc</text>
  </g>

  <!-- Section brackets above the boxes -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.65">
    <line x1="48"  y1="82" x2="408" y2="82"/>
    <line x1="48"  y1="76" x2="48"  y2="82"/>
    <line x1="408" y1="76" x2="408" y2="82"/>
    <line x1="408" y1="82" x2="568" y2="82"/>
    <line x1="568" y1="76" x2="568" y2="82"/>
    <line x1="568" y1="82" x2="712" y2="82"/>
    <line x1="712" y1="76" x2="712" y2="82"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="228" y="68">10-byte header</text>
    <text x="488" y="68">payload</text>
    <text x="640" y="68">CRC trailer (4 bytes)</text>
  </g>

  <!-- Below the boxes: section sizes -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="66"  y="172">2</text>
    <text x="138" y="172">1</text>
    <text x="174" y="172">1</text>
    <text x="210" y="172">1</text>
    <text x="246" y="172">1</text>
    <text x="300" y="172">2</text>
    <text x="372" y="172">2</text>
  </g>

  <!-- Field role row -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="66"  y="190">AA</text>
    <text x="102" y="190">D5</text>
    <text x="138" y="190">SEQ</text>
    <text x="174" y="190">CHAN</text>
    <text x="210" y="190">FLAGS</text>
    <text x="246" y="190">OP</text>
    <text x="300" y="190">LEN</text>
    <text x="372" y="190">HDR-CRC</text>
  </g>

  <!-- Footer annotation -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="380" y="218">two CRCs: 16-bit over the header, 32-bit over the payload</text>
  </g>
</svg>

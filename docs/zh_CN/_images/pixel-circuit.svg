<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 30 560 240"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>CMOS pixel circuit</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- VDD rail at the top -->
  <line x1="120" y1="60" x2="440" y2="60"
        stroke="currentColor" stroke-width="1.6"/>
  <text x="450" y="64" fill="currentColor" font-size="11">VDD</text>

  <!-- GND rail at the bottom -->
  <line x1="120" y1="220" x2="440" y2="220"
        stroke="currentColor" stroke-width="1.6"/>
  <text x="450" y="224" fill="currentColor" font-size="11">GND</text>

  <!-- Reset switch RST: drawn as a labelled box on the wire from
       VDD down to node A. -->
  <line x1="200" y1="60" x2="200" y2="85"
        stroke="currentColor" stroke-width="1.4"/>
  <rect x="180" y="85" width="40" height="25"
        fill="none" stroke="currentColor" stroke-width="1.4"/>
  <text x="200" y="103" fill="currentColor" text-anchor="middle" font-size="11">RST</text>
  <line x1="200" y1="110" x2="200" y2="140"
        stroke="currentColor" stroke-width="1.4"/>

  <!-- Node A (junction below the reset switch) -->
  <circle cx="200" cy="140" r="3" fill="currentColor"/>
  <text x="170" y="135" fill="currentColor" text-anchor="end" font-size="11">A</text>

  <!-- Photodiode: vertical, cathode at top (node A), anode at bottom
       (ground rail). Triangle points up (forward-current direction)
       with the cathode bar above it. The PD is reverse-biased because
       its cathode sits at the higher (VDD-side) potential. -->
  <line x1="200" y1="140" x2="200" y2="158"
        stroke="currentColor" stroke-width="1.4"/>
  <line x1="186" y1="158" x2="214" y2="158"
        stroke="currentColor" stroke-width="1.4"/>
  <polygon points="200,160 188,182 212,182"
           fill="none" stroke="currentColor" stroke-width="1.4"/>
  <line x1="200" y1="182" x2="200" y2="220"
        stroke="currentColor" stroke-width="1.4"/>

  <!-- Incoming light arrows pointing at the photodiode -->
  <g stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.85">
    <line x1="135" y1="135" x2="180" y2="163"/>
    <polyline points="171,160 180,163 174,154"/>
    <line x1="130" y1="153" x2="178" y2="178"/>
    <polyline points="170,177 178,178 174,169"/>
  </g>
  <text x="112" y="128" fill="currentColor" font-size="11">light</text>

  <!-- Transfer switch TX between nodes A and B -->
  <line x1="200" y1="140" x2="270" y2="140"
        stroke="currentColor" stroke-width="1.4"/>
  <rect x="270" y="125" width="40" height="30"
        fill="none" stroke="currentColor" stroke-width="1.4"/>
  <text x="290" y="145" fill="currentColor" text-anchor="middle" font-size="11">TX</text>
  <line x1="310" y1="140" x2="380" y2="140"
        stroke="currentColor" stroke-width="1.4"/>

  <!-- Node B (junction holding C and feeding the read-out) -->
  <circle cx="380" cy="140" r="3" fill="currentColor"/>
  <text x="380" y="128" fill="currentColor" text-anchor="middle" font-size="11">B</text>

  <!-- Storage capacitor C: vertical, from node B down to ground.
       Two short parallel plates make the capacitor symbol. -->
  <line x1="380" y1="140" x2="380" y2="170"
        stroke="currentColor" stroke-width="1.4"/>
  <line x1="365" y1="170" x2="395" y2="170"
        stroke="currentColor" stroke-width="1.8"/>
  <line x1="365" y1="178" x2="395" y2="178"
        stroke="currentColor" stroke-width="1.8"/>
  <text x="402" y="178" fill="currentColor" font-size="11">C</text>
  <line x1="380" y1="178" x2="380" y2="220"
        stroke="currentColor" stroke-width="1.4"/>

  <!-- Read-out tap from node B going right with an arrowhead -->
  <line x1="380" y1="140" x2="438" y2="140"
        stroke="currentColor" stroke-width="1.4"/>
  <polyline points="432,135 442,140 432,145"
            fill="none" stroke="currentColor" stroke-width="1.4"/>
  <text x="448" y="144" fill="currentColor" font-size="11">to read-out</text>
</svg>

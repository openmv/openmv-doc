<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>One cam publishes to a topic on a broker; the broker fans the message out to every subscriber on that topic -- two dashboards and a cloud archiver in this picture.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Publisher (cam) box -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="30" y="135" width="150" height="60" rx="6"/>
  </g>
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="105" y="160">yard-cam</text>
    <text x="105" y="178" font-size="11" opacity="0.75">publisher</text>
  </g>

  <!-- Broker box (centre) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="290" y="120" width="180" height="90" rx="6"/>
  </g>
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="380" y="148">broker</text>
    <text x="380" y="172" font-size="11" opacity="0.75">yard-cam/motion</text>
    <text x="380" y="190" font-size="11" opacity="0.75">(subscribers: 3)</text>
  </g>

  <!-- Subscriber boxes (right) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="580" y="40" width="160" height="50" rx="6"/>
    <rect x="580" y="140" width="160" height="50" rx="6"/>
    <rect x="580" y="240" width="160" height="50" rx="6"/>
  </g>
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="660" y="62">phone dashboard</text>
    <text x="660" y="80" font-size="11" opacity="0.75">subscriber</text>
    <text x="660" y="162">laptop dashboard</text>
    <text x="660" y="180" font-size="11" opacity="0.75">subscriber</text>
    <text x="660" y="262">cloud archiver</text>
    <text x="660" y="280" font-size="11" opacity="0.75">subscriber</text>
  </g>

  <!-- Publish arrow (cam -> broker) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="180" y1="165" x2="290" y2="165"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="282,161 282,169 290,165"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="235" y="155">PUBLISH</text>
    <text x="235" y="184">"motion"</text>
  </g>

  <!-- Fan-out arrows (broker -> three subscribers, common origin) -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="470" y1="165" x2="580" y2="65"/>
    <line x1="470" y1="165" x2="580" y2="165"/>
    <line x1="470" y1="165" x2="580" y2="265"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="571,67 577,73 580,65"/>
    <polygon points="572,161 572,169 580,165"/>
    <polygon points="571,263 577,257 580,265"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="525" y="158">forward</text>
  </g>

  <!-- Footer annotation -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="380" y="310">one publish; the broker handles every subscriber's copy</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>decorator wraps a function and returns a new function</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrDec" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Original function -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="20" y="80" width="140" height="60" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="90" y="106">def add(a, b)</text>
    <text x="90" y="126" font-size="11" opacity="0.75">original</text>
  </g>

  <!-- Arrow into wrapper -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrDec)">
    <line x1="160" y1="110" x2="215" y2="110"/>
  </g>

  <!-- Wrapper (decorator) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="220" y="60" width="160" height="100" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="300" y="92">@log_calls</text>
    <text x="300" y="116" font-size="11" opacity="0.75">wraps the call</text>
    <text x="300" y="134" font-size="11" opacity="0.75">with extra behaviour</text>
  </g>

  <!-- Arrow out -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrDec)">
    <line x1="380" y1="110" x2="435" y2="110"/>
  </g>

  <!-- Decorated function -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="440" y="80" width="140" height="60" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="510" y="106">add (decorated)</text>
    <text x="510" y="126" font-size="11" opacity="0.75">new function</text>
  </g>

  <!-- Bottom equivalence -->
  <g fill="currentColor" text-anchor="middle" font-size="12" opacity="0.7">
    <text x="300" y="195">@log_calls above def add   is   add = log_calls(add)</text>
  </g>
</svg>

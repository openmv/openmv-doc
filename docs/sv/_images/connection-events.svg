<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>BLE connection events on a periodic timeline, with skipped events under peripheral latency</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Central track label -->
  <g fill="currentColor" font-size="14">
    <text x="20" y="95">central</text>
    <text x="20" y="195">peripheral</text>
  </g>

  <!-- Two horizontal track baselines -->
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="2,3" opacity="0.5">
    <line x1="100" y1="100" x2="720" y2="100"/>
    <line x1="100" y1="200" x2="720" y2="200"/>
  </g>

  <!-- Connection events: vertical pulses at x = 130, 230, 330, 430, 530, 630 (six events spaced 100 apart) -->
  <!-- Central pulses -->
  <g fill="currentColor">
    <rect x="125" y="75" width="10" height="50"/>
    <rect x="225" y="75" width="10" height="50"/>
    <rect x="325" y="75" width="10" height="50"/>
    <rect x="425" y="75" width="10" height="50"/>
    <rect x="525" y="75" width="10" height="50"/>
    <rect x="625" y="75" width="10" height="50"/>
  </g>
  <!-- Peripheral pulses: same as central for events 0,1,3,5; skipped at 2 and 4 (peripheral latency) -->
  <g fill="currentColor">
    <rect x="125" y="175" width="10" height="50"/>
    <rect x="225" y="175" width="10" height="50"/>
    <!-- 325 skipped -->
    <rect x="425" y="175" width="10" height="50"/>
    <!-- 525 skipped -->
    <rect x="625" y="175" width="10" height="50"/>
  </g>
  <!-- Skipped markers (dashed outlines on peripheral track) -->
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,3" opacity="0.5">
    <rect x="325" y="175" width="10" height="50"/>
    <rect x="525" y="175" width="10" height="50"/>
  </g>

  <!-- Connection interval bracket between event 0 and event 1 -->
  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <line x1="130" y1="50" x2="230" y2="50"/>
    <line x1="130" y1="45" x2="130" y2="55"/>
    <line x1="230" y1="45" x2="230" y2="55"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="180" y="40">connection interval</text>
  </g>

  <!-- Single connection event label with leader -->
  <g fill="none" stroke="currentColor" stroke-width="1">
    <line x1="445" y1="65" x2="435" y2="75"/>
  </g>
  <g fill="currentColor" font-size="11">
    <text x="448" y="65">connection event (TX/RX burst)</text>
  </g>

  <!-- Peripheral latency annotation -->
  <g fill="none" stroke="currentColor" stroke-width="1">
    <line x1="330" y1="245" x2="330" y2="230"/>
    <line x1="530" y1="245" x2="530" y2="230"/>
    <line x1="330" y1="245" x2="530" y2="245"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="430" y="265">peripheral latency: peripheral skips events when idle</text>
  </g>

  <!-- Time arrow at bottom -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="100" y1="295" x2="720" y2="295"/>
    <polygon points="716,291 716,299 730,295" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="100" y="310">time</text>
  </g>
</svg>

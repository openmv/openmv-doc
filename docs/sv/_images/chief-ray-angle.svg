<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 30 560 220"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>Chief ray angle at the sensor</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Optical axis (dashed) -->
  <g stroke="currentColor" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.4">
    <line x1="40" y1="140" x2="520" y2="140"/>
  </g>

  <!-- Lens (vertical thin oval) -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <ellipse cx="200" cy="140" rx="10" ry="90"/>
  </g>

  <!-- Sensor (vertical line) -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <line x1="420" y1="50" x2="420" y2="230"/>
  </g>

  <!-- Chief rays from the lens centre to three sample pixels:
       top (420, 60), centre (420, 140), bottom (420, 220).      -->
  <g stroke="currentColor" stroke-width="1.2" opacity="0.75">
    <line x1="200" y1="140" x2="420" y2="60"/>
    <line x1="200" y1="140" x2="420" y2="140"/>
    <line x1="200" y1="140" x2="420" y2="220"/>
  </g>

  <!-- Pixel position dots on the sensor -->
  <g fill="currentColor">
    <circle cx="420" cy="60"  r="3"/>
    <circle cx="420" cy="140" r="3"/>
    <circle cx="420" cy="220" r="3"/>
  </g>

  <!-- Sensor normal at the top pixel: short arrow pointing left
       (away from the sensor surface, toward the lens side). -->
  <g stroke="currentColor" stroke-width="1" fill="none" opacity="0.85">
    <line x1="420" y1="60" x2="385" y2="60"/>
    <polyline points="390,56 385,60 390,64"/>
  </g>
  <text x="382" y="50" fill="currentColor" font-size="11" text-anchor="end">normal</text>

  <!-- CRA arc at the top pixel.
       Start point on the normal direction at radius 20 from (420, 60):
         (420 + 20*cos(180°), 60 + 20*sin(180°)) = (400, 60).
       End point on the chief-ray direction at the same radius, at
       angle 160° from +x (the ray to the pixel comes from direction
       (-220, 80), which is angle 160° measured from +x):
         (420 + 20*cos(160°), 60 + 20*sin(160°)) ~ (401.2, 66.84).
       Small arc (large-arc-flag=0), sweeping in the SVG-clockwise
       direction (sweep-flag=1) so it curves into the angle below
       the normal, toward the incoming chief ray. -->
  <path d="M 400 60 A 20 20 0 0 1 401.2 66.84"
        stroke="currentColor" stroke-width="1.2" fill="none"/>
  <text x="385" y="95" fill="currentColor" font-size="11" text-anchor="middle">CRA</text>
</svg>

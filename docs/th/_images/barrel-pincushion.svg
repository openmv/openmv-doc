<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 20 560 180"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>Barrel and pincushion distortion</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- ========== PANEL 1: ideal ==========
       Square outline + centre cross. No distortion.        -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <rect x="50" y="40" width="100" height="100"/>
    <line x1="100" y1="40" x2="100" y2="140"/>
    <line x1="50" y1="90" x2="150" y2="90"/>
  </g>
  <text x="100" y="170" fill="currentColor" text-anchor="middle">ideal</text>

  <!-- ========== PANEL 2: barrel ==========
       Outline edges bulge OUTWARD via quadratic Bezier curves.
       The control points sit one bulge width beyond each edge.
       Centre cross stays straight (radial lines do not curve)
       and is extended to meet the bulged outline at the midpoints. -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <path d="M 230 40 Q 280 28 330 40 Q 342 90 330 140 Q 280 152 230 140 Q 218 90 230 40 Z"/>
    <line x1="280" y1="34" x2="280" y2="146"/>
    <line x1="224" y1="90" x2="336" y2="90"/>
  </g>
  <text x="280" y="170" fill="currentColor" text-anchor="middle">barrel</text>

  <!-- ========== PANEL 3: pincushion ==========
       Outline edges bow INWARD toward the panel centre.
       Centre cross stays straight, shortened to fit the pinched
       outline at the midpoints.                                  -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <path d="M 410 40 Q 460 52 510 40 Q 498 90 510 140 Q 460 128 410 140 Q 422 90 410 40 Z"/>
    <line x1="460" y1="46" x2="460" y2="134"/>
    <line x1="416" y1="90" x2="504" y2="90"/>
  </g>
  <text x="460" y="170" fill="currentColor" text-anchor="middle">pincushion</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 240"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Dictionary keys mapped to values</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrowDict" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Column headings -->
  <g fill="currentColor" font-size="12" font-weight="bold" text-anchor="middle">
    <text x="100" y="30">keys</text>
    <text x="340" y="30">values</text>
  </g>

  <!-- Key cells -->
  <g stroke="currentColor" fill="none" stroke-width="1.4">
    <rect x="30"  y="55"  width="140" height="34" rx="4"/>
    <rect x="30"  y="100" width="140" height="34" rx="4"/>
    <rect x="30"  y="145" width="140" height="34" rx="4"/>
    <rect x="30"  y="190" width="140" height="34" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="13">
    <text x="100" y="77" >"name"</text>
    <text x="100" y="122">"id"</text>
    <text x="100" y="167">"width"</text>
    <text x="100" y="212">"tags"</text>
  </g>

  <!-- Value cells -->
  <g stroke="currentColor" fill="none" stroke-width="1.4">
    <rect x="270" y="55"  width="160" height="34" rx="4"/>
    <rect x="270" y="100" width="160" height="34" rx="4"/>
    <rect x="270" y="145" width="160" height="34" rx="4"/>
    <rect x="270" y="190" width="160" height="34" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="13">
    <text x="350" y="77" >"OpenMV"</text>
    <text x="350" y="122">42</text>
    <text x="350" y="167">320</text>
    <text x="350" y="212">["red", "round"]</text>
  </g>

  <!-- Arrows from each key to its value -->
  <g stroke="currentColor" stroke-width="1.4" fill="none" marker-end="url(#arrowDict)">
    <line x1="175" y1="72"  x2="265" y2="72"/>
    <line x1="175" y1="117" x2="265" y2="117"/>
    <line x1="175" y1="162" x2="265" y2="162"/>
    <line x1="175" y1="207" x2="265" y2="207"/>
  </g>
</svg>

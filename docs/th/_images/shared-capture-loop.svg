<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>One capture task writes JPEG bytes into a single latest_jpeg slot; three stream-client iterators all read from the slot and wait on the shared new_frame event.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Capture task (left) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="30" y="140" width="170" height="60" rx="6"/>
  </g>
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="115" y="166">capture_loop()</text>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="115" y="184">await csi0.snapshot()</text>
  </g>

  <!-- Latest-frame slot (centre) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="290" y="120" width="180" height="100" rx="6"/>
  </g>
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="380" y="152">latest_jpeg: bytes</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="4,4" opacity="0.5">
    <line x1="310" y1="170" x2="450" y2="170"/>
  </g>
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="380" y="198">new_frame: Event</text>
  </g>

  <!-- Three stream client boxes (right) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="560" y="50" width="170" height="50" rx="6"/>
    <rect x="560" y="145" width="170" height="50" rx="6"/>
    <rect x="560" y="240" width="170" height="50" rx="6"/>
  </g>
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="645" y="80">FrameStream #1</text>
    <text x="645" y="175">FrameStream #2</text>
    <text x="645" y="270">FrameStream #3</text>
  </g>

  <!-- Arrow capture -> slot -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="200" y1="170" x2="290" y2="170"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="282,166 282,174 290,170"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="245" y="160">write</text>
  </g>

  <!-- Arrows slot -> three clients. Tops/bottoms leave slot near
       its top/bottom edges so the diagonals diverge sharply and
       leave room for the "read" label between top and middle. -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="470" y1="130" x2="560" y2="75"/>
    <line x1="470" y1="170" x2="560" y2="170"/>
    <line x1="470" y1="210" x2="560" y2="265"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="555,83 551,76 560,75"/>
    <polygon points="552,166 552,174 560,170"/>
    <polygon points="555,257 551,264 560,265"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="510" y="158">read (await)</text>
  </g>

  <!-- Footer annotation -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="380" y="305">one sensor read per cycle; any number of viewers wait on the same pulse</text>
  </g>
</svg>

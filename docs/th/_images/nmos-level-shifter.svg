<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 440"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>one-way 3.3 V to 5 V level shifter with an N-MOSFET</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- +5 V supply rail -->
  <g fill="currentColor" text-anchor="middle">
    <text x="400" y="40">+5 V</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="400" y1="50" x2="400" y2="80"/>
  </g>

  <!-- Drain pull-up resistor, centred on x=400 so it lines up with the
       MOSFET drain pin below -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <polyline points="400,80 388,90 412,105 388,120 412,135 388,150 400,160"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="425" y="124">10 k&#937;</text>
  </g>

  <!-- Pull-up bottom to MOSFET drain pin (continuous vertical at x=400) -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="400" y1="160" x2="400" y2="204"/>
    <!-- 5 V output tap branching right -->
    <line x1="400" y1="180" x2="500" y2="180"/>
  </g>
  <g fill="currentColor" opacity="0.95">
    <circle cx="400" cy="180" r="3"/>
  </g>
  <g fill="currentColor">
    <text x="510" y="184">5 V output</text>
  </g>

  <!-- MOSFET body (circle) -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <circle cx="400" cy="240" r="36"/>
  </g>

  <!-- Internal NMOS symbol with body diode, the bidirectional shifter's
       drawing rotated 90 degrees counter-clockwise so G is on the left,
       D on top, S on bottom. -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <!-- Gate stub from pin entry to the gate bar -->
    <line x1="364" y1="240" x2="382" y2="240"/>
    <!-- Gate bar (vertical, separated from channel by a small gap) -->
    <line x1="382" y1="222" x2="382" y2="258"/>
    <!-- Channel (vertical, just right of the gate bar) -->
    <line x1="390" y1="222" x2="390" y2="258"/>
    <!-- Drain stub: channel top to drain pin -->
    <line x1="390" y1="222" x2="400" y2="222"/>
    <line x1="400" y1="222" x2="400" y2="204"/>
    <!-- Source stub: channel bottom to source pin -->
    <line x1="390" y1="258" x2="400" y2="258"/>
    <line x1="400" y1="258" x2="400" y2="276"/>
  </g>

  <!-- Body diode across the MOSFET: anode at source (bottom), cathode at
       drain (top), drawn to the right of the channel inside the circle. -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" opacity="0.85">
    <!-- Anode tap from the source stub corner to the diode level -->
    <line x1="400" y1="258" x2="418" y2="258"/>
    <!-- Anode lead, vertical into the triangle base -->
    <line x1="418" y1="258" x2="418" y2="252"/>
    <!-- Cathode lead, vertical from the cathode bar -->
    <line x1="418" y1="240" x2="418" y2="222"/>
    <!-- Cathode tap to the drain stub corner -->
    <line x1="400" y1="222" x2="418" y2="222"/>
    <!-- Cathode bar (short horizontal line, perpendicular to current flow) -->
    <line x1="412" y1="240" x2="424" y2="240"/>
  </g>
  <!-- Diode triangle, anode to cathode, pointing source to drain (upward) -->
  <g fill="currentColor" opacity="0.85">
    <polygon points="412,252 424,252 418,240"/>
  </g>
  <!-- Junction dots where the diode taps the source and drain stubs -->
  <g fill="currentColor">
    <circle cx="400" cy="258" r="2.5"/>
    <circle cx="400" cy="222" r="2.5"/>
  </g>
  <!-- "body diode" annotation, outside the circle to the right -->
  <g fill="currentColor" font-size="10" opacity="0.7">
    <text x="446" y="244">body diode</text>
  </g>

  <!-- D / G / S labels, placed well clear of the circle and the wires -->
  <g fill="currentColor" font-size="11" opacity="0.85">
    <text x="420" y="200">D</text>
    <text x="420" y="282">S</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="350" y="232">G</text>
  </g>

  <!-- Source to GND -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="400" y1="276" x2="400" y2="350"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="380" y1="350" x2="420" y2="350"/>
    <line x1="388" y1="362" x2="412" y2="362"/>
    <line x1="395" y1="374" x2="405" y2="374"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="400" y="398">GND</text>
  </g>

  <!-- Gate input: 3.3 V GPIO on the left -->
  <g fill="currentColor" text-anchor="end">
    <text x="100" y="244">3.3 V GPIO</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="105" y1="240" x2="195" y2="240"/>
  </g>

  <!-- Gate series resistor (10 k) -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <polyline points="195,240 207,228 227,252 247,228 267,252 287,228 307,252 319,240 364,240"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="257" y="220">10 k&#937;</text>
  </g>
</svg>

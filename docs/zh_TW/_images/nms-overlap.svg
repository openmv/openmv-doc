<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Left panel: three overlapping bounding boxes around the same subject, labelled with scores 0.92, 0.83, and 0.71. An arrow points right. Right panel: one surviving bounding box, labelled with the highest score 0.92.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.6">
    <text x="170" y="25">candidate boxes</text>
    <text x="600" y="25">after NMS</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2.4">
    <rect x="90" y="80" width="180" height="120" rx="2"/>
  </g>
  <g fill="currentColor" font-size="12">
    <text x="85" y="74" text-anchor="end">0.92</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.7">
    <rect x="110" y="60" width="180" height="120" rx="2"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="start" opacity="0.7">
    <text x="270" y="54">0.83</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.5">
    <rect x="70" y="100" width="180" height="120" rx="2"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="start" opacity="0.5">
    <text x="72" y="236">0.71</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="340" y1="140" x2="430" y2="140"/>
    <polygon points="425,135 435,140 425,145" fill="currentColor" stroke="none"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.6">
    <text x="385" y="130">NMS</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2.4">
    <rect x="510" y="80" width="180" height="120" rx="2"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="start">
    <text x="512" y="74">0.92</text>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.55">
    <text x="380" y="260">Boxes overlapping past the IoU threshold collapse to the highest-scoring one.</text>
  </g>
</svg>

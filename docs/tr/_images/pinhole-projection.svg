<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Pinhole projection</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Optical axis (dashed) -->
  <g stroke="currentColor" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.4">
    <line x1="60" y1="180" x2="480" y2="180"/>
  </g>

  <!-- Pinhole wall at x=320, with a small gap centered at y=180 -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <line x1="320" y1="50" x2="320" y2="174"/>
    <line x1="320" y1="186" x2="320" y2="280"/>
  </g>

  <!-- Image plane (back wall) at x=420 -->
  <g stroke="currentColor" stroke-width="1.4" fill="none">
    <line x1="420" y1="60" x2="420" y2="280"/>
  </g>

  <!-- Object arrow (scene), upward from baseline -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <line x1="120" y1="180" x2="120" y2="80"/>
    <polygon points="120,70 115,85 125,85" fill="currentColor" stroke="none"/>
  </g>

  <!-- Image arrow (inverted), downward from baseline -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <line x1="420" y1="180" x2="420" y2="230"/>
    <polygon points="420,235 415,222 425,222" fill="currentColor" stroke="none"/>
  </g>

  <!-- Rays: top of object through pinhole to image tip
       (120,80) -> (320,180) -> (420,230)
       Slope = (180-80)/(320-120) = 100/200 = 0.5
       At x=420: y = 180 + 0.5*100 = 230  -->
  <g stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.7">
    <line x1="120" y1="80" x2="320" y2="180"/>
    <line x1="320" y1="180" x2="420" y2="230"/>
    <!-- Optical axis ray (object base to image base): straight along y=180 -->
    <line x1="120" y1="180" x2="420" y2="180"/>
  </g>

  <!-- Distance brackets D and f, drawn below the optical axis -->
  <g stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.7">
    <!-- D bracket: x=120..x=320 at y=270 -->
    <line x1="120" y1="265" x2="120" y2="275"/>
    <line x1="320" y1="265" x2="320" y2="275"/>
    <line x1="120" y1="270" x2="320" y2="270"/>
    <!-- f bracket: x=320..x=420 at y=270 -->
    <line x1="320" y1="265" x2="320" y2="275"/>
    <line x1="420" y1="265" x2="420" y2="275"/>
    <line x1="320" y1="270" x2="420" y2="270"/>
  </g>

  <!-- Distance labels D and f -->
  <g fill="currentColor" text-anchor="middle">
    <text x="220" y="290">D</text>
    <text x="370" y="290">f</text>
  </g>

  <!-- Height labels H beside object, h beside image -->
  <g fill="currentColor">
    <text x="135" y="125">H</text>
    <text x="435" y="208">h</text>
  </g>

  <!-- Scene / pinhole / image labels -->
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.85">
    <text x="120" y="60">scene</text>
    <text x="320" y="40">pinhole wall</text>
    <text x="420" y="50">image plane</text>
  </g>
</svg>

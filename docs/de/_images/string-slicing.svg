<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 230"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>String slice positions sit between characters</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!--
    Character cells: 6 chars, each 50px wide, centred horizontally.
    Centres at x = 90, 140, 190, 240, 290, 340.
    Slice positions sit BETWEEN cells at x = 65, 115, 165, 215, 265, 315, 365.
  -->

  <!-- Top: slice position numbers 0..6 -->
  <g fill="currentColor" text-anchor="middle" font-size="12" opacity="0.75">
    <text x="65"  y="40">0</text>
    <text x="115" y="40">1</text>
    <text x="165" y="40">2</text>
    <text x="215" y="40">3</text>
    <text x="265" y="40">4</text>
    <text x="315" y="40">5</text>
    <text x="365" y="40">6</text>
  </g>

  <!-- Tick marks above each position -->
  <g stroke="currentColor" stroke-width="1" opacity="0.5">
    <line x1="65"  y1="50" x2="65"  y2="60"/>
    <line x1="115" y1="50" x2="115" y2="60"/>
    <line x1="165" y1="50" x2="165" y2="60"/>
    <line x1="215" y1="50" x2="215" y2="60"/>
    <line x1="265" y1="50" x2="265" y2="60"/>
    <line x1="315" y1="50" x2="315" y2="60"/>
    <line x1="365" y1="50" x2="365" y2="60"/>
  </g>

  <!-- Character cells -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="65"  y="60" width="50" height="50" rx="4"/>
    <rect x="115" y="60" width="50" height="50" rx="4"/>
    <rect x="165" y="60" width="50" height="50" rx="4"/>
    <rect x="215" y="60" width="50" height="50" rx="4"/>
    <rect x="265" y="60" width="50" height="50" rx="4"/>
    <rect x="315" y="60" width="50" height="50" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="18">
    <text x="90"  y="93">O</text>
    <text x="140" y="93">p</text>
    <text x="190" y="93">e</text>
    <text x="240" y="93">n</text>
    <text x="290" y="93">M</text>
    <text x="340" y="93">V</text>
  </g>

  <!-- Highlight: s[2:5] spans positions 2 to 5 (chars e, n, M) -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <path d="M 165 130 L 165 145 L 315 145 L 315 130" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g fill="currentColor" text-anchor="middle" font-size="14">
    <text x="240" y="172">s[2:5] = "enM"</text>
  </g>

  <!-- Negative indices row -->
  <g fill="currentColor" text-anchor="middle" font-size="12" opacity="0.6">
    <text x="90"  y="200">-6</text>
    <text x="140" y="200">-5</text>
    <text x="190" y="200">-4</text>
    <text x="240" y="200">-3</text>
    <text x="290" y="200">-2</text>
    <text x="340" y="200">-1</text>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.6">
    <text x="215" y="220">negative indices</text>
  </g>
</svg>

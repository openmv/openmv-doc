<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 260"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>str vs bytes</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
    <marker id="arrowL" viewBox="0 0 10 10" refX="1" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M10,0 L0,5 L10,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Column headings -->
  <g fill="currentColor" font-size="13" font-weight="bold" text-anchor="middle">
    <text x="100" y="30">str</text>
    <text x="440" y="30">bytes</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.65" text-anchor="middle">
    <text x="100" y="48">Unicode codepoints</text>
    <text x="440" y="48">raw octets (0&#8211;255)</text>
  </g>

  <!-- str: "héllo" cells with codepoints below -->
  <g stroke="currentColor" fill="none" stroke-width="1.4">
    <rect x="30"  y="70" width="36" height="44" rx="4"/>
    <rect x="68"  y="70" width="36" height="44" rx="4"/>
    <rect x="106" y="70" width="36" height="44" rx="4"/>
    <rect x="144" y="70" width="36" height="44" rx="4"/>
    <rect x="182" y="70" width="36" height="44" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="18">
    <text x="48"  y="100">h</text>
    <text x="86"  y="100">é</text>
    <text x="124" y="100">l</text>
    <text x="162" y="100">l</text>
    <text x="200" y="100">o</text>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.7">
    <text x="48"  y="132">U+0068</text>
    <text x="86"  y="132">U+00E9</text>
    <text x="124" y="132">U+006C</text>
    <text x="162" y="132">U+006C</text>
    <text x="200" y="132">U+006F</text>
  </g>

  <!-- bytes: 6 octets (h \xc3 \xa9 l l o) -->
  <g stroke="currentColor" fill="none" stroke-width="1.4">
    <rect x="312" y="70" width="36" height="44" rx="4"/>
    <rect x="350" y="70" width="36" height="44" rx="4"/>
    <rect x="388" y="70" width="36" height="44" rx="4"/>
    <rect x="426" y="70" width="36" height="44" rx="4"/>
    <rect x="464" y="70" width="36" height="44" rx="4"/>
    <rect x="502" y="70" width="36" height="44" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="13">
    <text x="330" y="98">68</text>
    <text x="368" y="98">c3</text>
    <text x="406" y="98">a9</text>
    <text x="444" y="98">6c</text>
    <text x="482" y="98">6c</text>
    <text x="520" y="98">6f</text>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.7">
    <text x="330" y="132">h</text>
    <text x="368" y="132" font-style="italic">é</text>
    <text x="406" y="132" font-style="italic">é</text>
    <text x="444" y="132">l</text>
    <text x="482" y="132">l</text>
    <text x="520" y="132">o</text>
  </g>
  <g fill="currentColor" font-size="10" opacity="0.55" text-anchor="middle">
    <text x="387" y="148">2-byte UTF-8 sequence</text>
  </g>

  <!-- Arrows: encode (str -> bytes), decode (bytes -> str) -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <line x1="225" y1="178" x2="305" y2="178" marker-end="url(#arrowR)"/>
    <line x1="305" y1="208" x2="225" y2="208" marker-end="url(#arrowL)"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="12">
    <text x="265" y="172">.encode("utf-8")</text>
    <text x="265" y="226">.decode("utf-8")</text>
  </g>
</svg>

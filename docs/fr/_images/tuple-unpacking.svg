<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>Tuple unpacking into three variables</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrowUnpack" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- The assignment, shown literally at the top -->
  <g fill="currentColor" text-anchor="middle" font-size="14">
    <text x="190" y="35">x, y, z = (1, 2, 3)</text>
  </g>

  <!-- Three boxes for the tuple values -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="90"  y="75" width="50" height="40" rx="4"/>
    <rect x="170" y="75" width="50" height="40" rx="4"/>
    <rect x="250" y="75" width="50" height="40" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="14">
    <text x="115" y="101">1</text>
    <text x="195" y="101">2</text>
    <text x="275" y="101">3</text>
  </g>

  <!-- Arrows downward to the names -->
  <g stroke="currentColor" stroke-width="1.5" fill="none" marker-end="url(#arrowUnpack)">
    <line x1="115" y1="120" x2="115" y2="155"/>
    <line x1="195" y1="120" x2="195" y2="155"/>
    <line x1="275" y1="120" x2="275" y2="155"/>
  </g>

  <!-- The three target names -->
  <g fill="currentColor" text-anchor="middle" font-size="15">
    <text x="115" y="180">x</text>
    <text x="195" y="180">y</text>
    <text x="275" y="180">z</text>
  </g>

  <!-- Caption -->
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.6">
    <text x="190" y="205">each tuple element binds to one name</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>RC hardware debounce circuit for a switch input</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Vcc rail label, above the switch node -->
  <g fill="currentColor" text-anchor="middle">
    <text x="370" y="40">Vcc</text>
  </g>

  <!-- Vcc wire down to top of pull-up R1 -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="370" y1="50" x2="370" y2="80"/>
  </g>

  <!-- Pull-up resistor R1 -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <polyline points="370,80 358,90 382,105 358,120 382,135 358,150 370,160"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="390" y="124">R1: 10 k&#937; (pull-up)</text>
  </g>

  <!-- Wire from R1 down to the switch node -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="370" y1="160" x2="370" y2="180"/>
  </g>

  <!-- Switch node junction dot -->
  <g fill="currentColor">
    <circle cx="370" cy="180" r="3"/>
  </g>

  <!-- Switch branch (right side): switch node down to GND -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="370" y1="180" x2="370" y2="200"/>
    <line x1="370" y1="200" x2="388" y2="235"/>
    <line x1="370" y1="243" x2="370" y2="290"/>
  </g>
  <g fill="currentColor">
    <circle cx="370" cy="200" r="3"/>
    <circle cx="370" cy="240" r="3"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="396" y="225">switch</text>
  </g>

  <!-- Wire from switch node left to R2 right end -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="370" y1="180" x2="320" y2="180"/>
  </g>

  <!-- R2 zigzag (horizontal series resistor between switch node and pin) -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <polyline points="320,180 310,168 295,192 280,168 265,192 250,168 240,180"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="280" y="208">R2: 10 k&#937; (series)</text>
  </g>

  <!-- Wire from R2 left end through Pin/cap junction out to Pin label -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="240" y1="180" x2="155" y2="180"/>
  </g>
  <g fill="currentColor" text-anchor="end">
    <text x="150" y="184">Pin</text>
  </g>

  <!-- Pin/cap junction dot -->
  <g fill="currentColor">
    <circle cx="210" cy="180" r="3"/>
  </g>

  <!-- Cap branch: down from Pin junction through C to GND -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="210" y1="180" x2="210" y2="220"/>
    <line x1="210" y1="242" x2="210" y2="290"/>
  </g>
  <!-- Capacitor plates -->
  <g stroke="currentColor" fill="none" stroke-width="3">
    <line x1="198" y1="225" x2="222" y2="225"/>
    <line x1="198" y1="237" x2="222" y2="237"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="230" y="236">100 nF</text>
  </g>

  <!-- GND under the cap -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="190" y1="290" x2="230" y2="290"/>
    <line x1="198" y1="302" x2="222" y2="302"/>
    <line x1="205" y1="314" x2="215" y2="314"/>
  </g>

  <!-- GND under the switch -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="350" y1="290" x2="390" y2="290"/>
    <line x1="358" y1="302" x2="382" y2="302"/>
    <line x1="365" y1="314" x2="375" y2="314"/>
  </g>
</svg>

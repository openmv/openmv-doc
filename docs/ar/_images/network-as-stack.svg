<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 620"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>A neural network as a stack of layers. The input tensor enters at the top with shape (192, 192, 3) and flows down through nine labelled boxes -- Input image, two Conv + ReLU layers, MaxPool, two more Conv + ReLU layers, Global average pool, Fully connected, and Class scores -- with the tensor shape annotated on the right of each arrow. Each layer transforms the tensor's dimensions; the output at the bottom is a 1000-element class score vector.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="160" y="30">layers</text>
    <text x="380" y="30">tensor shape</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="60" y="55" width="200" height="40" rx="3"/>
  </g>
  <text x="160" y="80" font-size="13" fill="currentColor" text-anchor="middle">Input image</text>
  <text x="380" y="80" font-size="12" fill="currentColor" text-anchor="middle">(192, 192, 3)</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="160" y1="95" x2="160" y2="115"/>
    <polygon points="155,110 160,120 165,110" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="60" y="120" width="200" height="40" rx="3"/>
  </g>
  <text x="160" y="145" font-size="13" fill="currentColor" text-anchor="middle">Conv 3x3 + ReLU</text>
  <text x="380" y="145" font-size="12" fill="currentColor" text-anchor="middle">(96, 96, 32)</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="160" y1="160" x2="160" y2="180"/>
    <polygon points="155,175 160,185 165,175" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="60" y="185" width="200" height="40" rx="3"/>
  </g>
  <text x="160" y="210" font-size="13" fill="currentColor" text-anchor="middle">Conv 3x3 + ReLU</text>
  <text x="380" y="210" font-size="12" fill="currentColor" text-anchor="middle">(48, 48, 64)</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="160" y1="225" x2="160" y2="245"/>
    <polygon points="155,240 160,250 165,240" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="60" y="250" width="200" height="40" rx="3"/>
  </g>
  <text x="160" y="275" font-size="13" fill="currentColor" text-anchor="middle">MaxPool 2x2</text>
  <text x="380" y="275" font-size="12" fill="currentColor" text-anchor="middle">(24, 24, 64)</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="160" y1="290" x2="160" y2="310"/>
    <polygon points="155,305 160,315 165,305" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="60" y="315" width="200" height="40" rx="3"/>
  </g>
  <text x="160" y="340" font-size="13" fill="currentColor" text-anchor="middle">Conv 3x3 + ReLU</text>
  <text x="380" y="340" font-size="12" fill="currentColor" text-anchor="middle">(12, 12, 128)</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="160" y1="355" x2="160" y2="375"/>
    <polygon points="155,370 160,380 165,370" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="60" y="380" width="200" height="40" rx="3"/>
  </g>
  <text x="160" y="405" font-size="13" fill="currentColor" text-anchor="middle">Conv 3x3 + ReLU</text>
  <text x="380" y="405" font-size="12" fill="currentColor" text-anchor="middle">(6, 6, 256)</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="160" y1="420" x2="160" y2="440"/>
    <polygon points="155,435 160,445 165,435" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="60" y="445" width="200" height="40" rx="3"/>
  </g>
  <text x="160" y="470" font-size="13" fill="currentColor" text-anchor="middle">Global average pool</text>
  <text x="380" y="470" font-size="12" fill="currentColor" text-anchor="middle">(256,)</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="160" y1="485" x2="160" y2="505"/>
    <polygon points="155,500 160,510 165,500" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="60" y="510" width="200" height="40" rx="3"/>
  </g>
  <text x="160" y="535" font-size="13" fill="currentColor" text-anchor="middle">Fully connected</text>
  <text x="380" y="535" font-size="12" fill="currentColor" text-anchor="middle">(1000,)</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="160" y1="550" x2="160" y2="570"/>
    <polygon points="155,565 160,575 165,565" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-dasharray="4 3">
    <rect x="60" y="575" width="200" height="40" rx="3"/>
  </g>
  <text x="160" y="600" font-size="13" fill="currentColor" text-anchor="middle">Class scores</text>
  <text x="380" y="600" font-size="12" fill="currentColor" text-anchor="middle">(1000,)</text>
</svg>

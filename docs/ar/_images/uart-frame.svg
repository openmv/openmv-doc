<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>UART frame: start bit, eight data bits, one stop bit</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Y-axis labels -->
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="60" y="84">high</text>
    <text x="60" y="184">low</text>
  </g>

  <!-- Idle line on the left (high before start) -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <line x1="70" y1="80" x2="100" y2="80"/>
  </g>

  <!-- Frame waveform: bit period = 50 px. Bits in order: start (0), d0..d7 (1,0,1,1,0,0,1,0), stop (1). -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="100,80 100,180 150,180 150,80 200,80 200,180 250,180 250,80 300,80 350,80 350,180 400,180 450,180 450,80 500,80 500,180 550,180 550,80 600,80 650,80"/>
  </g>

  <!-- Bit boundary tick marks on the time axis -->
  <g stroke="currentColor" fill="none" stroke-width="1" opacity="0.5" stroke-dasharray="3 3">
    <line x1="100" y1="60" x2="100" y2="210"/>
    <line x1="150" y1="60" x2="150" y2="210"/>
    <line x1="200" y1="60" x2="200" y2="210"/>
    <line x1="250" y1="60" x2="250" y2="210"/>
    <line x1="300" y1="60" x2="300" y2="210"/>
    <line x1="350" y1="60" x2="350" y2="210"/>
    <line x1="400" y1="60" x2="400" y2="210"/>
    <line x1="450" y1="60" x2="450" y2="210"/>
    <line x1="500" y1="60" x2="500" y2="210"/>
    <line x1="550" y1="60" x2="550" y2="210"/>
    <line x1="600" y1="60" x2="600" y2="210"/>
    <line x1="650" y1="60" x2="650" y2="210"/>
  </g>

  <!-- Bit labels -->
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="middle">
    <text x="125" y="232">start</text>
    <text x="175" y="232">d0</text>
    <text x="225" y="232">d1</text>
    <text x="275" y="232">d2</text>
    <text x="325" y="232">d3</text>
    <text x="375" y="232">d4</text>
    <text x="425" y="232">d5</text>
    <text x="475" y="232">d6</text>
    <text x="525" y="232">d7</text>
    <text x="575" y="232">stop</text>
  </g>

  <!-- Bit period annotation: single arrow across one bit -->
  <g stroke="currentColor" fill="none" stroke-width="1" opacity="0.7">
    <line x1="175" y1="250" x2="225" y2="250"/>
    <line x1="175" y1="246" x2="175" y2="254"/>
    <line x1="225" y1="246" x2="225" y2="254"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="200" y="268">1 bit = 1 / baud</text>
  </g>

  <!-- Idle line on the right (high after stop) -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <line x1="650" y1="80" x2="680" y2="80"/>
  </g>
</svg>

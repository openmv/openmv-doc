<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 30 560 230"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>Bilinear debayer interpolation at a green pixel in a red-green row</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- 3x3 Bayer neighbourhood centred on a green pixel in a red-green row.
       Cells 60x60; grid at x=190..370, y=60..240.
       Layout:
         G B G
         R G R
         G B G  -->

  <rect x="190" y="60" width="60" height="60" fill="#5a5"/>
  <rect x="250" y="60" width="60" height="60" fill="#36c"/>
  <rect x="310" y="60" width="60" height="60" fill="#5a5"/>

  <rect x="190" y="120" width="60" height="60" fill="#c33"/>
  <rect x="250" y="120" width="60" height="60" fill="#5a5"/>
  <rect x="310" y="120" width="60" height="60" fill="#c33"/>

  <rect x="190" y="180" width="60" height="60" fill="#5a5"/>
  <rect x="250" y="180" width="60" height="60" fill="#36c"/>
  <rect x="310" y="180" width="60" height="60" fill="#5a5"/>

  <g stroke="currentColor" stroke-width="1" fill="none" opacity="0.5">
    <line x1="190" y1="60" x2="370" y2="60"/>
    <line x1="190" y1="120" x2="370" y2="120"/>
    <line x1="190" y1="180" x2="370" y2="180"/>
    <line x1="190" y1="240" x2="370" y2="240"/>
    <line x1="190" y1="60" x2="190" y2="240"/>
    <line x1="250" y1="60" x2="250" y2="240"/>
    <line x1="310" y1="60" x2="310" y2="240"/>
    <line x1="370" y1="60" x2="370" y2="240"/>
  </g>

  <g fill="white" font-weight="bold" text-anchor="middle">
    <text x="220" y="95">G</text>
    <text x="280" y="95">B</text>
    <text x="340" y="95">G</text>
    <text x="220" y="155">R</text>
    <text x="280" y="155">G</text>
    <text x="340" y="155">R</text>
    <text x="220" y="215">G</text>
    <text x="280" y="215">B</text>
    <text x="340" y="215">G</text>
  </g>

  <!-- Arrows: missing R from L/R R cells; missing B from T/B B cells. -->
  <g stroke="white" stroke-width="2" fill="none">
    <line x1="230" y1="150" x2="265" y2="150"/>
    <polyline points="260,145 265,150 260,155"/>
    <line x1="330" y1="150" x2="295" y2="150"/>
    <polyline points="300,145 295,150 300,155"/>
    <line x1="280" y1="100" x2="280" y2="135"/>
    <polyline points="275,130 280,135 285,130"/>
    <line x1="280" y1="200" x2="280" y2="165"/>
    <polyline points="275,170 280,165 285,170"/>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>lazy generator pipeline -- values pulled on demand</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrPipe" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Three stage boxes -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="20"  y="40" width="180" height="70" rx="8"/>
    <rect x="270" y="40" width="180" height="70" rx="8"/>
    <rect x="520" y="40" width="180" height="70" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="110" y="70">numbers()</text>
    <text x="360" y="70">squares(source)</text>
    <text x="610" y="70">for v in pipeline</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="110" y="90">yields 0, 1, 2, ...</text>
    <text x="360" y="90">pulls x, yields x * x</text>
    <text x="610" y="90">prints v</text>
  </g>

  <!-- Cycle 1 -->
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="20" y="148">cycle 1</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrPipe)" stroke-dasharray="4 3">
    <line x1="270" y1="140" x2="210" y2="140"/>
    <line x1="520" y1="140" x2="460" y2="140"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.65" text-anchor="middle">
    <text x="240" y="134">pull</text>
    <text x="490" y="134">pull</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrPipe)">
    <line x1="200" y1="170" x2="260" y2="170"/>
    <line x1="450" y1="170" x2="510" y2="170"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="230" y="164">0</text>
    <text x="480" y="164">0</text>
  </g>

  <!-- Cycle 2 -->
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="20" y="218">cycle 2</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrPipe)" stroke-dasharray="4 3">
    <line x1="270" y1="210" x2="210" y2="210"/>
    <line x1="520" y1="210" x2="460" y2="210"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.65" text-anchor="middle">
    <text x="240" y="204">pull</text>
    <text x="490" y="204">pull</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrPipe)">
    <line x1="200" y1="240" x2="260" y2="240"/>
    <line x1="450" y1="240" x2="510" y2="240"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="230" y="234">1</text>
    <text x="480" y="234">1</text>
  </g>

  <!-- Cycle 3 -->
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="20" y="288">cycle 3</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrPipe)" stroke-dasharray="4 3">
    <line x1="270" y1="280" x2="210" y2="280"/>
    <line x1="520" y1="280" x2="460" y2="280"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.65" text-anchor="middle">
    <text x="240" y="274">pull</text>
    <text x="490" y="274">pull</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrPipe)">
    <line x1="200" y1="310" x2="260" y2="310"/>
    <line x1="450" y1="310" x2="510" y2="310"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="230" y="304">2</text>
    <text x="480" y="304">4</text>
  </g>

  <!-- ellipsis -->
  <g fill="currentColor" font-size="14" opacity="0.6" text-anchor="middle">
    <text x="230" y="345">...</text>
    <text x="480" y="345">...</text>
  </g>

  <!-- legend -->
  <g fill="currentColor" font-size="12" opacity="0.75" text-anchor="middle">
    <text x="360" y="380">dashed arrow = next() pull request; solid arrow = the yielded value travelling back</text>
  </g>
</svg>

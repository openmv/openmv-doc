<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>switch bounce: contact chatter on a button press</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrBn" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- X-axis (time) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrBn)">
    <line x1="80" y1="240" x2="575" y2="240"/>
  </g>
  <g fill="currentColor">
    <text x="586" y="244">t</text>
  </g>

  <!-- Y-axis (voltage) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrBn)">
    <line x1="80" y1="240" x2="80" y2="55"/>
  </g>
  <g fill="currentColor" text-anchor="end">
    <text x="74" y="50">V</text>
  </g>

  <!-- HIGH / LOW reference dashed lines -->
  <g stroke="currentColor" fill="none" stroke-width="1" stroke-dasharray="3 3" opacity="0.35">
    <line x1="80" y1="80" x2="560" y2="80"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="74" y="84">HIGH</text>
    <text x="74" y="244">LOW</text>
  </g>

  <!-- Bouncing trace: HIGH, then a burst of bounces, then settled LOW -->
  <g stroke="currentColor" fill="none" stroke-width="2.2">
    <polyline points="
      80,80
      180,80
      180,240
      198,240
      198,80
      212,80
      212,240
      232,240
      232,80
      240,80
      240,240
      258,240
      258,80
      262,80
      262,240
      560,240
    "/>
  </g>

  <!-- Bracket marking the bouncing region -->
  <g stroke="currentColor" fill="none" stroke-width="1.2" opacity="0.7">
    <line x1="180" y1="45" x2="262" y2="45"/>
    <line x1="180" y1="45" x2="180" y2="55"/>
    <line x1="262" y1="45" x2="262" y2="55"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="middle">
    <text x="221" y="36">bouncing</text>
  </g>

  <!-- Phase labels along the trace -->
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="130" y="74">switch open</text>
    <text x="410" y="262">switch closed (settled)</text>
  </g>
</svg>

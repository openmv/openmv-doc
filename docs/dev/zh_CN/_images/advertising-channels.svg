<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>The 40 BLE channels on the 2.4 GHz band, with the three advertising channels highlighted</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Frequency axis line -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="40" y1="140" x2="720" y2="140"/>
  </g>

  <!-- Tick marks at start, mid, end -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="40" y1="135" x2="40" y2="145"/>
    <line x1="380" y1="135" x2="380" y2="145"/>
    <line x1="720" y1="135" x2="720" y2="145"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11">
    <text x="40" y="160">2402 MHz</text>
    <text x="380" y="160">2440 MHz</text>
    <text x="720" y="160">2480 MHz</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="380" y="178">2.4 GHz ISM band</text>
  </g>

  <!-- 40 channel slots: each ~17px wide, channels indexed 0-39, advertising are at 0, 12, 39 -->
  <!-- Slot width: (720-40)/40 = 17px; first centre at 40+8.5 = 48.5, increments of 17 -->
  <!-- Data channels: small thin rectangles above the frequency axis -->
  <g fill="currentColor" opacity="0.45">
    <!-- 0..39, skipping adv ch 37,38,39 which are physical positions 0, 12, 39 in BLE PHY mapping
         Bluetooth maps adv channels to physical positions: 37@2402, 38@2426, 39@2480 -->
    <!-- positions for 37 of the 40 channels (data) -->
    <!-- physical 0 -> adv 37; physical 1..11 -> data; physical 12 -> adv 38;
         physical 13..38 -> data; physical 39 -> adv 39 -->
    <!-- data ch (small bars at 80-130 y) -->
    <rect x="62.5"  y="100" width="11" height="30"/>
    <rect x="79.5"  y="100" width="11" height="30"/>
    <rect x="96.5"  y="100" width="11" height="30"/>
    <rect x="113.5" y="100" width="11" height="30"/>
    <rect x="130.5" y="100" width="11" height="30"/>
    <rect x="147.5" y="100" width="11" height="30"/>
    <rect x="164.5" y="100" width="11" height="30"/>
    <rect x="181.5" y="100" width="11" height="30"/>
    <rect x="198.5" y="100" width="11" height="30"/>
    <rect x="215.5" y="100" width="11" height="30"/>
    <rect x="232.5" y="100" width="11" height="30"/>
    <!-- gap for adv ch 38 at position 12 -->
    <rect x="266.5" y="100" width="11" height="30"/>
    <rect x="283.5" y="100" width="11" height="30"/>
    <rect x="300.5" y="100" width="11" height="30"/>
    <rect x="317.5" y="100" width="11" height="30"/>
    <rect x="334.5" y="100" width="11" height="30"/>
    <rect x="351.5" y="100" width="11" height="30"/>
    <rect x="368.5" y="100" width="11" height="30"/>
    <rect x="385.5" y="100" width="11" height="30"/>
    <rect x="402.5" y="100" width="11" height="30"/>
    <rect x="419.5" y="100" width="11" height="30"/>
    <rect x="436.5" y="100" width="11" height="30"/>
    <rect x="453.5" y="100" width="11" height="30"/>
    <rect x="470.5" y="100" width="11" height="30"/>
    <rect x="487.5" y="100" width="11" height="30"/>
    <rect x="504.5" y="100" width="11" height="30"/>
    <rect x="521.5" y="100" width="11" height="30"/>
    <rect x="538.5" y="100" width="11" height="30"/>
    <rect x="555.5" y="100" width="11" height="30"/>
    <rect x="572.5" y="100" width="11" height="30"/>
    <rect x="589.5" y="100" width="11" height="30"/>
    <rect x="606.5" y="100" width="11" height="30"/>
    <rect x="623.5" y="100" width="11" height="30"/>
    <rect x="640.5" y="100" width="11" height="30"/>
    <rect x="657.5" y="100" width="11" height="30"/>
    <rect x="674.5" y="100" width="11" height="30"/>
    <rect x="691.5" y="100" width="11" height="30"/>
  </g>

  <!-- 3 advertising channels: taller bars, dark fill -->
  <g fill="currentColor">
    <rect x="45.5"  y="70" width="11" height="60"/>
    <rect x="249.5" y="70" width="11" height="60"/>
    <rect x="703.5" y="70" width="11" height="60"/>
  </g>

  <!-- Labels for adv channels -->
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="51"  y="60">37</text>
    <text x="255" y="60">38</text>
    <text x="709" y="60">39</text>
  </g>

  <!-- Annotation: advertising channels -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="380" y="30">3 advertising channels (37, 38, 39)</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1">
    <line x1="220" y1="35" x2="55" y2="68"/>
    <line x1="380" y1="35" x2="255" y2="68"/>
    <line x1="540" y1="35" x2="709" y2="68"/>
  </g>

  <!-- Annotation: data channels -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="380" y="210">37 data channels</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="380" y="225">connections hop between these</text>
  </g>
</svg>

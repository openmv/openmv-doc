<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Voltage divider made of two resistors in series</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Vin label at top -->
  <g fill="currentColor" text-anchor="middle">
    <text x="160" y="30">Vin</text>
  </g>

  <!-- Vin wire down to top of R1 -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="160" y1="40" x2="160" y2="70"/>
  </g>

  <!-- R1 zigzag -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <polyline points="160,70 148,80 172,95 148,110 172,125 148,140 160,150"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="180" y="114">R1</text>
  </g>

  <!-- Wire to V_out junction -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="160" y1="150" x2="160" y2="180"/>
  </g>

  <!-- V_out tap to the right -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="160" y1="180" x2="220" y2="180"/>
  </g>
  <g fill="currentColor">
    <text x="226" y="184">V_out</text>
  </g>

  <!-- Junction dot -->
  <g fill="currentColor">
    <circle cx="160" cy="180" r="3"/>
  </g>

  <!-- Wire to top of R2 -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="160" y1="180" x2="160" y2="210"/>
  </g>

  <!-- R2 zigzag -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <polyline points="160,210 148,220 172,235 148,250 172,265 148,280 160,290"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="180" y="254">R2</text>
  </g>

  <!-- Wire to GND -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="160" y1="290" x2="160" y2="310"/>
  </g>

  <!-- GND symbol -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="140" y1="310" x2="180" y2="310"/>
    <line x1="148" y1="322" x2="172" y2="322"/>
    <line x1="155" y1="334" x2="165" y2="334"/>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>comprehension anatomy</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- The comprehension itself -->
  <g fill="currentColor" font-size="20" text-anchor="middle">
    <text x="330" y="80">[  f(x)   for  x  in  xs   if  cond  ]</text>
  </g>

  <!-- annotations -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" opacity="0.7">
    <line x1="183" y1="95" x2="183" y2="135"/>
    <line x1="350" y1="95" x2="350" y2="135"/>
    <line x1="510" y1="95" x2="510" y2="135"/>
  </g>

  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.85">
    <text x="183" y="155">expression</text>
    <text x="183" y="172" opacity="0.7">produces each item</text>
  </g>

  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.85">
    <text x="350" y="155">for clause</text>
    <text x="350" y="172" opacity="0.7">walks the iterable</text>
  </g>

  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.85">
    <text x="510" y="155">if clause (optional)</text>
    <text x="510" y="172" opacity="0.7">filters items out</text>
  </g>

  <!-- reading order -->
  <g fill="currentColor" font-size="12" opacity="0.7" text-anchor="middle">
    <text x="330" y="220">runs as: for each x in xs, if cond, evaluate f(x), keep result</text>
  </g>
</svg>

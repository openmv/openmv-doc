<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>if / elif / else flow</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrIf" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- First decision diamond: if -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <polygon points="230,20 320,55 230,90 140,55"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="230" y="59">n &gt; 0 ?</text>
  </g>

  <!-- True branch from first diamond -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrIf)">
    <line x1="320" y1="55" x2="395" y2="55"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="335" y="48">True</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="400" y="35" width="120" height="40" rx="5"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="460" y="59">"positive"</text>
  </g>

  <!-- False branch down to second diamond -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrIf)">
    <line x1="230" y1="90" x2="230" y2="125"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="240" y="110">False</text>
  </g>

  <!-- Second decision diamond: elif -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <polygon points="230,130 320,165 230,200 140,165"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="230" y="169">n &lt; 0 ?</text>
  </g>

  <!-- True branch from second diamond -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrIf)">
    <line x1="320" y1="165" x2="395" y2="165"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="335" y="158">True</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="400" y="145" width="120" height="40" rx="5"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="460" y="169">"negative"</text>
  </g>

  <!-- False branch down to else -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrIf)">
    <line x1="230" y1="200" x2="230" y2="235"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="240" y="220">False</text>
  </g>

  <!-- else body -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="170" y="240" width="120" height="40" rx="5"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="230" y="264">"zero"</text>
  </g>

  <!-- Labels for if / elif / else on the left -->
  <g fill="currentColor" text-anchor="end" font-size="12" opacity="0.6">
    <text x="120" y="59" >if</text>
    <text x="120" y="169">elif</text>
    <text x="160" y="264">else</text>
  </g>
</svg>

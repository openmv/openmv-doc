<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>CAN wired-AND bus: termination pulls the line recessive; any node can pull it dominant through its open-collector output</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Vcc -->
  <g fill="currentColor" text-anchor="middle">
    <text x="80" y="30">Vcc</text>
  </g>

  <!-- Vcc wire to top of termination R -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="80" y1="40" x2="80" y2="70"/>
  </g>

  <!-- Termination / pull-up resistor -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <polyline points="80,70 68,80 92,95 68,110 92,125 68,140 80,150"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="100" y="114">term.</text>
  </g>

  <!-- Wire from R down to bus -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="80" y1="150" x2="80" y2="200"/>
  </g>

  <!-- The bus line (extends past the terminator's tap on the left) -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="40" y1="200" x2="720" y2="200"/>
  </g>
  <g fill="currentColor">
    <text x="728" y="204">BUS</text>
  </g>

  <!-- Junction dots on bus -->
  <g fill="currentColor">
    <circle cx="80" cy="200" r="3"/>
    <circle cx="230" cy="200" r="3"/>
    <circle cx="400" cy="200" r="3"/>
    <circle cx="570" cy="200" r="3"/>
  </g>

  <!-- ===== Node A at x=230 ===== -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="230" y1="200" x2="230" y2="225"/>
  </g>
  <!-- Diode body (anode top / cathode bottom, current flows down to GND) -->
  <g fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
    <polygon points="218,225 242,225 230,250"/>
  </g>
  <!-- Diode cathode bar -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <line x1="216" y1="254" x2="244" y2="254"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="230" y1="254" x2="230" y2="278"/>
  </g>
  <g fill="currentColor">
    <circle cx="230" cy="280" r="3"/>
  </g>
  <!-- Switch lever (open) -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="230" y1="280" x2="248" y2="312"/>
  </g>
  <g fill="currentColor">
    <circle cx="230" cy="318" r="3"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="230" y1="320" x2="230" y2="340"/>
  </g>
  <!-- GND under Node A -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="210" y1="340" x2="250" y2="340"/>
    <line x1="218" y1="352" x2="242" y2="352"/>
    <line x1="225" y1="364" x2="235" y2="364"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85">
    <text x="258" y="300">Node A</text>
  </g>

  <!-- ===== Node B at x=400 ===== -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="400" y1="200" x2="400" y2="225"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
    <polygon points="388,225 412,225 400,250"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="2">
    <line x1="386" y1="254" x2="414" y2="254"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="400" y1="254" x2="400" y2="278"/>
  </g>
  <g fill="currentColor">
    <circle cx="400" cy="280" r="3"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="400" y1="280" x2="418" y2="312"/>
  </g>
  <g fill="currentColor">
    <circle cx="400" cy="318" r="3"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="400" y1="320" x2="400" y2="340"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="380" y1="340" x2="420" y2="340"/>
    <line x1="388" y1="352" x2="412" y2="352"/>
    <line x1="395" y1="364" x2="405" y2="364"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85">
    <text x="428" y="300">Node B</text>
  </g>

  <!-- ===== Node C at x=570 ===== -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="570" y1="200" x2="570" y2="225"/>
  </g>
  <g fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
    <polygon points="558,225 582,225 570,250"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="2">
    <line x1="556" y1="254" x2="584" y2="254"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="570" y1="254" x2="570" y2="278"/>
  </g>
  <g fill="currentColor">
    <circle cx="570" cy="280" r="3"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="570" y1="280" x2="588" y2="312"/>
  </g>
  <g fill="currentColor">
    <circle cx="570" cy="318" r="3"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="570" y1="320" x2="570" y2="340"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="550" y1="340" x2="590" y2="340"/>
    <line x1="558" y1="352" x2="582" y2="352"/>
    <line x1="565" y1="364" x2="575" y2="364"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85">
    <text x="598" y="300">Node C</text>
  </g>

  <!-- Caption -->
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="380" y="394">all switches open: bus recessive (high); any switch closed: bus dominant (low)</text>
  </g>
</svg>

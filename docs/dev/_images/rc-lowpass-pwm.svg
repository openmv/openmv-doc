<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>RC low-pass filter averaging a PWM signal into a DC voltage</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- PWM pin label -->
  <g fill="currentColor" text-anchor="end">
    <text x="60" y="124">PWM pin</text>
  </g>

  <!-- Wire from PWM pin to R -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="65" y1="120" x2="130" y2="120"/>
  </g>

  <!-- R horizontal zigzag -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <polyline points="130,120 140,108 155,132 170,108 185,132 200,108 210,120"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="170" y="100">R</text>
  </g>

  <!-- Wire from R to junction -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="210" y1="120" x2="280" y2="120"/>
  </g>

  <!-- Junction dot -->
  <g fill="currentColor">
    <circle cx="280" cy="120" r="3"/>
  </g>

  <!-- Output tap to V_out -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="280" y1="120" x2="380" y2="120"/>
  </g>
  <g fill="currentColor">
    <text x="386" y="124">V_out</text>
  </g>

  <!-- Wire down to C top -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="280" y1="120" x2="280" y2="170"/>
  </g>

  <!-- C plates -->
  <g stroke="currentColor" fill="none" stroke-width="3">
    <line x1="268" y1="175" x2="292" y2="175"/>
    <line x1="268" y1="187" x2="292" y2="187"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="300" y="184">C</text>
  </g>

  <!-- Wire from C to GND -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="280" y1="192" x2="280" y2="230"/>
  </g>

  <!-- GND symbol -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="260" y1="230" x2="300" y2="230"/>
    <line x1="268" y1="242" x2="292" y2="242"/>
    <line x1="275" y1="254" x2="285" y2="254"/>
  </g>
</svg>

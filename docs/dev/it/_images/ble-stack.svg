<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 0 680 340"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>The BLE stack: physical, link layer, GAP, GATT, application</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Application (top) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="120" y="30" width="320" height="50"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="280" y="55">application</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="280" y="72">what the bytes mean (heart rate, battery, ...)</text>
  </g>

  <!-- GATT -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="120" y="90" width="320" height="50"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="280" y="115">GATT</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="280" y="132">services, characteristics, read/write/notify</text>
  </g>

  <!-- GAP -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="120" y="150" width="320" height="50"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="280" y="175">GAP</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="280" y="192">advertising, scanning, connections, pairing</text>
  </g>

  <!-- Link layer -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="120" y="210" width="320" height="50"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="280" y="235">link layer</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="280" y="252">packets, addressing, retransmission, encryption</text>
  </g>

  <!-- Physical (bottom) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="120" y="270" width="320" height="50"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="280" y="295">physical</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="280" y="312">2.4 GHz radio, 40 channels</text>
  </g>

  <!-- Right-side arrow: "what we build" pointing up -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="465" y1="310" x2="465" y2="40"/>
    <polygon points="461,42 469,42 465,28" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="475" y="180" text-anchor="start">what we build</text>
  </g>

  <!-- Left-side arrow: "what is provided" pointing down -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="95" y1="40" x2="95" y2="310"/>
    <polygon points="91,308 99,308 95,322" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="85" y="180" text-anchor="end">what is provided</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Pull (read) versus push (notify) at the GATT layer</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Divider line down the middle -->
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,4" opacity="0.4">
    <line x1="400" y1="20" x2="400" y2="420"/>
  </g>

  <!-- Left panel: READ (pull) -->
  <g fill="currentColor" font-size="14" text-anchor="middle">
    <text x="200" y="40">Read (client pulls)</text>
  </g>

  <!-- Two parties: client on left, server on right -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="40" y="60" width="80" height="36"/>
    <rect x="280" y="60" width="80" height="36"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="80" y="83">client</text>
    <text x="320" y="83">server</text>
  </g>

  <!-- Vertical lifelines -->
  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.4">
    <line x1="80" y1="96" x2="80" y2="400"/>
    <line x1="320" y1="96" x2="320" y2="400"/>
  </g>

  <!-- Read 1: request out -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="80" y1="130" x2="320" y2="130"/>
    <polygon points="312,126 312,134 320,130" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="200" y="124">read</text>
  </g>

  <!-- Read 1: reply -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="320" y1="160" x2="80" y2="160"/>
    <polygon points="88,156 88,164 80,160" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="200" y="154">value</text>
  </g>

  <!-- Read 2 -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="80" y1="220" x2="320" y2="220"/>
    <polygon points="312,216 312,224 320,220" fill="currentColor"/>
    <line x1="320" y1="250" x2="80" y2="250"/>
    <polygon points="88,246 88,254 80,250" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="200" y="214">read</text>
    <text x="200" y="244">value</text>
  </g>

  <!-- Read 3 -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="80" y1="310" x2="320" y2="310"/>
    <polygon points="312,306 312,314 320,310" fill="currentColor"/>
    <line x1="320" y1="340" x2="80" y2="340"/>
    <polygon points="88,336 88,344 80,340" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="200" y="304">read</text>
    <text x="200" y="334">value</text>
  </g>

  <!-- Right panel: NOTIFY (push) -->
  <g fill="currentColor" font-size="14" text-anchor="middle">
    <text x="600" y="40">Notify (server pushes)</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="440" y="60" width="80" height="36"/>
    <rect x="680" y="60" width="80" height="36"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="480" y="83">client</text>
    <text x="720" y="83">server</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.4">
    <line x1="480" y1="96" x2="480" y2="400"/>
    <line x1="720" y1="96" x2="720" y2="400"/>
  </g>

  <!-- Subscribe once -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="480" y1="130" x2="720" y2="130"/>
    <polygon points="712,126 712,134 720,130" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="600" y="124">subscribe</text>
  </g>

  <!-- Three pushes -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="720" y1="190" x2="480" y2="190"/>
    <polygon points="488,186 488,194 480,190" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="600" y="184">notify (value 1)</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="720" y1="265" x2="480" y2="265"/>
    <polygon points="488,261 488,269 480,265" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="600" y="259">notify (value 2)</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="720" y1="345" x2="480" y2="345"/>
    <polygon points="488,341 488,349 480,345" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="600" y="339">notify (value 3)</text>
  </g>

  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="600" y="395">server picks when to push</text>
  </g>
</svg>

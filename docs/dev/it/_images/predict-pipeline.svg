<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Horizontal flow of five labelled boxes: Image input, Pre-process labelled with Normalization, Engine labelled TFLM/STAI, Post-process labelled postprocess=, and Result. The three middle boxes are tagged below with their control regime: Pre-process and Post-process are user-controllable; Engine is automatic. A caption at the bottom notes that two stages take parameters the script controls while the engine in the middle is fixed by the cam.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.6">
    <text x="380" y="25">Model.predict(inputs)</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="20" y="70" width="90" height="60" rx="3"/>
  </g>
  <text x="65" y="95" font-size="13" fill="currentColor" text-anchor="middle">Image</text>
  <text x="65" y="115" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.7">input</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="110" y1="100" x2="155" y2="100"/>
    <polygon points="150,95 160,100 150,105" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="160" y="70" width="140" height="60" rx="3"/>
  </g>
  <text x="230" y="95" font-size="13" fill="currentColor" text-anchor="middle">Pre-process</text>
  <text x="230" y="115" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.7">Normalization</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="300" y1="100" x2="335" y2="100"/>
    <polygon points="330,95 340,100 330,105" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="340" y="70" width="120" height="60" rx="3"/>
  </g>
  <text x="400" y="95" font-size="13" fill="currentColor" text-anchor="middle">Engine</text>
  <text x="400" y="115" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.7">TFLM / STAI</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="460" y1="100" x2="495" y2="100"/>
    <polygon points="490,95 500,100 490,105" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="500" y="70" width="140" height="60" rx="3"/>
  </g>
  <text x="570" y="95" font-size="13" fill="currentColor" text-anchor="middle">Post-process</text>
  <text x="570" y="115" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.7">postprocess=</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="640" y1="100" x2="675" y2="100"/>
    <polygon points="670,95 680,100 670,105" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="680" y="70" width="70" height="60" rx="3"/>
  </g>
  <text x="715" y="105" font-size="13" fill="currentColor" text-anchor="middle">Result</text>

  <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3 2" opacity="0.5">
    <line x1="230" y1="140" x2="230" y2="155"/>
    <line x1="400" y1="140" x2="400" y2="155"/>
    <line x1="570" y1="140" x2="570" y2="155"/>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="230" y="170">user-controllable</text>
    <text x="400" y="170">automatic</text>
    <text x="570" y="170">user-controllable</text>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.55">
    <text x="380" y="210">two stages take parameters the script controls;</text>
    <text x="380" y="226">the engine in the middle is fixed by the cam</text>
  </g>
</svg>

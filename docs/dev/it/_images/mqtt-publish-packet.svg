<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>The byte layout of a minimal MQTT PUBLISH packet sending the payload "ok" to topic "a/b": a 0x30 fixed-header byte, a 0x07 remaining-length byte, a two-byte topic-length 00 03, three bytes of topic, and two bytes of payload.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Byte boxes (9 bytes at 60px wide each, total 540, centred on 760) -->
  <!-- Start x = (760 - 540) / 2 = 110 -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="110" y="110" width="60" height="60"/>
    <rect x="170" y="110" width="60" height="60"/>
    <rect x="230" y="110" width="60" height="60"/>
    <rect x="290" y="110" width="60" height="60"/>
    <rect x="350" y="110" width="60" height="60"/>
    <rect x="410" y="110" width="60" height="60"/>
    <rect x="470" y="110" width="60" height="60"/>
    <rect x="530" y="110" width="60" height="60"/>
    <rect x="590" y="110" width="60" height="60"/>
  </g>

  <!-- Byte values (centred in each box) -->
  <g fill="currentColor" font-size="14" text-anchor="middle">
    <text x="140" y="138">0x30</text>
    <text x="200" y="138">0x07</text>
    <text x="260" y="138">0x00</text>
    <text x="320" y="138">0x03</text>
    <text x="380" y="138">'a'</text>
    <text x="440" y="138">'/'</text>
    <text x="500" y="138">'b'</text>
    <text x="560" y="138">'o'</text>
    <text x="620" y="138">'k'</text>
  </g>

  <!-- Byte indices under each box -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.65">
    <text x="140" y="186">[0]</text>
    <text x="200" y="186">[1]</text>
    <text x="260" y="186">[2]</text>
    <text x="320" y="186">[3]</text>
    <text x="380" y="186">[4]</text>
    <text x="440" y="186">[5]</text>
    <text x="500" y="186">[6]</text>
    <text x="560" y="186">[7]</text>
    <text x="620" y="186">[8]</text>
  </g>

  <!-- Section labels above the boxes -->
  <!-- Fixed header: byte 0 (one byte) -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.65">
    <line x1="110" y1="92" x2="170" y2="92"/>
    <line x1="110" y1="86" x2="110" y2="92"/>
    <line x1="170" y1="86" x2="170" y2="92"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="140" y="80">fixed</text>
    <text x="140" y="62" font-size="11" opacity="0.75">PUBLISH</text>
  </g>

  <!-- Remaining length: byte 1 (one byte) -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.65">
    <line x1="170" y1="92" x2="230" y2="92"/>
    <line x1="170" y1="86" x2="170" y2="92"/>
    <line x1="230" y1="86" x2="230" y2="92"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="200" y="80">rem len</text>
    <text x="200" y="62" font-size="11" opacity="0.75">= 7</text>
  </g>

  <!-- Topic length: bytes 2..3 -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.65">
    <line x1="230" y1="92" x2="350" y2="92"/>
    <line x1="230" y1="86" x2="230" y2="92"/>
    <line x1="350" y1="86" x2="350" y2="92"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="290" y="80">topic len</text>
    <text x="290" y="62" font-size="11" opacity="0.75">= 3</text>
  </g>

  <!-- Topic: bytes 4..6 -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.65">
    <line x1="350" y1="92" x2="530" y2="92"/>
    <line x1="350" y1="86" x2="350" y2="92"/>
    <line x1="530" y1="86" x2="530" y2="92"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="440" y="80">topic name</text>
    <text x="440" y="62" font-size="11" opacity="0.75">"a/b"</text>
  </g>

  <!-- Payload: bytes 7..8 -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.65">
    <line x1="530" y1="92" x2="650" y2="92"/>
    <line x1="530" y1="86" x2="530" y2="92"/>
    <line x1="650" y1="86" x2="650" y2="92"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="590" y="80">payload</text>
    <text x="590" y="62" font-size="11" opacity="0.75">"ok"</text>
  </g>

  <!-- Bottom annotation -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="380" y="225">minimal QoS-0 PUBLISH: 9 bytes total, no packet identifier</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>diode and LED schematic symbols</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrLight" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Diode symbol (left) -->
  <g fill="currentColor" text-anchor="middle">
    <text x="160" y="40">diode</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <!-- lead in -->
    <line x1="60" y1="140" x2="120" y2="140"/>
    <!-- lead out -->
    <line x1="200" y1="140" x2="260" y2="140"/>
    <!-- bar (cathode end) -->
    <line x1="190" y1="115" x2="190" y2="165"/>
  </g>
  <!-- Filled triangle pointing right (anode to cathode) -->
  <g fill="currentColor">
    <polygon points="120,115 120,165 190,140"/>
  </g>
  <!-- Anode / cathode labels -->
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="80" y="180">anode (+)</text>
    <text x="240" y="180">cathode (&#8722;)</text>
  </g>
  <!-- current direction arrow -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLight)" opacity="0.7">
    <line x1="85" y1="100" x2="235" y2="100"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="160" y="92">current flows only this way</text>
  </g>

  <!-- LED symbol (right) -->
  <g fill="currentColor" text-anchor="middle">
    <text x="460" y="40">LED</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="360" y1="140" x2="420" y2="140"/>
    <line x1="500" y1="140" x2="560" y2="140"/>
    <line x1="490" y1="115" x2="490" y2="165"/>
  </g>
  <g fill="currentColor">
    <polygon points="420,115 420,165 490,140"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="380" y="180">anode (+)</text>
    <text x="540" y="180">cathode (&#8722;)</text>
  </g>
  <!-- Two outward light arrows above the LED triangle -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLight)">
    <line x1="445" y1="110" x2="465" y2="80"/>
    <line x1="465" y1="115" x2="490" y2="90"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="455" y="65">light</text>
  </g>
</svg>

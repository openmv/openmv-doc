<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>generator yield: caller and generator-body handshake</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrGenY" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <g fill="currentColor" text-anchor="middle">
    <text x="100" y="36">caller</text>
    <text x="380" y="36">generator body</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.6" text-anchor="middle">
    <text x="380" y="52">count_up_to(3)</text>
  </g>

  <!-- Lifelines -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5">
    <line x1="100" y1="60" x2="100" y2="455"/>
    <line x1="380" y1="60" x2="380" y2="455"/>
  </g>

  <!-- Event 1: call -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrGenY)">
    <line x1="100" y1="90" x2="370" y2="90"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="160" y="84">call count_up_to(3)</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="400" y="94">body NOT run yet; returns generator object</text>
  </g>

  <!-- Event 2: first next() -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrGenY)">
    <line x1="100" y1="140" x2="370" y2="140"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="200" y="134">next()</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="400" y="144">run body: i = 0; yield i; pause</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrGenY)">
    <line x1="370" y1="170" x2="110" y2="170"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="240" y="164" text-anchor="end">0</text>
  </g>

  <!-- Event 3: second next() -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrGenY)">
    <line x1="100" y1="220" x2="370" y2="220"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="200" y="214">next()</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="400" y="224">resume; i = 1; yield i; pause</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrGenY)">
    <line x1="370" y1="250" x2="110" y2="250"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="240" y="244" text-anchor="end">1</text>
  </g>

  <!-- Event 4: third next() -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrGenY)">
    <line x1="100" y1="300" x2="370" y2="300"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="200" y="294">next()</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="400" y="304">resume; i = 2; yield i; pause</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrGenY)">
    <line x1="370" y1="330" x2="110" y2="330"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="240" y="324" text-anchor="end">2</text>
  </g>

  <!-- Event 5: fourth next() -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrGenY)">
    <line x1="100" y1="380" x2="370" y2="380"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="200" y="374">next()</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="400" y="384">resume; i = 3 not &lt; n; body ends</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrGenY)" stroke-dasharray="4 3">
    <line x1="370" y1="410" x2="110" y2="410"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="240" y="404" text-anchor="end">StopIteration</text>
  </g>

  <!-- caption -->
  <g fill="currentColor" font-size="12" opacity="0.7" text-anchor="middle">
    <text x="360" y="460">each next() runs body until the next yield; local state (i) survives between pauses</text>
  </g>
</svg>

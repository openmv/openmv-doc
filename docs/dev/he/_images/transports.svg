<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 290"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>An Arduino box on the left and an OpenMV cam box on the right, connected by four labelled transport lines (UART, SPI, I2C, CAN) with the signal names on the left, the transport name in the middle, and the wire count on the right.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Arduino box (left) -->
  <rect x="20" y="30" width="160" height="210" rx="6"
        stroke="currentColor" stroke-width="1.5" fill="none"/>
  <g fill="currentColor" text-anchor="middle">
    <text x="100" y="120" font-size="13">Arduino</text>
    <text x="100" y="143" font-size="11" opacity="0.75">controller</text>
    <text x="100" y="165" font-size="11" opacity="0.65">openmv-arduino-rpc</text>
  </g>

  <!-- OpenMV cam box (right) -->
  <rect x="580" y="30" width="160" height="210" rx="6"
        stroke="currentColor" stroke-width="1.5" fill="none"/>
  <g fill="currentColor" text-anchor="middle">
    <text x="660" y="120" font-size="13">OpenMV Cam</text>
    <text x="660" y="143" font-size="11" opacity="0.75">remote</text>
    <text x="660" y="165" font-size="11" opacity="0.65">rpc.rpc_slave</text>
  </g>

  <!-- Transport lines, 40px apart, centered vertically with margin from box top/bottom -->
  <g stroke="currentColor" stroke-width="1.4" fill="none">
    <line x1="180" y1="80" x2="580" y2="80"/>
    <line x1="180" y1="120" x2="580" y2="120"/>
    <line x1="180" y1="160" x2="580" y2="160"/>
    <line x1="180" y1="200" x2="580" y2="200"/>
  </g>

  <!-- Per-line labels: signal name (start) | transport (middle) | wire count (end), 10px above each line -->
  <g fill="currentColor" font-size="12">
    <!-- UART -->
    <text x="195" y="70" text-anchor="start" opacity="0.75">TX / RX</text>
    <text x="380" y="70" text-anchor="middle">UART</text>
    <text x="565" y="70" text-anchor="end" opacity="0.75">2 wires</text>
    <!-- SPI -->
    <text x="195" y="110" text-anchor="start" opacity="0.75">SCK / MOSI / MISO / CS</text>
    <text x="380" y="110" text-anchor="middle">SPI</text>
    <text x="565" y="110" text-anchor="end" opacity="0.75">4 wires</text>
    <!-- I2C -->
    <text x="195" y="150" text-anchor="start" opacity="0.75">SDA / SCL</text>
    <text x="380" y="150" text-anchor="middle">I2C</text>
    <text x="565" y="150" text-anchor="end" opacity="0.75">2 wires</text>
    <!-- CAN -->
    <text x="195" y="190" text-anchor="start" opacity="0.75">CAN_H / CAN_L</text>
    <text x="380" y="190" text-anchor="middle">CAN</text>
    <text x="565" y="190" text-anchor="end" opacity="0.75">2 wires + transceiver</text>
  </g>

  <!-- Footer caption -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="380" y="272">same call() on the Arduino, same registered callback on the cam, regardless of the wire</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>parallel-plate capacitor (physical construction)</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Top terminal -->
  <g fill="currentColor">
    <circle cx="240" cy="40" r="3"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85">
    <text x="250" y="32">A</text>
  </g>

  <!-- Top lead from terminal down to top plate -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="240" y1="40" x2="240" y2="100"/>
  </g>

  <!-- Top plate (a horizontal line) -->
  <g stroke="currentColor" fill="none" stroke-width="3.5">
    <line x1="140" y1="100" x2="340" y2="100"/>
  </g>
  <g fill="currentColor">
    <text x="350" y="104">+Q</text>
  </g>

  <!-- Dielectric label in the gap between plates -->
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="240" y="128">dielectric (insulator)</text>
  </g>

  <!-- Bottom plate -->
  <g stroke="currentColor" fill="none" stroke-width="3.5">
    <line x1="140" y1="150" x2="340" y2="150"/>
  </g>
  <g fill="currentColor">
    <text x="350" y="154">&#8722;Q</text>
  </g>

  <!-- Bottom lead from bottom plate down to terminal -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="240" y1="150" x2="240" y2="210"/>
  </g>

  <!-- Bottom terminal -->
  <g fill="currentColor">
    <circle cx="240" cy="210" r="3"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85">
    <text x="250" y="224">B</text>
  </g>

  <!-- Voltage V indicator: vertical double arrow on the right side -->
  <g stroke="currentColor" fill="none" stroke-width="1.2" opacity="0.55">
    <line x1="425" y1="56" x2="425" y2="194"/>
  </g>
  <g fill="currentColor" opacity="0.55">
    <polygon points="425,40 420,58 430,58"/>
    <polygon points="425,210 420,192 430,192"/>
  </g>
  <g fill="currentColor" font-size="12" opacity="0.85">
    <text x="440" y="128">V</text>
  </g>

  <!-- Capacitance label below the construction -->
  <g fill="currentColor" font-size="13" opacity="0.85" text-anchor="middle">
    <text x="240" y="252">capacitance C</text>
  </g>
</svg>

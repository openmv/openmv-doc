<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Packet frame layout: header, command, length, header CRC, payload, and data CRC fields</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Header (magic) field: 2 bytes -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="40" y="60" width="100" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="90" y="95">HEADER</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="90" y="140">2 bytes</text>
    <text x="90" y="156">e.g. 0xAA 0x55</text>
  </g>

  <!-- Command field: 1 byte -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="140" y="60" width="80" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="180" y="95">CMD</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="180" y="140">1 byte</text>
    <text x="180" y="156">command code</text>
  </g>

  <!-- Length field: 2 bytes -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="220" y="60" width="90" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="265" y="95">LEN</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="265" y="140">2 bytes</text>
    <text x="265" y="156">payload size</text>
  </g>

  <!-- Header CRC field: 1 byte -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="310" y="60" width="80" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="350" y="95">HCRC</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="350" y="140">1 byte</text>
    <text x="350" y="156">header CRC</text>
  </g>

  <!-- Payload field: N bytes -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="390" y="60" width="200" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="490" y="95">PAYLOAD</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="490" y="140">LEN bytes</text>
    <text x="490" y="156">format depends on CMD</text>
  </g>

  <!-- Data CRC field: 4 bytes -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="590" y="60" width="160" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="670" y="95">DCRC</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="670" y="140">4 bytes</text>
    <text x="670" y="156">data CRC</text>
  </g>
</svg>

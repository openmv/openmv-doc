<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>An Image is a Python wrapper that references a contiguous block of memory containing a small header (width, height, format) followed by the pixel buffer.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="180" y="40" width="400" height="100" rx="6"/>
  </g>
  <g fill="currentColor">
    <text x="380" y="72" text-anchor="middle">image.Image</text>
    <text x="380" y="92" text-anchor="middle" font-size="11" opacity="0.75">Python wrapper</text>
    <text x="380" y="118" text-anchor="middle" font-size="11">.width()   .height()   .format()</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="380" y1="140" x2="380" y2="180"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="376,172 384,172 380,180"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="395" y="165">references</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="180" y="180" width="400" height="40" rx="6"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="12">
    <text x="380" y="205">header  --  width, height, pixel format</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="180" y="220" width="400" height="120" rx="6"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="380" y="245">pixel buffer</text>
    <text x="380" y="263" font-size="11" opacity="0.75">width  x  height  x  bytes-per-pixel</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.55">
    <rect x="230" y="288" width="20" height="20"/>
    <rect x="250" y="288" width="20" height="20"/>
    <rect x="270" y="288" width="20" height="20"/>
    <rect x="290" y="288" width="20" height="20"/>
    <rect x="310" y="288" width="20" height="20"/>
    <rect x="330" y="288" width="20" height="20"/>
    <rect x="350" y="288" width="20" height="20"/>
    <rect x="370" y="288" width="20" height="20"/>
    <rect x="390" y="288" width="20" height="20"/>
    <rect x="410" y="288" width="20" height="20"/>
    <rect x="430" y="288" width="20" height="20"/>
    <rect x="450" y="288" width="20" height="20"/>
    <rect x="470" y="288" width="20" height="20"/>
    <rect x="490" y="288" width="20" height="20"/>
    <rect x="510" y="288" width="20" height="20"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.65">
    <text x="538" y="302">...</text>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.65">
    <text x="380" y="365">on the heap by default;  in the frame buffer when copy_to_fb=True</text>
  </g>
</svg>

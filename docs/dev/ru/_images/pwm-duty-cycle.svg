<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>PWM waveforms at three different duty cycles</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- 25 % duty cycle: three periods, each 120 px wide; high for 30 px (25 %) -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,50 110,50 110,100 200,100 200,50 230,50 230,100 320,100 320,50 350,50 350,100 440,100"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="455" y="78">25 % duty</text>
  </g>

  <!-- 50 % duty cycle: three periods; high for 60 px -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,150 140,150 140,200 200,200 200,150 260,150 260,200 320,200 320,150 380,150 380,200 440,200"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="455" y="178">50 % duty</text>
  </g>

  <!-- 75 % duty cycle: three periods; high for 90 px -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,250 170,250 170,300 200,300 200,250 290,250 290,300 320,300 320,250 410,250 410,300 440,300"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="455" y="278">75 % duty</text>
  </g>
</svg>

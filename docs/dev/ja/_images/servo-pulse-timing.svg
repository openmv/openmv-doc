<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Servo control PWM pulse widths for three positions</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Period annotation at the top -->
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="340" y="35">20 ms period (50 Hz)</text>
  </g>

  <!-- Row 1: 1.0 ms pulse (full left) -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,50 106,50 106,100 600,100"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="620" y="78">1.0 ms (full left)</text>
  </g>

  <!-- Row 2: 1.5 ms pulse (centre) -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,150 119,150 119,200 600,200"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="620" y="178">1.5 ms (centre)</text>
  </g>

  <!-- Row 3: 2.0 ms pulse (full right) -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,250 132,250 132,300 600,300"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="620" y="278">2.0 ms (full right)</text>
  </g>
</svg>

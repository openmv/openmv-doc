<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>List positive and negative indices</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- 6 cells centred at x = 90, 140, 190, 240, 290, 340 -->

  <!-- Top: positive indices 0..5 -->
  <g fill="currentColor" text-anchor="middle" font-size="12" opacity="0.75">
    <text x="90"  y="40">0</text>
    <text x="140" y="40">1</text>
    <text x="190" y="40">2</text>
    <text x="240" y="40">3</text>
    <text x="290" y="40">4</text>
    <text x="340" y="40">5</text>
  </g>

  <!-- Value cells -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="65"  y="60" width="50" height="50" rx="4"/>
    <rect x="115" y="60" width="50" height="50" rx="4"/>
    <rect x="165" y="60" width="50" height="50" rx="4"/>
    <rect x="215" y="60" width="50" height="50" rx="4"/>
    <rect x="265" y="60" width="50" height="50" rx="4"/>
    <rect x="315" y="60" width="50" height="50" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="14">
    <text x="90"  y="93">10</text>
    <text x="140" y="93">20</text>
    <text x="190" y="93">30</text>
    <text x="240" y="93">40</text>
    <text x="290" y="93">50</text>
    <text x="340" y="93">60</text>
  </g>

  <!-- Bottom: negative indices -6..-1 -->
  <g fill="currentColor" text-anchor="middle" font-size="12" opacity="0.6">
    <text x="90"  y="138">-6</text>
    <text x="140" y="138">-5</text>
    <text x="190" y="138">-4</text>
    <text x="240" y="138">-3</text>
    <text x="290" y="138">-2</text>
    <text x="340" y="138">-1</text>
  </g>

  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.6">
    <text x="215" y="170">negative indices</text>
  </g>
</svg>

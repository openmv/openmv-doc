<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>while and for loop flow</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrLoop" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Column titles -->
  <g fill="currentColor" font-size="14" font-weight="bold" text-anchor="middle">
    <text x="150" y="25">while</text>
    <text x="450" y="25">for</text>
  </g>

  <!-- ===== WHILE side (centred at x=150) ===== -->

  <!-- Entry arrow -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLoop)">
    <line x1="150" y1="40" x2="150" y2="70"/>
  </g>

  <!-- Diamond: condition -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <polygon points="150,75 235,120 150,165 65,120"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="150" y="115">condition</text>
    <text x="150" y="131">?</text>
  </g>

  <!-- True branch: down to body -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLoop)">
    <line x1="150" y1="165" x2="150" y2="200"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="160" y="185">True</text>
  </g>

  <!-- Body box -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="95" y="205" width="110" height="40" rx="5"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="150" y="229">body</text>
  </g>

  <!-- Loop back arrow: from body up around the left side back to diamond -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLoop)">
    <path d="M 95 225 L 35 225 L 35 120 L 60 120"/>
  </g>

  <!-- False branch: from diamond right side, down to exit -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLoop)">
    <path d="M 235 120 L 270 120 L 270 290 L 165 290"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="245" y="113">False</text>
  </g>

  <!-- Exit oval -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="95" y="275" width="70" height="30" rx="15"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="130" y="294">exit</text>
  </g>

  <!-- ===== FOR side (centred at x=450) ===== -->

  <!-- Entry arrow -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLoop)">
    <line x1="450" y1="40" x2="450" y2="70"/>
  </g>

  <!-- Diamond: next item available? -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <polygon points="450,75 545,120 450,165 355,120"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="450" y="115">next item</text>
    <text x="450" y="131">?</text>
  </g>

  <!-- Yes branch: down to body -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLoop)">
    <line x1="450" y1="165" x2="450" y2="200"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="460" y="185">yes</text>
  </g>

  <!-- Body: bind variable, run body -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="380" y="205" width="140" height="40" rx="5"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="450" y="221">bind variable,</text>
    <text x="450" y="237">run body</text>
  </g>

  <!-- Loop back arrow: from body up around the left side back to diamond -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLoop)">
    <path d="M 380 225 L 320 225 L 320 120 L 350 120"/>
  </g>

  <!-- No branch (exhausted): from diamond right side, down to exit -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLoop)">
    <path d="M 545 120 L 575 120 L 575 290 L 465 290"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="555" y="113">no</text>
  </g>

  <!-- Exit oval -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="395" y="275" width="70" height="30" rx="15"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="430" y="294">exit</text>
  </g>
</svg>

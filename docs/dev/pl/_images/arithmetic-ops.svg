<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Two horizontal gradient bars at the top representing source images A and B, and below them five result bars showing what add, sub, difference, min, and max produce when applied position by position.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <linearGradient id="gradA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#101010"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="gradB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#101010"/>
    </linearGradient>
    <linearGradient id="gradSub" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#101010"/>
      <stop offset="50%" stop-color="#101010"/>
      <stop offset="100%" stop-color="#dadada"/>
    </linearGradient>
    <linearGradient id="gradDiff" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dadada"/>
      <stop offset="50%" stop-color="#202020"/>
      <stop offset="100%" stop-color="#dadada"/>
    </linearGradient>
    <linearGradient id="gradMin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#101010"/>
      <stop offset="50%" stop-color="#808080"/>
      <stop offset="100%" stop-color="#101010"/>
    </linearGradient>
    <linearGradient id="gradMax" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="50%" stop-color="#808080"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <g fill="currentColor" font-size="12" font-weight="bold" text-anchor="middle">
    <text x="220" y="40">A</text>
    <text x="540" y="40">B</text>
  </g>
  <rect x="120" y="55" width="200" height="50" fill="url(#gradA)" stroke="currentColor" stroke-width="1.2"/>
  <rect x="440" y="55" width="200" height="50" fill="url(#gradB)" stroke="currentColor" stroke-width="1.2"/>

  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="100" y="160">A.add(B)</text>
    <text x="240" y="160">A.sub(B)</text>
    <text x="380" y="160">A.difference(B)</text>
    <text x="520" y="160">A.min(B)</text>
    <text x="660" y="160">A.max(B)</text>
  </g>

  <rect x="40" y="175" width="120" height="50" fill="#f8f8f8" stroke="currentColor" stroke-width="1.2"/>
  <rect x="180" y="175" width="120" height="50" fill="url(#gradSub)" stroke="currentColor" stroke-width="1.2"/>
  <rect x="320" y="175" width="120" height="50" fill="url(#gradDiff)" stroke="currentColor" stroke-width="1.2"/>
  <rect x="460" y="175" width="120" height="50" fill="url(#gradMin)" stroke="currentColor" stroke-width="1.2"/>
  <rect x="600" y="175" width="120" height="50" fill="url(#gradMax)" stroke="currentColor" stroke-width="1.2"/>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="100" y="245">clipped at 255</text>
    <text x="240" y="245">clipped at 0</text>
    <text x="380" y="245">|A - B|</text>
    <text x="520" y="245">min per pixel</text>
    <text x="660" y="245">max per pixel</text>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.6">
    <text x="380" y="290">each result computed position by position from A and B at the same position</text>
  </g>
</svg>

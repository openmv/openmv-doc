<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 460"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>H-bridge motor driver schematic</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Vmotor label -->
  <g fill="currentColor" text-anchor="middle">
    <text x="270" y="30">Vmotor</text>
  </g>

  <!-- Wire from Vmotor label to top rail -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="270" y1="40" x2="270" y2="60"/>
    <line x1="180" y1="60" x2="360" y2="60"/>
  </g>

  <!-- Wires from top rail down to S1, S2 -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="60" x2="180" y2="100"/>
    <line x1="360" y1="60" x2="360" y2="100"/>
  </g>

  <!-- Switch box S1 -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="160" y="100" width="40" height="50"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="180" y="130">S1</text>
  </g>

  <!-- Switch box S2 -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="340" y="100" width="40" height="50"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="360" y="130">S2</text>
  </g>

  <!-- Wires from S1, S2 down to motor row -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="150" x2="180" y2="220"/>
    <line x1="360" y1="150" x2="360" y2="220"/>
  </g>

  <!-- Node A (left) and B (right) junction dots -->
  <g fill="currentColor">
    <circle cx="180" cy="220" r="3"/>
    <circle cx="360" cy="220" r="3"/>
  </g>

  <!-- Node A / B labels -->
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="156" y="216" text-anchor="end">A</text>
    <text x="384" y="216" text-anchor="start">B</text>
  </g>

  <!-- Wires from junctions to motor circle edges -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="220" x2="248" y2="220"/>
    <line x1="292" y1="220" x2="360" y2="220"/>
  </g>

  <!-- Motor circle -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <circle cx="270" cy="220" r="22"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="16">
    <text x="270" y="226">M</text>
  </g>

  <!-- Wires from junctions down to S3, S4 -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="220" x2="180" y2="290"/>
    <line x1="360" y1="220" x2="360" y2="290"/>
  </g>

  <!-- Switch box S3 -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="160" y="290" width="40" height="50"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="180" y="320">S3</text>
  </g>

  <!-- Switch box S4 -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="340" y="290" width="40" height="50"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="360" y="320">S4</text>
  </g>

  <!-- Wires from S3, S4 down to bottom rail -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="340" x2="180" y2="380"/>
    <line x1="360" y1="340" x2="360" y2="380"/>
    <line x1="180" y1="380" x2="360" y2="380"/>
  </g>

  <!-- Wire from bottom rail down to GND -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="270" y1="380" x2="270" y2="400"/>
  </g>

  <!-- GND symbol -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="250" y1="400" x2="290" y2="400"/>
    <line x1="258" y1="412" x2="282" y2="412"/>
    <line x1="265" y1="424" x2="275" y2="424"/>
  </g>
</svg>

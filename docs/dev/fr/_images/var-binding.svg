<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>Variables are labels pointing at values</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Heading -->
  <g fill="currentColor" font-size="11" opacity="0.6" text-anchor="middle">
    <text x="270" y="22">int values in memory</text>
  </g>

  <!-- Labels (left). text-anchor="end" so the right edge of each label
       sits at x=80, with comfortable left padding from x=0. -->
  <g fill="currentColor">
    <text x="80" y="62"  text-anchor="end">width</text>
    <text x="80" y="132" text-anchor="end">height</text>
    <text x="80" y="202" text-anchor="end">pixels</text>
  </g>

  <!-- Arrows from labels to value boxes -->
  <g stroke="currentColor" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <line x1="90"  y1="58"  x2="205" y2="58"/>
    <line x1="90"  y1="128" x2="205" y2="128"/>
    <line x1="90"  y1="198" x2="205" y2="198"/>
  </g>

  <!-- Value boxes -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="210" y="38"  width="120" height="40" rx="6"/>
    <rect x="210" y="108" width="120" height="40" rx="6"/>
    <rect x="210" y="178" width="120" height="40" rx="6"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="270" y="64"  >320</text>
    <text x="270" y="134" >240</text>
    <text x="270" y="204" >76800</text>
  </g>
</svg>

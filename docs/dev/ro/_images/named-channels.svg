<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>One transport wire on the left fans out into four labelled channels on the cam side -- stdin, stdout, stream, and a user-registered frame channel -- each showing as an independent box.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Transport box (left) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="40" y="125" width="160" height="70" rx="6"/>
  </g>
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="120" y="153">transport</text>
    <text x="120" y="173" font-size="11" opacity="0.75">USB / UART</text>
  </g>

  <!-- Channel boxes (right side, 4 stacked) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="500" y="35"  width="220" height="50" rx="6"/>
    <rect x="500" y="100" width="220" height="50" rx="6"/>
    <rect x="500" y="170" width="220" height="50" rx="6"/>
    <rect x="500" y="240" width="220" height="50" rx="6"/>
  </g>

  <!-- Channel labels -->
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="610" y="58">stdin</text>
    <text x="610" y="76" font-size="11" opacity="0.75">built-in: host scripts</text>
    <text x="610" y="123">stdout</text>
    <text x="610" y="141" font-size="11" opacity="0.75">built-in: cam prints</text>
    <text x="610" y="193">stream</text>
    <text x="610" y="211" font-size="11" opacity="0.75">built-in: IDE preview</text>
    <text x="610" y="263">status</text>
    <text x="610" y="281" font-size="11" opacity="0.75">user: application channel</text>
  </g>

  <!-- Fan-out lines from the transport's right edge directly to each channel box -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="200" y1="140" x2="500" y2="60"/>
    <line x1="200" y1="152" x2="500" y2="125"/>
    <line x1="200" y1="168" x2="500" y2="195"/>
    <line x1="200" y1="180" x2="500" y2="265"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="495,57 494,63 500,60"/>
    <polygon points="494,122 494,128 500,125"/>
    <polygon points="494,192 494,198 500,195"/>
    <polygon points="494,262 495,268 500,265"/>
  </g>

  <!-- Footer annotation -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="380" y="310">up to 32 logical channels share the same transport; each one is independent</text>
  </g>
</svg>

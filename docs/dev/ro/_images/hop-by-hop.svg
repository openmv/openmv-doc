<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>A packet hops between routers from camera to destination server</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Camera box on left -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="20" y="70" width="100" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="12">
    <text x="70" y="95">camera</text>
    <text x="70" y="115" font-size="11" opacity="0.7">10.0.0.42</text>
  </g>

  <!-- Router 1 (gateway) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="160" y="70" width="100" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="12">
    <text x="210" y="92">router</text>
    <text x="210" y="108" font-size="10" opacity="0.7">10.0.0.1</text>
    <text x="210" y="122" font-size="10" opacity="0.7">203.0.113.5</text>
  </g>

  <!-- Router 2 (middle) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="300" y="70" width="100" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="12">
    <text x="350" y="100">router</text>
    <text x="350" y="118" font-size="10" opacity="0.7">...</text>
  </g>

  <!-- Router 3 (middle) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="440" y="70" width="100" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="12">
    <text x="490" y="100">router</text>
    <text x="490" y="118" font-size="10" opacity="0.7">...</text>
  </g>

  <!-- Router 4 (destination network) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="580" y="70" width="100" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="12">
    <text x="630" y="92">router</text>
    <text x="630" y="108" font-size="10" opacity="0.7">198.51.100.1</text>
  </g>

  <!-- Server (far right) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="700" y="70" width="50" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11">
    <text x="725" y="92">server</text>
    <text x="725" y="108" font-size="9" opacity="0.7">198.51.</text>
    <text x="725" y="120" font-size="9" opacity="0.7">100.20</text>
  </g>

  <!-- Arrows between boxes (tips land exactly on the receiving box edge) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="120" y1="100" x2="154" y2="100"/>
    <polygon points="154,96 154,104 160,100" fill="currentColor"/>
    <line x1="260" y1="100" x2="294" y2="100"/>
    <polygon points="294,96 294,104 300,100" fill="currentColor"/>
    <line x1="400" y1="100" x2="434" y2="100"/>
    <polygon points="434,96 434,104 440,100" fill="currentColor"/>
    <line x1="540" y1="100" x2="574" y2="100"/>
    <polygon points="574,96 574,104 580,100" fill="currentColor"/>
    <line x1="680" y1="100" x2="694" y2="100"/>
    <polygon points="694,96 694,104 700,100" fill="currentColor"/>
  </g>

  <!-- Label above showing packet flow -->
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="385" y="40">destination: 198.51.100.20</text>
    <text x="385" y="170">each hop forwards the packet a little closer</text>
  </g>
</svg>

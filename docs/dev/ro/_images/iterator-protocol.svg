<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>iterator protocol: __iter__, __next__, StopIteration</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrIter" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- for-loop box (left) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="20" y="100" width="150" height="60" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="95" y="128">for x in items</text>
    <text x="95" y="148" font-size="11" opacity="0.7">loop</text>
  </g>

  <!-- __iter__ -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrIter)">
    <line x1="170" y1="130" x2="225" y2="130"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="197" y="120">__iter__</text>
  </g>

  <!-- iterator box -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="230" y="100" width="160" height="60" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="310" y="128">iterator</text>
    <text x="310" y="148" font-size="11" opacity="0.7">has __next__</text>
  </g>

  <!-- repeated __next__ calls -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrIter)">
    <line x1="390" y1="120" x2="460" y2="120"/>
    <line x1="390" y1="135" x2="460" y2="135"/>
    <line x1="390" y1="150" x2="460" y2="150"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="395" y="110">__next__</text>
  </g>

  <!-- values column -->
  <g fill="currentColor">
    <text x="470" y="124">10</text>
    <text x="470" y="139">20</text>
    <text x="470" y="154">30</text>
  </g>

  <!-- StopIteration -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrIter)" stroke-dasharray="4 3">
    <line x1="390" y1="170" x2="510" y2="200"/>
  </g>
  <g fill="currentColor" font-size="12" opacity="0.75">
    <text x="520" y="206">StopIteration  &#8594; loop ends</text>
  </g>

  <!-- caption -->
  <g fill="currentColor" font-size="12" opacity="0.7" text-anchor="middle">
    <text x="350" y="252">__iter__ once, __next__ repeatedly, StopIteration ends the loop</text>
  </g>
</svg>

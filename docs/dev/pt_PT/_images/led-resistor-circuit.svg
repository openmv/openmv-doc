<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>LED in series with a current-limiting resistor</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrLR" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- GPIO pin label (top-left source) -->
  <g fill="currentColor" text-anchor="middle">
    <text x="120" y="60">GPIO pin</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="120" y="78">at Vsupply</text>
  </g>

  <!-- Source connection going right -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="120" y1="90" x2="120" y2="150"/>
    <line x1="120" y1="150" x2="200" y2="150"/>
  </g>

  <!-- Resistor (zig-zag) -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <polyline points="200,150 215,135 230,165 245,135 260,165 275,135 290,165 305,150"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="252" y="125">R</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="252" y="195">VR drops here</text>
  </g>

  <!-- Wire from resistor to LED anode -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="305" y1="150" x2="400" y2="150"/>
  </g>

  <!-- LED symbol -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="450" y1="125" x2="450" y2="175"/>
  </g>
  <g fill="currentColor">
    <polygon points="400,125 400,175 450,150"/>
  </g>
  <!-- LED light arrows -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLR)">
    <line x1="420" y1="120" x2="438" y2="92"/>
    <line x1="438" y1="120" x2="460" y2="98"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="425" y="80">light</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="425" y="195">Vf drops here</text>
  </g>

  <!-- LED to GND -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="450" y1="150" x2="540" y2="150"/>
    <line x1="540" y1="150" x2="540" y2="240"/>
  </g>

  <!-- Ground symbol (three horizontal lines, narrowing) -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="520" y1="240" x2="560" y2="240"/>
    <line x1="528" y1="252" x2="552" y2="252"/>
    <line x1="535" y1="264" x2="545" y2="264"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="540" y="285">GND (0 V)</text>
  </g>

  <!-- Current direction arrow under the loop -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrLR)" opacity="0.65">
    <line x1="120" y1="220" x2="540" y2="220"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="330" y="213">current If flows around the loop</text>
  </g>

  <!-- Formula recap -->
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="330" y="330">R = (Vsupply &#8722; Vf) / If</text>
  </g>
</svg>

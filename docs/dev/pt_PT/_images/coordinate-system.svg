<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>The image coordinate system: origin at the top-left corner, x axis rightward, y axis downward; a region of interest given by the top-left corner (x, y) and the dimensions (w, h).</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="120" y="60" width="520" height="240" rx="2"/>
  </g>

  <g fill="currentColor">
    <circle cx="120" cy="60" r="4"/>
    <text x="100" y="50" font-size="11" text-anchor="end">(0, 0)</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <line x1="120" y1="60" x2="240" y2="60"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="232,56 232,64 240,60"/>
  </g>
  <g fill="currentColor" font-size="12">
    <text x="250" y="54">x</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <line x1="120" y1="60" x2="120" y2="160"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="116,152 124,152 120,160"/>
  </g>
  <g fill="currentColor" font-size="12">
    <text x="105" y="180" text-anchor="end">y</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-dasharray="6 4">
    <rect x="260" y="120" width="220" height="130" rx="2"/>
  </g>
  <g fill="currentColor">
    <circle cx="260" cy="120" r="3"/>
    <text x="244" y="115" font-size="11" text-anchor="end">(x, y)</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85">
    <text x="370" y="142" text-anchor="middle">ROI</text>
    <text x="370" y="158" text-anchor="middle" opacity="0.75">(x, y, w, h)</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.7">
    <line x1="260" y1="270" x2="480" y2="270"/>
    <line x1="260" y1="266" x2="260" y2="274"/>
    <line x1="480" y1="266" x2="480" y2="274"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="370" y="287">w</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.7">
    <line x1="500" y1="120" x2="500" y2="250"/>
    <line x1="496" y1="120" x2="504" y2="120"/>
    <line x1="496" y1="250" x2="504" y2="250"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85">
    <text x="510" y="190">h</text>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.65">
    <text x="380" y="335">pixels at integer (col, row) from (0, 0) through (width - 1, height - 1)</text>
  </g>
</svg>

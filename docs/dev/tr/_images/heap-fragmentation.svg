<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>heap fragmentation: same free total, different layouts</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Labels -->
  <g fill="currentColor" text-anchor="middle">
    <text x="170" y="32">contiguous free heap</text>
    <text x="510" y="32">fragmented free heap</text>
  </g>

  <!-- Left heap: one big free block -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="40" y="60" width="260" height="60"/>
    <line x1="80"  y1="60" x2="80"  y2="120"/>
    <line x1="120" y1="60" x2="120" y2="120"/>
  </g>
  <!-- allocated cells (filled) -->
  <g fill="currentColor" opacity="0.5">
    <rect x="40" y="60" width="40" height="60"/>
    <rect x="80" y="60" width="40" height="60"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="50"  y="138">used</text>
    <text x="90"  y="138">used</text>
    <text x="195" y="138">free</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="170" y="160">one large free region</text>
    <text x="170" y="180">big allocations succeed</text>
  </g>

  <!-- Right heap: alternating allocated and small free blocks -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="380" y="60" width="260" height="60"/>
    <line x1="420" y1="60" x2="420" y2="120"/>
    <line x1="460" y1="60" x2="460" y2="120"/>
    <line x1="500" y1="60" x2="500" y2="120"/>
    <line x1="540" y1="60" x2="540" y2="120"/>
    <line x1="580" y1="60" x2="580" y2="120"/>
  </g>
  <g fill="currentColor" opacity="0.5">
    <rect x="380" y="60" width="40" height="60"/>
    <rect x="460" y="60" width="40" height="60"/>
    <rect x="540" y="60" width="40" height="60"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="390" y="138">used</text>
    <text x="430" y="138">free</text>
    <text x="470" y="138">used</text>
    <text x="510" y="138">free</text>
    <text x="550" y="138">used</text>
    <text x="590" y="138">free</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="510" y="160">free total is the same</text>
    <text x="510" y="180">but no big region fits</text>
  </g>

  <!-- Verdict labels, one under each heap, above the allocation box -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="170" y="210">&#9989; fits</text>
    <text x="510" y="210">&#10060; MemoryError</text>
  </g>

  <!-- Big allocation attempt -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="180" y="230" width="320" height="50" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="340" y="260">bytearray(200) -- one block needed</text>
  </g>
</svg>

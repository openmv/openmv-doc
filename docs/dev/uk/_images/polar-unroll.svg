<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Three panels: a Cartesian clock face with two concentric circles, twelve tick marks at the outer rim, and a hand pointing at the 1:30 position; the linpolar re-projection of that source as a rectangle with the two concentric circles laid out as horizontal lines (labelled to the right of the panel) and the twelve tick marks as evenly-spaced vertical strokes hanging off the outer-rim line; and the logpolar variant where the inner-ring horizontal line is pulled down close to the outer ring because the distance axis is logarithmic.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.85">
    <text x="120" y="40">Cartesian source</text>
    <text x="370" y="40">linpolar</text>
    <text x="620" y="40">logpolar</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="30" y="60" width="180" height="220"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <circle cx="120" cy="170" r="78"/>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <circle cx="120" cy="170" r="28"/>
  </g>
  <g fill="currentColor">
    <circle cx="120" cy="170" r="3"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="120" y1="92" x2="120" y2="82"/>
    <line x1="159" y1="103" x2="164" y2="93"/>
    <line x1="188" y1="131" x2="197" y2="126"/>
    <line x1="198" y1="170" x2="208" y2="170"/>
    <line x1="188" y1="209" x2="197" y2="214"/>
    <line x1="159" y1="237" x2="164" y2="247"/>
    <line x1="120" y1="248" x2="120" y2="258"/>
    <line x1="81" y1="237" x2="76" y2="247"/>
    <line x1="52" y1="209" x2="43" y2="214"/>
    <line x1="42" y1="170" x2="32" y2="170"/>
    <line x1="52" y1="131" x2="43" y2="126"/>
    <line x1="81" y1="103" x2="76" y2="93"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <line x1="120" y1="170" x2="175" y2="115"/>
  </g>
  <g fill="currentColor">
    <circle cx="175" cy="115" r="2"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="260" y="70" width="220" height="200"/>
  </g>
  <text x="260" y="293" font-size="11" fill="currentColor" opacity="0.7" text-anchor="start">angle 0</text>
  <text x="480" y="293" font-size="11" fill="currentColor" opacity="0.7" text-anchor="end">360</text>
  <text x="254" y="74" font-size="11" fill="currentColor" opacity="0.7" text-anchor="end">r=0</text>
  <text x="254" y="265" font-size="11" fill="currentColor" opacity="0.7" text-anchor="end">max</text>

  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="260" y1="245" x2="480" y2="245"/>
  </g>
  <text x="475" y="240" font-size="10" fill="currentColor" opacity="0.75" text-anchor="end">outer rim</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="260" y1="143" x2="480" y2="143"/>
  </g>
  <text x="475" y="138" font-size="10" fill="currentColor" opacity="0.75" text-anchor="end">inner ring</text>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="269" y1="245" x2="269" y2="258"/>
    <line x1="287" y1="245" x2="287" y2="258"/>
    <line x1="305" y1="245" x2="305" y2="258"/>
    <line x1="323" y1="245" x2="323" y2="258"/>
    <line x1="342" y1="245" x2="342" y2="258"/>
    <line x1="360" y1="245" x2="360" y2="258"/>
    <line x1="378" y1="245" x2="378" y2="258"/>
    <line x1="397" y1="245" x2="397" y2="258"/>
    <line x1="415" y1="245" x2="415" y2="258"/>
    <line x1="433" y1="245" x2="433" y2="258"/>
    <line x1="451" y1="245" x2="451" y2="258"/>
    <line x1="470" y1="245" x2="470" y2="258"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3">
    <line x1="287" y1="70" x2="287" y2="270"/>
  </g>
  <text x="287" y="62" font-size="10" fill="currentColor" opacity="0.75" text-anchor="middle">hand</text>

  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="510" y="70" width="220" height="200"/>
  </g>
  <text x="510" y="293" font-size="11" fill="currentColor" opacity="0.7" text-anchor="start">angle 0</text>
  <text x="730" y="293" font-size="11" fill="currentColor" opacity="0.7" text-anchor="end">360</text>
  <text x="504" y="74" font-size="11" fill="currentColor" opacity="0.7" text-anchor="end">r=0</text>
  <text x="504" y="265" font-size="11" fill="currentColor" opacity="0.7" text-anchor="end">max</text>

  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="510" y1="245" x2="730" y2="245"/>
  </g>
  <text x="725" y="240" font-size="10" fill="currentColor" opacity="0.75" text-anchor="end">outer rim</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="510" y1="212" x2="730" y2="212"/>
  </g>
  <text x="725" y="207" font-size="10" fill="currentColor" opacity="0.75" text-anchor="end">inner ring</text>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="519" y1="245" x2="519" y2="258"/>
    <line x1="537" y1="245" x2="537" y2="258"/>
    <line x1="555" y1="245" x2="555" y2="258"/>
    <line x1="573" y1="245" x2="573" y2="258"/>
    <line x1="592" y1="245" x2="592" y2="258"/>
    <line x1="610" y1="245" x2="610" y2="258"/>
    <line x1="628" y1="245" x2="628" y2="258"/>
    <line x1="647" y1="245" x2="647" y2="258"/>
    <line x1="665" y1="245" x2="665" y2="258"/>
    <line x1="683" y1="245" x2="683" y2="258"/>
    <line x1="701" y1="245" x2="701" y2="258"/>
    <line x1="720" y1="245" x2="720" y2="258"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3">
    <line x1="537" y1="70" x2="537" y2="270"/>
  </g>
  <text x="537" y="62" font-size="10" fill="currentColor" opacity="0.75" text-anchor="middle">hand</text>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.55">
    <text x="380" y="330">rotation in the source becomes horizontal translation in either polar image;</text>
    <text x="380" y="346">logpolar additionally compresses the radial spacing of distant features</text>
  </g>
</svg>

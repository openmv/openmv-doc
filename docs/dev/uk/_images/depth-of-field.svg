<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Depth of field</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Optical axis -->
  <g stroke="currentColor" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.4">
    <line x1="40" y1="160" x2="540" y2="160"/>
  </g>

  <!-- Lens (vertical oval) -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <ellipse cx="300" cy="160" rx="10" ry="65"/>
  </g>

  <!-- Sensor (vertical line) -->
  <g stroke="currentColor" stroke-width="1.4" fill="none">
    <line x1="460" y1="80" x2="460" y2="240"/>
  </g>
  <text x="460" y="68" fill="currentColor" text-anchor="middle" font-size="11">sensor</text>

  <!-- Three object positions on the optical axis:
       far at x=70, focused at x=130, near at x=210.
       Each has a ray-bundle entering the lens (top & bottom edges) and
       refracting toward an image point. The focused point lands exactly
       at the sensor; the far point converges before the sensor; the
       near point would converge after the sensor.                  -->

  <!-- FOCUSED OBJECT (rays converge at sensor, x=460) -->
  <g stroke="currentColor" stroke-width="1.4" opacity="0.85">
    <line x1="130" y1="160" x2="300" y2="120"/>
    <line x1="300" y1="120" x2="460" y2="160"/>
    <line x1="130" y1="160" x2="300" y2="200"/>
    <line x1="300" y1="200" x2="460" y2="160"/>
  </g>
  <circle cx="130" cy="160" r="3" fill="currentColor"/>
  <circle cx="460" cy="160" r="3" fill="currentColor"/>

  <!-- FAR OBJECT (rays converge BEFORE sensor; blur on sensor) -->
  <g stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.6">
    <line x1="70" y1="160" x2="300" y2="100"/>
    <line x1="300" y1="100" x2="400" y2="160"/>
    <line x1="400" y1="160" x2="460" y2="195"/>
    <line x1="70" y1="160" x2="300" y2="220"/>
    <line x1="300" y1="220" x2="400" y2="160"/>
    <line x1="400" y1="160" x2="460" y2="125"/>
  </g>
  <circle cx="70" cy="160" r="3" fill="currentColor" opacity="0.8"/>
  <circle cx="400" cy="160" r="3" fill="currentColor" opacity="0.8"/>

  <!-- NEAR OBJECT (rays NOT YET converged at sensor; blur on sensor) -->
  <g stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.6">
    <line x1="210" y1="160" x2="300" y2="135"/>
    <line x1="300" y1="135" x2="460" y2="195"/>
    <line x1="210" y1="160" x2="300" y2="185"/>
    <line x1="300" y1="185" x2="460" y2="125"/>
  </g>
  <circle cx="210" cy="160" r="3" fill="currentColor" opacity="0.8"/>

  <!-- Object position labels — placed below all ray paths to avoid
       the diverging-down rays that fan out below the axis. -->
  <g fill="currentColor" text-anchor="middle" font-size="11">
    <text x="70"  y="245">far</text>
    <text x="130" y="245">focused</text>
    <text x="210" y="245">near</text>
  </g>

  <!-- Blur circle markers at the sensor for far / near -->
  <g stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.7">
    <ellipse cx="460" cy="125" rx="3.5" ry="3.5"/>
    <ellipse cx="460" cy="195" rx="3.5" ry="3.5"/>
  </g>

  <!-- "in focus" band on the object side, between far and near limits -->
  <g stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.7">
    <line x1="70"  y1="270" x2="70"  y2="280"/>
    <line x1="210" y1="270" x2="210" y2="280"/>
    <line x1="70"  y1="275" x2="210" y2="275"/>
  </g>
  <text x="140" y="298" fill="currentColor" text-anchor="middle">depth of field</text>
</svg>

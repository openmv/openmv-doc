<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 110 560 180"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Thin-lens model at many scene points</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Optical axis -->
  <g stroke="currentColor" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.4">
    <line x1="40" y1="200" x2="510" y2="200"/>
  </g>

  <!-- Lens (vertical oval) -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <ellipse cx="280" cy="200" rx="10" ry="80"/>
  </g>

  <!-- Focal points on the axis -->
  <circle cx="180" cy="200" r="3" fill="currentColor"/>
  <text x="180" y="218" fill="currentColor" text-anchor="middle" font-size="11">F</text>
  <circle cx="380" cy="200" r="3" fill="currentColor"/>
  <text x="380" y="188" fill="currentColor" text-anchor="middle" font-size="11">F'</text>

  <!-- Object arrow at x=80 (upward, base on axis at y=200, tip at y=140) -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <line x1="80" y1="200" x2="80" y2="140"/>
    <polygon points="80,133 75,146 85,146" fill="currentColor" stroke="none"/>
  </g>

  <!-- Image arrow at x=480 (inverted, base on axis at y=200, tip at y=260) -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <line x1="480" y1="200" x2="480" y2="260"/>
    <polygon points="480,267 475,254 485,254" fill="currentColor" stroke="none"/>
  </g>

  <!-- Three sample points on the object arrow -->
  <g fill="currentColor">
    <circle cx="80" cy="140" r="2.8"/>
    <circle cx="80" cy="165" r="2.8"/>
    <circle cx="80" cy="185" r="2.8"/>
  </g>

  <!-- Corresponding image points on the image arrow -->
  <g fill="currentColor">
    <circle cx="480" cy="260" r="2.8"/>
    <circle cx="480" cy="235" r="2.8"/>
    <circle cx="480" cy="215" r="2.8"/>
  </g>

  <!-- Parallel-then-through-F' rays from each sample point.
       Each: (80, y_obj) -> (280, y_obj) -> (380, 200) -> (480, y_img)
       Geometry: y_obj=140 -> y_img=260; 165 -> 235; 185 -> 215.       -->
  <g stroke="currentColor" stroke-width="1.1" stroke-dasharray="4 3" opacity="0.7">
    <line x1="80"  y1="140" x2="280" y2="140"/>
    <line x1="280" y1="140" x2="380" y2="200"/>
    <line x1="380" y1="200" x2="480" y2="260"/>

    <line x1="80"  y1="165" x2="280" y2="165"/>
    <line x1="280" y1="165" x2="380" y2="200"/>
    <line x1="380" y1="200" x2="480" y2="235"/>

    <line x1="80"  y1="185" x2="280" y2="185"/>
    <line x1="280" y1="185" x2="380" y2="200"/>
    <line x1="380" y1="200" x2="480" y2="215"/>
  </g>
</svg>

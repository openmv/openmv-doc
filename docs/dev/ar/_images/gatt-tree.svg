<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>A GATT database tree: services, characteristics, and descriptors</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Root: GATT database -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="290" y="20" width="180" height="44" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="380" y="48">GATT database</text>
  </g>

  <!-- Three services -->
  <!-- Service 1: Generic Access 0x1800 -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="40" y="120" width="200" height="44" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="140" y="140">Service</text>
    <text x="140" y="156" font-size="11" opacity="0.75">Generic Access (0x1800)</text>
  </g>

  <!-- Service 2: Battery 0x180F -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="280" y="120" width="200" height="44" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="380" y="140">Service</text>
    <text x="380" y="156" font-size="11" opacity="0.75">Battery (0x180F)</text>
  </g>

  <!-- Service 3: Environmental Sensing 0x181A -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="520" y="120" width="200" height="44" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="620" y="140">Service</text>
    <text x="620" y="156" font-size="11" opacity="0.75">Env. Sensing (0x181A)</text>
  </g>

  <!-- Lines from root to services -->
  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.7">
    <line x1="380" y1="64" x2="140" y2="120"/>
    <line x1="380" y1="64" x2="380" y2="120"/>
    <line x1="380" y1="64" x2="620" y2="120"/>
  </g>

  <!-- Characteristics under Battery: Battery Level 0x2A19 -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="4,3">
    <rect x="280" y="220" width="200" height="44" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="380" y="240">Characteristic</text>
    <text x="380" y="256" font-size="11" opacity="0.75">Battery Level (0x2A19)</text>
  </g>

  <!-- Characteristics under Env Sensing: Temperature, Humidity -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="4,3">
    <rect x="520" y="220" width="200" height="44" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="620" y="240">Characteristic</text>
    <text x="620" y="256" font-size="11" opacity="0.75">Temperature (0x2A6E)</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="4,3">
    <rect x="520" y="290" width="200" height="44" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="620" y="310">Characteristic</text>
    <text x="620" y="326" font-size="11" opacity="0.75">Humidity (0x2A6F)</text>
  </g>

  <!-- Lines from services to characteristics -->
  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.7">
    <line x1="380" y1="164" x2="380" y2="220"/>
    <line x1="620" y1="164" x2="620" y2="220"/>
    <!-- Service to Humidity: routed around the right side of the Temperature box -->
    <polyline points="620,164 620,180 745,180 745,277 620,277 620,290"/>
  </g>

  <!-- Descriptor under Battery Level: CCCD 0x2902 -->
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="2,3">
    <rect x="280" y="350" width="200" height="44" rx="4"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="380" y="370">Descriptor</text>
    <text x="380" y="386" font-size="11" opacity="0.75">CCCD (0x2902)</text>
  </g>

  <!-- Line from characteristic to descriptor -->
  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.6">
    <line x1="380" y1="264" x2="380" y2="350"/>
  </g>

  <!-- Legend -->
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="40" y="430">solid box = service &#8226; dashed box = characteristic &#8226; dotted box = descriptor</text>
  </g>
</svg>

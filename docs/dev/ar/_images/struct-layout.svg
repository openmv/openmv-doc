<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>struct layout for &quot;&lt;HI&quot; -- 2-byte H field, 4-byte I field</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- format string label -->
  <g fill="currentColor">
    <text x="30" y="40">format:  "&lt;HI"</text>
    <text x="30" y="60" font-size="11" opacity="0.7">little-endian, one 16-bit unsigned then one 32-bit unsigned</text>
  </g>

  <!-- Six byte cells -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="60"  y="100" width="60" height="50"/>
    <rect x="120" y="100" width="60" height="50"/>
    <rect x="180" y="100" width="60" height="50"/>
    <rect x="240" y="100" width="60" height="50"/>
    <rect x="300" y="100" width="60" height="50"/>
    <rect x="360" y="100" width="60" height="50"/>
  </g>

  <!-- byte indices (top) -->
  <g fill="currentColor" font-size="11" opacity="0.6" text-anchor="middle">
    <text x="90"  y="92">byte 0</text>
    <text x="150" y="92">byte 1</text>
    <text x="210" y="92">byte 2</text>
    <text x="270" y="92">byte 3</text>
    <text x="330" y="92">byte 4</text>
    <text x="390" y="92">byte 5</text>
  </g>

  <!-- byte contents -->
  <g fill="currentColor" text-anchor="middle">
    <text x="90"  y="130">0x40</text>
    <text x="150" y="130">0x01</text>
    <text x="210" y="130">0x40</text>
    <text x="270" y="130">0x42</text>
    <text x="330" y="130">0x0f</text>
    <text x="390" y="130">0x00</text>
  </g>

  <!-- field brackets -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <path d="M 60 165 L 60 175 L 180 175 L 180 165"/>
    <path d="M 180 165 L 180 175 L 420 175 L 420 165"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="120" y="200">H  (uint16)</text>
    <text x="300" y="200">I  (uint32)</text>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.7">
    <text x="120" y="220">= 320</text>
    <text x="300" y="220">= 1000000</text>
  </g>

  <!-- low-byte-first note -->
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="60" y="248">low byte first (little-endian) &#8594;</text>
  </g>
</svg>

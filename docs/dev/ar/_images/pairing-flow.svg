<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>The BLE pairing flow producing an encrypted link, with optional bonding to flash</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Two columns: central, peripheral -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="100" y="30" width="120" height="40"/>
    <rect x="500" y="30" width="120" height="40"/>
  </g>
  <g fill="currentColor" font-size="14" text-anchor="middle">
    <text x="160" y="56">central</text>
    <text x="560" y="56">peripheral</text>
  </g>

  <!-- Vertical lifelines -->
  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
    <line x1="160" y1="70" x2="160" y2="460"/>
    <line x1="560" y1="70" x2="560" y2="460"/>
  </g>

  <!-- Dashed line: BLE connection open (unencrypted) -->
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="4,4" opacity="0.6">
    <line x1="100" y1="105" x2="620" y2="105"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="360" y="100">BLE connection open (unencrypted)</text>
  </g>

  <!-- Pairing request: central -> peripheral -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="138">pairing request</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="160" y1="150" x2="560" y2="150"/>
    <polygon points="552,146 552,154 560,150" fill="currentColor"/>
  </g>

  <!-- Key exchange (both directions) -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="190">public-key exchange</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="160" y1="205" x2="560" y2="205"/>
    <polygon points="552,201 552,209 560,205" fill="currentColor"/>
    <line x1="560" y1="225" x2="160" y2="225"/>
    <polygon points="168,221 168,229 160,225" fill="currentColor"/>
  </g>

  <!-- Pairing complete -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="263">pairing complete</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="160" y1="275" x2="560" y2="275"/>
    <polygon points="552,271 552,279 560,275" fill="currentColor"/>
  </g>

  <!-- Dashed line: link encrypted -->
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="4,4" opacity="0.6">
    <line x1="100" y1="310" x2="620" y2="310"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="360" y="305">link encrypted</text>
  </g>

  <!-- Encrypted GATT traffic: thick double arrow -->
  <g fill="none" stroke="currentColor" stroke-width="3.5">
    <line x1="176" y1="350" x2="544" y2="350"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="544,342 544,358 560,350"/>
    <polygon points="176,342 176,358 160,350"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="378">encrypted GATT traffic</text>
  </g>

  <!-- Optional bonding sidebar: hangs off the left of the central lifeline -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3,3">
    <rect x="10" y="410" width="140" height="48"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle">
    <text x="80" y="430">bonding (optional):</text>
    <text x="80" y="446">keys saved to flash</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3,3" opacity="0.6">
    <line x1="160" y1="434" x2="150" y2="434"/>
  </g>
</svg>

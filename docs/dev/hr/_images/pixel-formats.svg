<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>The five uncompressed pixel formats laid out byte by byte: BINARY (8 pixels per byte), GRAYSCALE (1 byte per pixel), RGB565 (2 bytes per pixel with 5R/6G/5B packing), YUV422 (4 bytes per 2 pixels with shared chroma), and BAYER (1 byte per pixel, with channel determined by row and column).</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="currentColor" font-size="13" font-weight="bold">
    <text x="20" y="55">BINARY</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="130" y="30" width="320" height="40"/>
    <line x1="170" y1="30" x2="170" y2="70"/>
    <line x1="210" y1="30" x2="210" y2="70"/>
    <line x1="250" y1="30" x2="250" y2="70"/>
    <line x1="290" y1="30" x2="290" y2="70"/>
    <line x1="330" y1="30" x2="330" y2="70"/>
    <line x1="370" y1="30" x2="370" y2="70"/>
    <line x1="410" y1="30" x2="410" y2="70"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.8">
    <text x="150" y="55">b</text>
    <text x="190" y="55">b</text>
    <text x="230" y="55">b</text>
    <text x="270" y="55">b</text>
    <text x="310" y="55">b</text>
    <text x="350" y="55">b</text>
    <text x="390" y="55">b</text>
    <text x="430" y="55">b</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.65">
    <text x="465" y="55">1 byte  =  8 pixels</text>
  </g>

  <g fill="currentColor" font-size="13" font-weight="bold">
    <text x="20" y="135">GRAYSCALE</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="130" y="110" width="80" height="40"/>
    <rect x="210" y="110" width="80" height="40"/>
    <rect x="290" y="110" width="80" height="40"/>
    <rect x="370" y="110" width="80" height="40"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="170" y="135">px0</text>
    <text x="250" y="135">px1</text>
    <text x="330" y="135">px2</text>
    <text x="410" y="135">px3</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.65">
    <text x="465" y="135">1 byte  =  1 pixel</text>
  </g>

  <g fill="currentColor" font-size="13" font-weight="bold">
    <text x="20" y="215">RGB565</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="130" y="190" width="160" height="40"/>
    <line x1="180" y1="190" x2="180" y2="230"/>
    <line x1="240" y1="190" x2="240" y2="230"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.8">
    <text x="155" y="215">RRRRR</text>
    <text x="210" y="215">GGGGGG</text>
    <text x="265" y="215">BBBBB</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.65">
    <text x="305" y="215">2 bytes  =  1 pixel</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.55">
    <text x="305" y="232">(5 / 6 / 5 bits packed into a 16-bit word)</text>
  </g>

  <g fill="currentColor" font-size="13" font-weight="bold">
    <text x="20" y="295">YUV422</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="130" y="270" width="80" height="40"/>
    <rect x="210" y="270" width="80" height="40"/>
    <rect x="290" y="270" width="80" height="40"/>
    <rect x="370" y="270" width="80" height="40"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="170" y="295">Y0</text>
    <text x="250" y="295">U</text>
    <text x="330" y="295">Y1</text>
    <text x="410" y="295">V</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.65">
    <text x="465" y="295">4 bytes  =  2 pixels</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.55">
    <text x="465" y="312">(two Y's share one U and one V)</text>
  </g>

  <g fill="currentColor" font-size="13" font-weight="bold">
    <text x="20" y="385">BAYER</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="130" y="350" width="60" height="40"/>
    <rect x="190" y="350" width="60" height="40"/>
    <rect x="250" y="350" width="60" height="40"/>
    <rect x="310" y="350" width="60" height="40"/>
    <rect x="130" y="390" width="60" height="40"/>
    <rect x="190" y="390" width="60" height="40"/>
    <rect x="250" y="390" width="60" height="40"/>
    <rect x="310" y="390" width="60" height="40"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="160" y="375">R</text>
    <text x="220" y="375">G</text>
    <text x="280" y="375">R</text>
    <text x="340" y="375">G</text>
    <text x="160" y="415">G</text>
    <text x="220" y="415">B</text>
    <text x="280" y="415">G</text>
    <text x="340" y="415">B</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.65">
    <text x="385" y="375">row 0  --  R G R G ...</text>
    <text x="385" y="415">row 1  --  G B G B ...</text>
    <text x="385" y="432" opacity="0.55">1 byte  =  1 channel sample</text>
  </g>
</svg>

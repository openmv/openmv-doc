<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>The four GAP roles as a 2x2 matrix of advertising vs accepting connections</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Column headers -->
  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.8">
    <text x="270" y="40">accepts / initiates</text>
    <text x="270" y="56">connections</text>
    <text x="470" y="40">does NOT</text>
    <text x="470" y="56">connect</text>
  </g>

  <!-- Row labels -->
  <g fill="currentColor" font-size="12" text-anchor="end" opacity="0.8">
    <text x="155" y="135">advertises</text>
    <text x="155" y="260">scans /</text>
    <text x="155" y="276">does not advertise</text>
  </g>

  <!-- 4 cells: top-left, top-right, bottom-left, bottom-right -->
  <!-- top-left: Peripheral (advertises + accepts) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="180" y="90" width="180" height="100"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="270" y="130" font-size="16">Peripheral</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="270" y="155">advertises until</text>
    <text x="270" y="171">a central connects</text>
  </g>

  <!-- top-right: Broadcaster (advertises + no connect) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="380" y="90" width="180" height="100"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="470" y="130" font-size="16">Broadcaster</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="470" y="155">advertises the data</text>
    <text x="470" y="171">itself; beacons</text>
  </g>

  <!-- bottom-left: Central (no advertise + connect) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="180" y="210" width="180" height="100"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="270" y="250" font-size="16">Central</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="270" y="275">scans, picks one,</text>
    <text x="270" y="291">opens connection</text>
  </g>

  <!-- bottom-right: Observer (no advertise + no connect) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="380" y="210" width="180" height="100"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="470" y="250" font-size="16">Observer</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="470" y="275">scans, reads</text>
    <text x="470" y="291">adverts, no connect</text>
  </g>
</svg>

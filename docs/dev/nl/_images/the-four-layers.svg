<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>The four layers of the OpenMV protocol stack: transport at the bottom (USB / UART), framing above (packet header + CRCs), reliability (sequence numbers, ACK, NAK, retransmit), and channels at the top (named logical streams).</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Layer boxes (top to bottom) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="180" y="30"  width="400" height="60" rx="6"/>
    <rect x="180" y="100" width="400" height="60" rx="6"/>
    <rect x="180" y="170" width="400" height="60" rx="6"/>
    <rect x="180" y="240" width="400" height="60" rx="6"/>
  </g>

  <!-- Layer labels (inside) -->
  <g fill="currentColor" font-size="14" text-anchor="middle">
    <text x="380" y="56">Channels</text>
    <text x="380" y="126">Reliability</text>
    <text x="380" y="196">Framing</text>
    <text x="380" y="266">Transport</text>
  </g>

  <!-- Layer one-line summaries -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="380" y="76">named logical streams (stdin / stdout / stream / user)</text>
    <text x="380" y="146">sequence numbers, ACK / NAK, retransmit with backoff</text>
    <text x="380" y="216">10-byte header + payload + 4-byte CRC, per-packet integrity</text>
    <text x="380" y="286">USB-CDC or UART serial -- bytes in, bytes out</text>
  </g>

  <!-- Application above, transport below -->
  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.65">
    <text x="380" y="20">application (cam Python / host Python)</text>
    <text x="380" y="328">wire (USB cable / serial line / Ethernet)</text>
  </g>

  <!-- Vertical arrows between layers (downward = "uses") -->
  <g fill="none" stroke="currentColor" stroke-width="1.6" opacity="0.85">
    <line x1="380" y1="90" x2="380" y2="96"/>
    <line x1="380" y1="160" x2="380" y2="166"/>
    <line x1="380" y1="230" x2="380" y2="236"/>
  </g>
  <g fill="currentColor" stroke="none" opacity="0.85">
    <polygon points="374,96 386,96 380,104"/>
    <polygon points="374,166 386,166 380,174"/>
    <polygon points="374,236 386,236 380,244"/>
  </g>

  <!-- Footer annotation -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="380" y="348">each layer hides its own concern from the one above</text>
  </g>
</svg>

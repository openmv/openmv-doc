<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>A bimodal grayscale histogram drawn as a row of vertical bars across the brightness range 0 to 255. Three vertical lines overlay the histogram: Otsu's threshold in the valley between the two peaks, the mean shifted toward the larger right-hand peak, and the median further right where the cumulative pixel count reaches one-half.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <line x1="60" y1="240" x2="700" y2="240"/>
    <line x1="60" y1="240" x2="60" y2="60"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="60" y="260">0</text>
    <text x="700" y="260">255</text>
    <text x="380" y="285">brightness</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="50" y="244" text-anchor="end">0</text>
    <text x="50" y="64" text-anchor="end">peak</text>
  </g>

  <g fill="currentColor" opacity="0.55">
    <rect x="62" y="232" width="18" height="8"/>
    <rect x="82" y="226" width="18" height="14"/>
    <rect x="102" y="216" width="18" height="24"/>
    <rect x="122" y="198" width="18" height="42"/>
    <rect x="142" y="180" width="18" height="60"/>
    <rect x="162" y="170" width="18" height="70"/>
    <rect x="182" y="184" width="18" height="56"/>
    <rect x="202" y="206" width="18" height="34"/>
    <rect x="222" y="222" width="18" height="18"/>
    <rect x="242" y="232" width="18" height="8"/>
    <rect x="262" y="234" width="18" height="6"/>
    <rect x="282" y="236" width="18" height="4"/>
    <rect x="302" y="236" width="18" height="4"/>
    <rect x="322" y="236" width="18" height="4"/>
    <rect x="342" y="234" width="18" height="6"/>
    <rect x="362" y="230" width="18" height="10"/>
    <rect x="382" y="222" width="18" height="18"/>
    <rect x="402" y="210" width="18" height="30"/>
    <rect x="422" y="192" width="18" height="48"/>
    <rect x="442" y="168" width="18" height="72"/>
    <rect x="462" y="142" width="18" height="98"/>
    <rect x="482" y="118" width="18" height="122"/>
    <rect x="502" y="124" width="18" height="116"/>
    <rect x="522" y="146" width="18" height="94"/>
    <rect x="542" y="170" width="18" height="70"/>
    <rect x="562" y="194" width="18" height="46"/>
    <rect x="582" y="212" width="18" height="28"/>
    <rect x="602" y="222" width="18" height="18"/>
    <rect x="622" y="230" width="18" height="10"/>
    <rect x="642" y="234" width="18" height="6"/>
    <rect x="662" y="236" width="18" height="4"/>
    <rect x="682" y="238" width="18" height="2"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="6 4">
    <line x1="310" y1="60" x2="310" y2="240"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="310" y="50">Otsu</text>
    <text x="310" y="35" font-size="10" opacity="0.7">(threshold)</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3">
    <line x1="420" y1="60" x2="420" y2="240"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="420" y="50">mean</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="2 3">
    <line x1="495" y1="60" x2="495" y2="240"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="495" y="50">median</text>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.55">
    <text x="380" y="310">a bimodal distribution gives three distinct summary points</text>
  </g>
</svg>

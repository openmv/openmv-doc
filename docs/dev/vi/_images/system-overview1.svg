<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>The cam talks to a phone or laptop over HTTPS for the dashboard, SSE events, and WebSocket commands; the cam talks out to a cloud archive over HTTPS POST.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Three party boxes -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="30" y="70" width="140" height="70" rx="6"/>
    <rect x="290" y="70" width="180" height="70" rx="6"/>
    <rect x="590" y="70" width="140" height="70" rx="6"/>
  </g>
  <g fill="currentColor" font-size="13" text-anchor="middle">
    <text x="100" y="97">phone /</text>
    <text x="100" y="115">laptop</text>
    <text x="380" y="97">the cam</text>
    <text x="380" y="115">(microdot server)</text>
    <text x="660" y="97">cloud</text>
    <text x="660" y="115">archive</text>
  </g>

  <!-- Left arrows: phone ↔ cam, one forward, one back -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="170" y1="98" x2="290" y2="98"/>
    <line x1="290" y1="112" x2="170" y2="112"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="282,94 282,102 290,98"/>
    <polygon points="178,108 178,116 170,112"/>
  </g>

  <!-- Labels for the left arrows, above and below the box row -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="230" y="58">HTTPS dashboard</text>
    <text x="230" y="160">SSE + WS</text>
  </g>

  <!-- Right arrow: cam → cloud, one-way -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="470" y1="105" x2="590" y2="105"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="582,101 582,109 590,105"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="530" y="58">HTTPS POST</text>
    <text x="530" y="160">/frames</text>
  </g>

  <!-- Footer annotation -->
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="380" y="190">one script: capture + detector + microdot server share one asyncio loop</text>
  </g>
</svg>

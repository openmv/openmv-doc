<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>A 4-by-3 image grid. Each cell shows its linear index (0 through 11) and its (x, y) coordinate; pixels are addressed in row-major order.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="180" y="60" width="80" height="60"/>
    <rect x="260" y="60" width="80" height="60"/>
    <rect x="340" y="60" width="80" height="60"/>
    <rect x="420" y="60" width="80" height="60"/>
    <rect x="180" y="120" width="80" height="60"/>
    <rect x="260" y="120" width="80" height="60"/>
    <rect x="340" y="120" width="80" height="60"/>
    <rect x="420" y="120" width="80" height="60"/>
    <rect x="180" y="180" width="80" height="60"/>
    <rect x="260" y="180" width="80" height="60"/>
    <rect x="340" y="180" width="80" height="60"/>
    <rect x="420" y="180" width="80" height="60"/>
  </g>

  <g fill="currentColor" font-size="18" font-weight="bold" text-anchor="middle">
    <text x="220" y="92">0</text>
    <text x="300" y="92">1</text>
    <text x="380" y="92">2</text>
    <text x="460" y="92">3</text>
    <text x="220" y="152">4</text>
    <text x="300" y="152">5</text>
    <text x="380" y="152">6</text>
    <text x="460" y="152">7</text>
    <text x="220" y="212">8</text>
    <text x="300" y="212">9</text>
    <text x="380" y="212">10</text>
    <text x="460" y="212">11</text>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="220" y="112">(0, 0)</text>
    <text x="300" y="112">(1, 0)</text>
    <text x="380" y="112">(2, 0)</text>
    <text x="460" y="112">(3, 0)</text>
    <text x="220" y="172">(0, 1)</text>
    <text x="300" y="172">(1, 1)</text>
    <text x="380" y="172">(2, 1)</text>
    <text x="460" y="172">(3, 1)</text>
    <text x="220" y="232">(0, 2)</text>
    <text x="300" y="232">(1, 2)</text>
    <text x="380" y="232">(2, 2)</text>
    <text x="460" y="232">(3, 2)</text>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.55">
    <text x="220" y="50">x = 0</text>
    <text x="300" y="50">x = 1</text>
    <text x="380" y="50">x = 2</text>
    <text x="460" y="50">x = 3</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.55">
    <text x="170" y="95" text-anchor="end">y = 0</text>
    <text x="170" y="155" text-anchor="end">y = 1</text>
    <text x="170" y="215" text-anchor="end">y = 2</text>
  </g>

  <g fill="currentColor" font-size="11" opacity="0.65">
    <text x="520" y="95">indices 0..3</text>
    <text x="520" y="155">indices 4..7</text>
    <text x="520" y="215">indices 8..11</text>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.65">
    <text x="380" y="285">img[i] walks pixels left-to-right, top-to-bottom:  index  =  y * width  +  x</text>
  </g>
</svg>

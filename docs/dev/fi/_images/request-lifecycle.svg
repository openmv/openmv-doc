<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>One HTTP request through Microdot's parsing, routing, and handler stages</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Party boxes -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="60" y="30" width="120" height="40" rx="4"/>
    <rect x="580" y="30" width="120" height="40" rx="4"/>
  </g>
  <g fill="currentColor" font-size="14" text-anchor="middle">
    <text x="120" y="56">phone</text>
    <text x="640" y="56">camera</text>
  </g>

  <!-- Lifelines (camera lifeline breaks around the processing boxes) -->
  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
    <line x1="120" y1="70" x2="120" y2="420"/>
    <line x1="640" y1="70" x2="640" y2="175"/>
    <line x1="640" y1="313" x2="640" y2="420"/>
  </g>

  <!-- TCP connect arrow -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="380" y="100">TCP connect</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="120" y1="112" x2="640" y2="112"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="632,108 632,116 640,112"/>
  </g>

  <!-- Request arrow -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="380" y="138">GET / HTTP/1.0</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="120" y1="150" x2="640" y2="150"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="632,146 632,154 640,150"/>
  </g>

  <!-- Server-side processing boxes -->
  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="540" y="175" width="200" height="38" rx="4"/>
    <rect x="540" y="225" width="200" height="38" rx="4"/>
    <rect x="540" y="275" width="200" height="38" rx="4"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="640" y="199">1. parse request</text>
    <text x="640" y="249">2. route match</text>
    <text x="640" y="299">3. handler runs</text>
  </g>

  <!-- Response arrow -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="380" y="338">HTTP/1.0 200 OK</text>
    <text x="380" y="354">Hello, world!</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <line x1="640" y1="370" x2="120" y2="370"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="128,366 128,374 120,370"/>
  </g>

  <!-- Close annotation -->
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="380" y="400">TCP close (or keep-alive)</text>
  </g>
</svg>

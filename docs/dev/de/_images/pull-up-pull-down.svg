<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>pull-up and pull-down resistor configurations for a switch input</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- LEFT: Pull-up -->

  <g fill="currentColor" text-anchor="middle">
    <text x="180" y="30">Pull-up</text>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.85">
    <text x="180" y="55">Vcc</text>
  </g>

  <!-- Vcc rail down to resistor -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="65" x2="180" y2="90"/>
    <!-- Resistor -->
    <polyline points="180,90 168,100 192,115 168,130 192,145 168,160 180,170"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="200" y="135">10 k&#937;</text>
  </g>

  <!-- Resistor bottom to input tap junction, then down to switch -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="170" x2="180" y2="220"/>
    <line x1="180" y1="220" x2="280" y2="220"/>
    <line x1="180" y1="220" x2="180" y2="278"/>
  </g>
  <g fill="currentColor" opacity="0.95">
    <circle cx="180" cy="220" r="3"/>
  </g>
  <g fill="currentColor">
    <text x="285" y="224">Pin</text>
  </g>

  <!-- Switch (open): two contacts with a diagonal lever -->
  <g fill="currentColor">
    <circle cx="180" cy="280" r="3"/>
    <circle cx="180" cy="320" r="3"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="280" x2="198" y2="315"/>
  </g>

  <!-- Switch bottom contact to GND -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="322" x2="180" y2="360"/>
    <!-- GND symbol -->
    <line x1="160" y1="360" x2="200" y2="360"/>
    <line x1="168" y1="372" x2="192" y2="372"/>
    <line x1="175" y1="384" x2="185" y2="384"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="180" y="404">GND</text>
  </g>

  <!-- RIGHT: Pull-down -->

  <g fill="currentColor" text-anchor="middle">
    <text x="540" y="30">Pull-down</text>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.85">
    <text x="540" y="55">Vcc</text>
  </g>

  <!-- Vcc rail down to switch -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="540" y1="65" x2="540" y2="118"/>
  </g>

  <!-- Switch (open): two contacts with a diagonal lever -->
  <g fill="currentColor">
    <circle cx="540" cy="120" r="3"/>
    <circle cx="540" cy="160" r="3"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="540" y1="120" x2="558" y2="155"/>
  </g>

  <!-- Switch bottom contact to input tap junction, then down to resistor -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="540" y1="162" x2="540" y2="220"/>
    <line x1="540" y1="220" x2="640" y2="220"/>
    <line x1="540" y1="220" x2="540" y2="240"/>
    <!-- Resistor -->
    <polyline points="540,240 528,250 552,265 528,280 552,295 528,310 540,320"/>
    <line x1="540" y1="320" x2="540" y2="360"/>
  </g>
  <g fill="currentColor" opacity="0.95">
    <circle cx="540" cy="220" r="3"/>
  </g>
  <g fill="currentColor">
    <text x="645" y="224">Pin</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="560" y="285">10 k&#937;</text>
  </g>

  <!-- GND symbol -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="520" y1="360" x2="560" y2="360"/>
    <line x1="528" y1="372" x2="552" y2="372"/>
    <line x1="535" y1="384" x2="545" y2="384"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="540" y="404">GND</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 20 560 200"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>Light falloff at the corners</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Radial gradient: bright in the centre, dim at the corners.
       Built on top of a medium-grey base so the corners stay
       visible in both light and dark themes (where transparent
       would otherwise blend into the page background).        -->
  <defs>
    <radialGradient id="falloff" cx="0.5" cy="0.5" r="0.71">
      <stop offset="0"    stop-color="white" stop-opacity="0.95"/>
      <stop offset="0.5"  stop-color="white" stop-opacity="0.5"/>
      <stop offset="1"    stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base fill: a medium grey that reads as "dim" against either
       a light or a dark page background. -->
  <rect x="160" y="40" width="240" height="160" fill="#5a5a5a"/>
  <!-- Brightness gradient layered on top of the base. -->
  <rect x="160" y="40" width="240" height="160" fill="url(#falloff)"/>
  <!-- Outline so the frame edges are visible in both themes. -->
  <rect x="160" y="40" width="240" height="160" fill="none"
        stroke="currentColor" stroke-width="1.6"/>
</svg>

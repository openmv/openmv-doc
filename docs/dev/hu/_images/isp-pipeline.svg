<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 20 560 380"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>ISP pipeline (colour processing and output stages)</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Input label and arrow -->
  <text x="280" y="38" fill="currentColor" text-anchor="middle" font-size="13">corrected Bayer pixels</text>
  <g stroke="currentColor" stroke-width="1.2" fill="none">
    <line x1="280" y1="44" x2="280" y2="58"/>
    <polyline points="276,54 280,58 284,54"/>
  </g>

  <!-- 8 stage boxes, 30 tall, gap 8.
       y-tops: 62, 100, 138, 176, 214, 252, 290, 328 -->
  <g stroke="currentColor" stroke-width="1.4" fill="none">
    <rect x="160" y="62"  width="240" height="30"/>
    <rect x="160" y="100" width="240" height="30"/>
    <rect x="160" y="138" width="240" height="30"/>
    <rect x="160" y="176" width="240" height="30"/>
    <rect x="160" y="214" width="240" height="30"/>
    <rect x="160" y="252" width="240" height="30"/>
    <rect x="160" y="290" width="240" height="30"/>
    <rect x="160" y="328" width="240" height="30"/>
  </g>

  <!-- Stage labels (centred in each box, baseline at box_top + 20) -->
  <g fill="currentColor" text-anchor="middle">
    <text x="280" y="82">statistics extraction</text>
    <text x="280" y="120">auto white balance</text>
    <text x="280" y="158">debayering</text>
    <text x="280" y="196">colour matrix correction</text>
    <text x="280" y="234">gamma correction</text>
    <text x="280" y="272">image scaling</text>
    <text x="280" y="310">image cropping</text>
    <text x="280" y="348">pixel packing</text>
  </g>

  <!-- Arrows between boxes -->
  <g stroke="currentColor" stroke-width="1.2" fill="none">
    <line x1="280" y1="92"  x2="280" y2="100"/>
    <line x1="280" y1="130" x2="280" y2="138"/>
    <line x1="280" y1="168" x2="280" y2="176"/>
    <line x1="280" y1="206" x2="280" y2="214"/>
    <line x1="280" y1="244" x2="280" y2="252"/>
    <line x1="280" y1="282" x2="280" y2="290"/>
    <line x1="280" y1="320" x2="280" y2="328"/>
  </g>

  <!-- Output arrow and label -->
  <g stroke="currentColor" stroke-width="1.2" fill="none">
    <line x1="280" y1="358" x2="280" y2="372"/>
    <polyline points="276,368 280,372 284,368"/>
  </g>
  <text x="280" y="390" fill="currentColor" text-anchor="middle" font-size="13">finished frame in RAM</text>
</svg>

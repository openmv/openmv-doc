<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>bidirectional N-MOSFET level shifter</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Supply labels at top, symmetric around the MOSFET centre (x=360) -->
  <g fill="currentColor" text-anchor="middle">
    <text x="240" y="40">+3.3 V</text>
    <text x="480" y="40">+5 V</text>
  </g>

  <!-- 3.3 V supply column: rail down to gate tap, then continues down through R1 -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="240" y1="50" x2="240" y2="100"/>
    <line x1="240" y1="100" x2="240" y2="120"/>
    <polyline points="240,120 228,130 252,145 228,160 252,175 228,190 240,200"/>
    <line x1="240" y1="200" x2="240" y2="240"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="262" y="164">10 k&#937;</text>
  </g>

  <!-- 5 V supply column: straight through R2 -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="480" y1="50" x2="480" y2="120"/>
    <polyline points="480,120 468,130 492,145 468,160 492,175 468,190 480,200"/>
    <line x1="480" y1="200" x2="480" y2="240"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="end">
    <text x="458" y="164">10 k&#937;</text>
  </g>

  <!-- Signal line at y=240, runs continuously through both junctions -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="100" y1="240" x2="324" y2="240"/>
    <line x1="396" y1="240" x2="620" y2="240"/>
  </g>
  <g fill="currentColor" opacity="0.95">
    <circle cx="240" cy="240" r="3"/>
    <circle cx="480" cy="240" r="3"/>
  </g>

  <!-- Signal labels -->
  <g fill="currentColor" text-anchor="end">
    <text x="95" y="244">3.3 V signal</text>
  </g>
  <g fill="currentColor">
    <text x="625" y="244">5 V signal</text>
  </g>

  <!-- Gate routing: horizontal across to the MOSFET top, then down -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="240" y1="100" x2="360" y2="100"/>
    <line x1="360" y1="100" x2="360" y2="204"/>
  </g>
  <g fill="currentColor" opacity="0.95">
    <circle cx="240" cy="100" r="3"/>
  </g>

  <!-- MOSFET body (circle) -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <circle cx="360" cy="240" r="36"/>
  </g>

  <!-- Internal schematic, rotated 90 deg: gate bar on top, channel below, S left, D right -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <!-- Gate stub from pin entry down to the gate bar -->
    <line x1="360" y1="204" x2="360" y2="222"/>
    <!-- Gate bar (horizontal, separated from channel by a small gap) -->
    <line x1="342" y1="222" x2="378" y2="222"/>
    <!-- Channel (horizontal, just below the gate bar) -->
    <line x1="342" y1="230" x2="378" y2="230"/>
    <!-- Source stub: channel left -> source pin -->
    <line x1="342" y1="230" x2="342" y2="240"/>
    <line x1="324" y1="240" x2="342" y2="240"/>
    <!-- Drain stub: channel right -> drain pin -->
    <line x1="378" y1="230" x2="378" y2="240"/>
    <line x1="378" y1="240" x2="396" y2="240"/>
  </g>
  <!-- Body diode across the MOSFET: anode at source (left), cathode at
       drain (right), drawn below the channel inside the circle. -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" opacity="0.85">
    <!-- Anode tap from the source stub corner down to the diode level -->
    <line x1="342" y1="240" x2="342" y2="258"/>
    <!-- Anode lead, horizontal into the triangle base -->
    <line x1="342" y1="258" x2="348" y2="258"/>
    <!-- Cathode lead, horizontal from the cathode bar -->
    <line x1="360" y1="258" x2="378" y2="258"/>
    <!-- Cathode tap up to the drain stub corner -->
    <line x1="378" y1="240" x2="378" y2="258"/>
    <!-- Cathode bar (short vertical line) -->
    <line x1="360" y1="252" x2="360" y2="264"/>
  </g>
  <!-- Diode triangle, anode to cathode, pointing source to drain -->
  <g fill="currentColor" opacity="0.85">
    <polygon points="348,252 348,264 360,258"/>
  </g>
  <!-- Junction dots where the diode taps the source and drain stubs -->
  <g fill="currentColor">
    <circle cx="342" cy="240" r="2.5"/>
    <circle cx="378" cy="240" r="2.5"/>
  </g>
  <!-- "body diode" annotation -->
  <g fill="currentColor" font-size="10" opacity="0.7" text-anchor="middle">
    <text x="360" y="295">body diode</text>
  </g>

  <!-- G / S / D labels, well clear of all wires and the circle edge -->
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="middle">
    <text x="385" y="194">G</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="306" y="228">S</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85">
    <text x="414" y="228">D</text>
  </g>
</svg>

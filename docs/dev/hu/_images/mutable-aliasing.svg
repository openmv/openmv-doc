<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>Two variables aliasing the same list</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrowAlias" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Labels on the left -->
  <g fill="currentColor" text-anchor="end" font-size="15">
    <text x="80" y="70">a</text>
    <text x="80" y="135">b</text>
  </g>

  <!-- Arrows from each label, converging on the list -->
  <g stroke="currentColor" stroke-width="1.5" fill="none" marker-end="url(#arrowAlias)">
    <path d="M 90 66 C 160 66, 180 100, 220 100"/>
    <path d="M 90 131 C 160 131, 180 100, 220 100"/>
  </g>

  <!-- The shared list object -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="225" y="78" width="180" height="44" rx="6"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="14">
    <text x="315" y="106">[1, 2, 3, 4]</text>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.6">
    <text x="315" y="140">one list object</text>
  </g>

  <!-- Caption -->
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.7">
    <text x="230" y="175">a.append(4) mutates the list; b sees the change.</text>
  </g>
</svg>

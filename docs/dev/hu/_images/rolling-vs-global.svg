<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 30 580 200"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>Rolling vs global shutter</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Three panels showing how a vertical bar moving rightward
       appears in the captured image for each shutter type. -->

  <!-- Panel 1: reality (the bar at one instant) -->
  <rect x="30" y="40" width="150" height="120"
        fill="none" stroke="currentColor" stroke-width="1.6"/>
  <rect x="95" y="40" width="20" height="120"
        fill="currentColor" opacity="0.7"/>
  <text x="105" y="180" fill="currentColor" text-anchor="middle">reality</text>

  <!-- Panel 2: rolling shutter
       Top row captured early -> bar at original x position.
       Bottom row captured later -> bar has moved right by 30 px.
       The captured bar is a parallelogram. -->
  <rect x="215" y="40" width="150" height="120"
        fill="none" stroke="currentColor" stroke-width="1.6"/>
  <polygon points="280,40 300,40 330,160 310,160"
           fill="currentColor" opacity="0.7"/>
  <text x="290" y="180" fill="currentColor" text-anchor="middle">rolling shutter</text>

  <!-- Panel 3: global shutter
       All rows captured at the same instant -> bar is a clean
       vertical rectangle at the position the scene held at
       that one instant. -->
  <rect x="400" y="40" width="150" height="120"
        fill="none" stroke="currentColor" stroke-width="1.6"/>
  <rect x="465" y="40" width="20" height="120"
        fill="currentColor" opacity="0.7"/>
  <text x="475" y="180" fill="currentColor" text-anchor="middle">global shutter</text>
</svg>

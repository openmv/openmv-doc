<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Two panels. The left panel shows a binary threshold mask: a black-outlined rectangle representing the frame, with a single tilted oval region of passing (filled) pixels in the middle. The right panel shows the same mask, now annotated with a green axis-aligned bounding box snugly around the oval, a cross marking the centroid in the centre of the oval, a dashed rotated rectangle aligned with the oval's long axis (the minimum-area enclosing rectangle), and a line drawn through the centroid along the oval's long direction (the major axis line). Property names label each annotation.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.85">
    <text x="170" y="40">threshold mask</text>
    <text x="540" y="40">blob anatomy</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="40" y="60" width="260" height="220"/>
  </g>

  <g fill="currentColor" opacity="0.85">
    <ellipse cx="170" cy="170" rx="80" ry="38" transform="rotate(-22 170 170)"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="380" y="60" width="340" height="220"/>
  </g>

  <g fill="currentColor" opacity="0.25">
    <ellipse cx="540" cy="170" rx="80" ry="38" transform="rotate(-22 540 170)"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <rect x="460" y="125" width="160" height="90"/>
  </g>
  <text x="623" y="123" font-size="10" fill="currentColor" opacity="0.8" text-anchor="start">rect / x,y,w,h</text>

  <g fill="none" stroke="currentColor" stroke-width="1.4" stroke-dasharray="5 3"
     transform="rotate(-22 540 170)">
    <rect x="460" y="132" width="160" height="76"/>
  </g>
  <text x="408" y="92" font-size="10" fill="currentColor" opacity="0.8" text-anchor="start">min_corners</text>
  <line x1="450" y1="95" x2="471" y2="113" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>

  <g fill="none" stroke="currentColor" stroke-width="1.5"
     transform="rotate(-22 540 170)">
    <line x1="460" y1="170" x2="620" y2="170"/>
  </g>
  <text x="690" y="231" font-size="10" fill="currentColor" opacity="0.8" text-anchor="end">major axis</text>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <line x1="532" y1="170" x2="548" y2="170"/>
    <line x1="540" y1="162" x2="540" y2="178"/>
  </g>
  <g fill="currentColor">
    <circle cx="540" cy="170" r="2"/>
  </g>
  <text x="540" y="252" font-size="10" fill="currentColor" opacity="0.8" text-anchor="middle">cx, cy</text>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.55">
    <text x="380" y="300">the bounding rectangle is axis-aligned; the dashed rotated rectangle is the tightest fit;</text>
    <text x="380" y="314">the major-axis line and the centroid come straight off the blob result object</text>
  </g>
</svg>

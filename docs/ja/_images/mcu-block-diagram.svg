<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>microcontroller block diagram</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrMcu" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Chip outline -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <rect x="40" y="40" width="640" height="340" rx="14"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="60" y="32">microcontroller (MCU)</text>
  </g>

  <!-- CPU + memory row -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="120" y="70" width="120" height="60" rx="6"/>
    <rect x="300" y="70" width="120" height="60" rx="6"/>
    <rect x="480" y="70" width="120" height="60" rx="6"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="180" y="104">CPU</text>
    <text x="360" y="98">RAM</text>
    <text x="540" y="98">Flash</text>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.65">
    <text x="360" y="115">working memory</text>
    <text x="540" y="115">program storage</text>
  </g>

  <!-- Internal bus -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <line x1="180" y1="130" x2="180" y2="165"/>
    <line x1="360" y1="130" x2="360" y2="165"/>
    <line x1="540" y1="130" x2="540" y2="165"/>
    <line x1="180" y1="165" x2="540" y2="165"/>
    <line x1="180" y1="165" x2="180" y2="200"/>
    <line x1="360" y1="165" x2="360" y2="200"/>
    <line x1="540" y1="165" x2="540" y2="200"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.65" text-anchor="middle">
    <text x="270" y="183">internal bus</text>
  </g>

  <!-- Peripheral row -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="120" y="200" width="120" height="60" rx="6"/>
    <rect x="320" y="200" width="80"  height="60" rx="6"/>
    <rect x="480" y="200" width="120" height="60" rx="6"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="180" y="235">GPIO</text>
    <text x="360" y="235">ADC</text>
    <text x="540" y="235">UART</text>
  </g>

  <!-- Pin arrows leaving the chip bottom -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrMcu)">
    <line x1="180" y1="260" x2="180" y2="405"/>
    <line x1="360" y1="260" x2="360" y2="405"/>
    <line x1="540" y1="260" x2="540" y2="405"/>
  </g>

  <!-- Pin labels below -->
  <g fill="currentColor" text-anchor="middle" font-size="11" opacity="0.7">
    <text x="180" y="430">digital pins</text>
    <text x="360" y="430">analog pin</text>
    <text x="540" y="430">serial pins</text>
  </g>
</svg>

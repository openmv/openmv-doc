<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>A horizontal grayscale gradient at the top representing pixel values from 0 to 255, with brackets marking an inclusive threshold range (lo, hi). Below it, a binary output bar shows white inside the range and black outside it.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <linearGradient id="grayRange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
  </defs>

  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.85">
    <text x="380" y="50">input image  --  pixel values 0 to 255</text>
  </g>
  <rect x="80" y="70" width="600" height="60" fill="url(#grayRange)" stroke="currentColor" stroke-width="1.2"/>

  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="80" y="155" text-anchor="middle">0</text>
    <text x="680" y="155" text-anchor="middle">255</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <line x1="270" y1="60" x2="270" y2="140"/>
    <line x1="270" y1="60" x2="280" y2="60"/>
    <line x1="270" y1="140" x2="280" y2="140"/>
    <line x1="490" y1="60" x2="490" y2="140"/>
    <line x1="490" y1="60" x2="480" y2="60"/>
    <line x1="490" y1="140" x2="480" y2="140"/>
  </g>
  <g fill="currentColor" font-size="12" font-weight="bold" text-anchor="middle">
    <text x="270" y="180">lo</text>
    <text x="490" y="180">hi</text>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.65">
    <text x="380" y="180">threshold range (lo, hi)</text>
  </g>

  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.85">
    <text x="380" y="220">binary output  --  on inside the range, off outside</text>
  </g>
  <g stroke="currentColor" stroke-width="1.2">
    <rect x="80" y="235" width="190" height="50" fill="#101010"/>
    <rect x="270" y="235" width="220" height="50" fill="#f5f5f5"/>
    <rect x="490" y="235" width="190" height="50" fill="#101010"/>
  </g>
</svg>

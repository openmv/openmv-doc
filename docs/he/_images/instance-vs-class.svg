<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>class attributes vs instance attributes</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrIvc" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Class box at top -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="170" y="20" width="200" height="100" rx="8"/>
  </g>
  <g fill="currentColor">
    <text x="270" y="44" text-anchor="middle">class Counter</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="184" y="78">kind = "tally"</text>
    <text x="184" y="100">def __init__(self):</text>
  </g>

  <!-- Instance a (left) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="40" y="200" width="180" height="80" rx="8"/>
  </g>
  <g fill="currentColor">
    <text x="130" y="224" text-anchor="middle">instance a</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="54" y="252">value = 7</text>
  </g>

  <!-- Instance b (right) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="320" y="200" width="180" height="80" rx="8"/>
  </g>
  <g fill="currentColor">
    <text x="410" y="224" text-anchor="middle">instance b</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="334" y="252">value = 12</text>
  </g>

  <!-- Arrows from instances up to class -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrIvc)">
    <line x1="170" y1="195" x2="220" y2="125"/>
    <line x1="370" y1="195" x2="320" y2="125"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="148" y="170" text-anchor="end">looks up kind</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>tick counter wraparound</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrTicks" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Number line -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <line x1="60" y1="100" x2="540" y2="100"/>
    <!-- end-of-line caps -->
    <line x1="60" y1="92" x2="60" y2="108"/>
    <line x1="540" y1="92" x2="540" y2="108"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="60" y="128">0</text>
    <text x="540" y="128">MAX</text>
  </g>

  <!-- start tick (near MAX) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <line x1="470" y1="90" x2="470" y2="110"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="470" y="80">start</text>
  </g>

  <!-- end tick (near 0) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <line x1="130" y1="90" x2="130" y2="110"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="130" y="80">end</text>
  </g>

  <!-- forward-flow arrows on the line -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrTicks)" opacity="0.6">
    <line x1="470" y1="100" x2="525" y2="100"/>
    <line x1="60"  y1="100" x2="125" y2="100"/>
  </g>

  <!-- wrap-around arrow from MAX back to 0 -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrTicks)" stroke-dasharray="4 3">
    <path d="M 540 100 C 580 100, 580 180, 300 180 C 20 180, 20 100, 56 100"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="12" opacity="0.75">
    <text x="300" y="200">wraps back to 0</text>
  </g>

  <!-- Bottom: comparison of naive vs ticks_diff -->
  <g fill="currentColor">
    <text x="60" y="238">end - start                 &#8594; large negative (wrong)</text>
    <text x="60" y="256">ticks_diff(end, start)      &#8594; small positive (right)</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>with-statement flow: __enter__, body, __exit__</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrWith" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- __enter__ -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="200" y="20" width="160" height="50" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="280" y="50">__enter__</text>
  </g>

  <!-- arrow down to body -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrWith)">
    <line x1="280" y1="70" x2="280" y2="105"/>
  </g>

  <!-- body -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="200" y="110" width="160" height="50" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="280" y="140">body</text>
  </g>

  <!-- normal branch -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrWith)">
    <path d="M 230 160 C 180 200, 160 220, 200 260"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="155" y="210">normal</text>
  </g>

  <!-- exception branch -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrWith)" stroke-dasharray="4 3">
    <path d="M 330 160 C 380 200, 400 220, 360 260"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="410" y="210">exception</text>
  </g>

  <!-- __exit__ -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="200" y="265" width="160" height="50" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="280" y="295">__exit__</text>
  </g>

  <!-- caption -->
  <g fill="currentColor" font-size="12" opacity="0.7" text-anchor="middle">
    <text x="280" y="340">__exit__ runs whether the body finished or raised</text>
  </g>
</svg>

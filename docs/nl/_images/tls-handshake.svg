<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>The TLS handshake on top of an open TCP connection, followed by encrypted data flow</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Two endpoint columns -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="60" y="30" width="160" height="40"/>
    <rect x="500" y="30" width="160" height="40"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="140" y="55">client</text>
    <text x="580" y="55">server</text>
  </g>

  <!-- Vertical time lines -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.4">
    <line x1="140" y1="70" x2="140" y2="430"/>
    <line x1="580" y1="70" x2="580" y2="430"/>
  </g>

  <!-- "TCP connection already open" header -->
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="360" y="92">TCP connection already open (see previous figure)</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.4">
    <line x1="60" y1="100" x2="660" y2="100"/>
  </g>

  <!-- Handshake block 1: ClientHello (client -> server) -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="125">ClientHello</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="360" y="139">"here is what encryption I can do"</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="140" y1="155" x2="574" y2="170"/>
    <polygon points="574,166 574,174 580,170" fill="currentColor"/>
  </g>

  <!-- Handshake block 2: ServerHello + cert + key share (server -> client) -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="195">ServerHello + certificate + key share</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="360" y="209">"use this; here is my certificate"</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="580" y1="225" x2="146" y2="240"/>
    <polygon points="146,236 146,244 140,240" fill="currentColor"/>
  </g>

  <!-- Handshake block 3: Finished (client -> server) -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="265">Finished</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="360" y="279">"handshake done, switching to encrypted"</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="140" y1="295" x2="574" y2="310"/>
    <polygon points="574,306 574,314 580,310" fill="currentColor"/>
  </g>

  <!-- TLS session open horizontal line -->
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="360" y="340">TLS session open -- everything after this is encrypted</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6">
    <line x1="60" y1="350" x2="660" y2="350"/>
  </g>

  <!-- Encrypted data, client -> server -->
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="377">encrypted data</text>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="2.5">
    <line x1="140" y1="390" x2="574" y2="390"/>
    <polygon points="574,385 574,395 580,390" fill="currentColor"/>
  </g>

  <!-- Encrypted data, server -> client -->
  <g fill="none" stroke="currentColor" stroke-width="2.5">
    <line x1="580" y1="415" x2="146" y2="415"/>
    <polygon points="146,410 146,420 140,415" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="433">encrypted data</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>inheritance tree -- Shape and Square</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrInh" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Shape (base) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="160" y="20" width="200" height="110" rx="8"/>
  </g>
  <g fill="currentColor">
    <text x="260" y="44" text-anchor="middle">class Shape</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="174" y="70">self.name</text>
    <text x="174" y="90">describe(self)</text>
    <text x="174" y="110">area(self)  &#8594; 0</text>
  </g>

  <!-- inheritance arrow -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrInh)">
    <line x1="260" y1="130" x2="260" y2="195"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.6">
    <text x="270" y="168">extends</text>
  </g>

  <!-- Square (subclass) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="160" y="200" width="200" height="120" rx="8"/>
  </g>
  <g fill="currentColor">
    <text x="260" y="224" text-anchor="middle">class Square(Shape)</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="174" y="250">self.side</text>
    <text x="174" y="270">describe(self)   inherited</text>
    <text x="174" y="290">area(self)       overridden</text>
    <text x="174" y="310">                 returns side * side</text>
  </g>
</svg>

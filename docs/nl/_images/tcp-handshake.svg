<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>The three-way TCP handshake, followed by bidirectional data flow</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Two endpoint columns -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="60" y="30" width="160" height="40"/>
    <rect x="500" y="30" width="160" height="40"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="140" y="55">client</text>
    <text x="580" y="55">server</text>
  </g>

  <!-- Vertical time lines (client at x=140, server at x=580) -->
  <g fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.4">
    <line x1="140" y1="70" x2="140" y2="370"/>
    <line x1="580" y1="70" x2="580" y2="370"/>
  </g>

  <!-- SYN (client -> server), tip lands exactly on x=580 -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="140" y1="100" x2="574" y2="120"/>
    <polygon points="574,116 574,124 580,120" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="103">SYN</text>
  </g>

  <!-- SYN-ACK (server -> client), tip lands exactly on x=140 -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="580" y1="155" x2="146" y2="175"/>
    <polygon points="146,171 146,179 140,175" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="155">SYN-ACK</text>
  </g>

  <!-- ACK (client -> server), tip lands exactly on x=580 -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="140" y1="205" x2="574" y2="225"/>
    <polygon points="574,221 574,229 580,225" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="208">ACK</text>
  </g>

  <!-- Connection-open horizontal line -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6">
    <line x1="60" y1="260" x2="660" y2="260"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="360" y="252">connection open</text>
  </g>

  <!-- Bidirectional data, tails and tips both touch the timelines exactly -->
  <g fill="none" stroke="currentColor" stroke-width="2.5">
    <line x1="140" y1="305" x2="574" y2="305"/>
    <polygon points="574,300 574,310 580,305" fill="currentColor"/>
    <line x1="580" y1="335" x2="146" y2="335"/>
    <polygon points="146,330 146,340 140,335" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="360" y="299">data</text>
    <text x="360" y="358">data</text>
  </g>
</svg>

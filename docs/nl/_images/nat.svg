<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>NAT: private devices share one public IP at the router</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Camera box -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="20" y="40" width="120" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="80" y="65">camera</text>
    <text x="80" y="85" font-size="11" opacity="0.7">192.168.1.50</text>
  </g>

  <!-- Laptop box -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="20" y="220" width="120" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="80" y="245">laptop</text>
    <text x="80" y="265" font-size="11" opacity="0.7">192.168.1.51</text>
  </g>

  <!-- Router box (centre) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="240" y="130" width="200" height="80"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="340" y="160">router</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="340" y="180">private: 192.168.1.1</text>
    <text x="340" y="196">public:  203.0.113.5</text>
  </g>

  <!-- Lines from devices to router -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="140" y1="70" x2="240" y2="150"/>
    <line x1="140" y1="250" x2="240" y2="190"/>
  </g>

  <!-- Internet cloud (right, pushed out to leave room for the label) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <ellipse cx="720" cy="170" rx="80" ry="50"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="720" y="170">internet</text>
  </g>

  <!-- Line from router to internet (length 200) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="440" y1="170" x2="640" y2="170"/>
  </g>

  <!-- Outbound arrow tag, centred on the line between the boxes -->
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="540" y="158">source rewritten to</text>
    <text x="540" y="188">203.0.113.5</text>
  </g>

  <!-- Top label -->
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="80" y="20">private side</text>
    <text x="720" y="100">public side</text>
  </g>
</svg>

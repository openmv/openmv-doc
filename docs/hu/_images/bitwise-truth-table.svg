<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Three truth tables for the AND, OR, and XOR bitwise operations at the top, and below them two binary images A and B with the result of A.b_and(B) shown to the right.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="currentColor" font-size="13" font-weight="bold" text-anchor="middle">
    <text x="130" y="40">AND</text>
    <text x="380" y="40">OR</text>
    <text x="630" y="40">XOR</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="60" y="55" width="140" height="125"/>
    <line x1="60" y1="80" x2="200" y2="80"/>
    <line x1="105" y1="55" x2="105" y2="180"/>
    <line x1="150" y1="55" x2="150" y2="180"/>
    <line x1="60" y1="105" x2="200" y2="105"/>
    <line x1="60" y1="130" x2="200" y2="130"/>
    <line x1="60" y1="155" x2="200" y2="155"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="83" y="73">A</text>
    <text x="128" y="73">B</text>
    <text x="175" y="73">out</text>
    <text x="83" y="98">0</text>  <text x="128" y="98">0</text>  <text x="175" y="98">0</text>
    <text x="83" y="123">0</text> <text x="128" y="123">1</text> <text x="175" y="123">0</text>
    <text x="83" y="148">1</text> <text x="128" y="148">0</text> <text x="175" y="148">0</text>
    <text x="83" y="173">1</text> <text x="128" y="173">1</text> <text x="175" y="173">1</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="310" y="55" width="140" height="125"/>
    <line x1="310" y1="80" x2="450" y2="80"/>
    <line x1="355" y1="55" x2="355" y2="180"/>
    <line x1="400" y1="55" x2="400" y2="180"/>
    <line x1="310" y1="105" x2="450" y2="105"/>
    <line x1="310" y1="130" x2="450" y2="130"/>
    <line x1="310" y1="155" x2="450" y2="155"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="333" y="73">A</text>
    <text x="378" y="73">B</text>
    <text x="425" y="73">out</text>
    <text x="333" y="98">0</text>  <text x="378" y="98">0</text>  <text x="425" y="98">0</text>
    <text x="333" y="123">0</text> <text x="378" y="123">1</text> <text x="425" y="123">1</text>
    <text x="333" y="148">1</text> <text x="378" y="148">0</text> <text x="425" y="148">1</text>
    <text x="333" y="173">1</text> <text x="378" y="173">1</text> <text x="425" y="173">1</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="560" y="55" width="140" height="125"/>
    <line x1="560" y1="80" x2="700" y2="80"/>
    <line x1="605" y1="55" x2="605" y2="180"/>
    <line x1="650" y1="55" x2="650" y2="180"/>
    <line x1="560" y1="105" x2="700" y2="105"/>
    <line x1="560" y1="130" x2="700" y2="130"/>
    <line x1="560" y1="155" x2="700" y2="155"/>
  </g>
  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="583" y="73">A</text>
    <text x="628" y="73">B</text>
    <text x="675" y="73">out</text>
    <text x="583" y="98">0</text>  <text x="628" y="98">0</text>  <text x="675" y="98">0</text>
    <text x="583" y="123">0</text> <text x="628" y="123">1</text> <text x="675" y="123">1</text>
    <text x="583" y="148">1</text> <text x="628" y="148">0</text> <text x="675" y="148">1</text>
    <text x="583" y="173">1</text> <text x="628" y="173">1</text> <text x="675" y="173">0</text>
  </g>

  <g fill="currentColor" font-size="12" font-weight="bold" text-anchor="middle">
    <text x="140" y="230">A</text>
    <text x="380" y="230">B</text>
    <text x="620" y="230">A.b_and(B)</text>
  </g>

  <g fill="currentColor">
    <rect x="80" y="250" width="30" height="30"/>
    <rect x="110" y="250" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="140" y="250" width="30" height="30"/>
    <rect x="170" y="250" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="80" y="280" width="30" height="30"/>
    <rect x="110" y="280" width="30" height="30"/>
    <rect x="140" y="280" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="170" y="280" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="80" y="310" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="110" y="310" width="30" height="30"/>
    <rect x="140" y="310" width="30" height="30"/>
    <rect x="170" y="310" width="30" height="30" fill="none" stroke="currentColor"/>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="80" y="250" width="120" height="90"/>
  </g>

  <g fill="currentColor">
    <rect x="320" y="250" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="350" y="250" width="30" height="30"/>
    <rect x="380" y="250" width="30" height="30"/>
    <rect x="410" y="250" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="320" y="280" width="30" height="30"/>
    <rect x="350" y="280" width="30" height="30"/>
    <rect x="380" y="280" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="410" y="280" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="320" y="310" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="350" y="310" width="30" height="30"/>
    <rect x="380" y="310" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="410" y="310" width="30" height="30"/>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="320" y="250" width="120" height="90"/>
  </g>

  <g fill="currentColor">
    <rect x="560" y="250" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="590" y="250" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="620" y="250" width="30" height="30"/>
    <rect x="650" y="250" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="560" y="280" width="30" height="30"/>
    <rect x="590" y="280" width="30" height="30"/>
    <rect x="620" y="280" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="650" y="280" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="560" y="310" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="590" y="310" width="30" height="30"/>
    <rect x="620" y="310" width="30" height="30" fill="none" stroke="currentColor"/>
    <rect x="650" y="310" width="30" height="30" fill="none" stroke="currentColor"/>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="560" y="250" width="120" height="90"/>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.65">
    <text x="380" y="380">filled cells are 1, hollow cells are 0;  the result has 1 only where both inputs did</text>
  </g>
</svg>

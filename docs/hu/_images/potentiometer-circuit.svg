<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Potentiometer wired between 3.3 V and GND with wiper to an ADC pin</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- 3.3V label at top -->
  <g fill="currentColor" text-anchor="middle">
    <text x="140" y="30">3.3 V</text>
  </g>

  <!-- Wire from 3.3V down to top of pot -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="140" y1="40" x2="140" y2="70"/>
  </g>

  <!-- Pot resistor zigzag (vertical) -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <polyline points="140,70 128,82 152,100 128,118 152,136 128,154 152,172 128,190 140,200"/>
  </g>

  <!-- Wiper arrow head (touching the zigzag, pointing left into it) -->
  <g fill="currentColor">
    <polygon points="158,135 168,131 168,139"/>
  </g>

  <!-- Wiper wire extending right from arrow shaft to ADC pin label -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="168" y1="135" x2="270" y2="135"/>
  </g>
  <g fill="currentColor">
    <text x="276" y="139">ADC pin</text>
  </g>

  <!-- Wire from bottom of pot down to GND -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="140" y1="200" x2="140" y2="230"/>
  </g>

  <!-- GND symbol -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="120" y1="230" x2="160" y2="230"/>
    <line x1="128" y1="242" x2="152" y2="242"/>
    <line x1="135" y1="254" x2="145" y2="254"/>
  </g>
</svg>

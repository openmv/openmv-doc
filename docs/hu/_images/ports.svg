<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>Many programs share one IP; the destination port routes to the right one</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Host outline (large box on right) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="380" y="40" width="320" height="280"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="13">
    <text x="540" y="62">host: 192.168.1.50</text>
  </g>

  <!-- Three programs inside host -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <rect x="430" y="90" width="220" height="50"/>
    <rect x="430" y="160" width="220" height="50"/>
    <rect x="430" y="230" width="220" height="50"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="540" y="115">web server</text>
    <text x="540" y="185">video call</text>
    <text x="540" y="255">chat client</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="540" y="132">port 80</text>
    <text x="540" y="202">port 5004</text>
    <text x="540" y="272">port 4321</text>
  </g>

  <!-- Three incoming arrows from the left, tips land on each box's left edge -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="60" y1="115" x2="424" y2="115"/>
    <polygon points="424,111 424,119 430,115" fill="currentColor"/>
    <line x1="60" y1="185" x2="424" y2="185"/>
    <polygon points="424,181 424,189 430,185" fill="currentColor"/>
    <line x1="60" y1="255" x2="424" y2="255"/>
    <polygon points="424,251 424,259 430,255" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="start">
    <text x="60" y="110">arriving packet, dst port 80</text>
    <text x="60" y="180">arriving packet, dst port 5004</text>
    <text x="60" y="250">arriving packet, dst port 4321</text>
  </g>
</svg>

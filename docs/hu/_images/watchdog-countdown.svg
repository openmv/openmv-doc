<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Watchdog timer countdown: feed() reloads the counter; reaching zero triggers reset</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrWdt" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- X-axis (time) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrWdt)">
    <line x1="80" y1="240" x2="680" y2="240"/>
  </g>
  <g fill="currentColor">
    <text x="688" y="244">t</text>
  </g>

  <!-- Y-axis (counter) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrWdt)">
    <line x1="80" y1="240" x2="80" y2="40"/>
  </g>
  <g fill="currentColor" text-anchor="end">
    <text x="74" y="35">counter</text>
  </g>

  <!-- "timeout" reference line -->
  <g stroke="currentColor" fill="none" stroke-width="1" stroke-dasharray="4 3" opacity="0.5">
    <line x1="80" y1="60" x2="660" y2="60"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="74" y="64">timeout</text>
  </g>

  <!-- Three sawtooth ramps: feed() resets the counter partway down (y=150,
       roughly half the timeout). After the third feed, the next interval has
       no feed and the same slope carries the counter all the way to zero
       (y=240) at x=580, triggering the MCU reset. -->
  <g stroke="currentColor" fill="none" stroke-width="2.2">
    <polyline points="80,60 180,150 180,60 280,150 280,60 380,150 380,60 580,240"/>
  </g>

  <!-- Feed event markers -->
  <g fill="currentColor">
    <circle cx="180" cy="60" r="3.5"/>
    <circle cx="280" cy="60" r="3.5"/>
    <circle cx="380" cy="60" r="3.5"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="middle">
    <text x="180" y="40">feed()</text>
    <text x="280" y="40">feed()</text>
    <text x="380" y="40">feed()</text>
  </g>

  <!-- Reset event marker (counter reached zero on the missed-feed ramp) -->
  <g stroke="currentColor" fill="none" stroke-width="2" opacity="0.9">
    <line x1="580" y1="240" x2="580" y2="60"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.95" text-anchor="middle">
    <text x="580" y="40">reset</text>
  </g>

  <!-- Caption / equation under x-axis -->
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="380" y="280">each feed() reloads the counter to the timeout value</text>
    <text x="380" y="296">if the counter reaches zero, the MCU resets</text>
  </g>
</svg>

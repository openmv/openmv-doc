<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>scope frames -- local nested in module nested in built-in</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrScope" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Built-in scope (outermost) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="20" y="20" width="450" height="280" rx="8"/>
  </g>
  <g fill="currentColor">
    <text x="34" y="42">Built-in scope</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="34" y="60">print, len, range, type, ...</text>
  </g>

  <!-- Module scope -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="50" y="80" width="390" height="200" rx="8"/>
  </g>
  <g fill="currentColor">
    <text x="64" y="102">Module scope</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="64" y="120">CAMERA = "OpenMV"</text>
  </g>

  <!-- Local scope (innermost) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="80" y="140" width="320" height="120" rx="8"/>
  </g>
  <g fill="currentColor">
    <text x="94" y="162">Local scope</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="94" y="184">def banner():</text>
    <text x="124" y="202">print(CAMERA)</text>
  </g>

  <!-- Arrow showing lookup direction (from inside out) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrScope)">
    <line x1="510" y1="240" x2="510" y2="50"/>
  </g>
  <g fill="currentColor" font-size="12" opacity="0.75">
    <text x="525" y="160">name lookup</text>
    <text x="525" y="178">walks outward</text>
  </g>
</svg>

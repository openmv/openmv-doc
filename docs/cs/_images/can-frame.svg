<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Standard CAN data frame fields: SOF, ID, RTR, control, data, CRC, ACK, EOF</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Field boxes laid out horizontally with widths roughly proportional to bit count -->
  <!-- SOF: 1 bit -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="40" y="60" width="30" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11">
    <text x="55" y="95">SOF</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="55" y="140">1 bit</text>
  </g>

  <!-- ID: 11 bits -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="70" y="60" width="140" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11">
    <text x="140" y="95">ID</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="140" y="140">11 bits</text>
  </g>

  <!-- RTR: 1 bit -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="210" y="60" width="30" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11">
    <text x="225" y="95">RTR</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="225" y="140">1 bit</text>
  </g>

  <!-- Control (DLC etc.): 6 bits -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="240" y="60" width="80" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11">
    <text x="280" y="95">control</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="280" y="140">6 bits</text>
  </g>

  <!-- Data: 0-64 bits -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="320" y="60" width="180" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11">
    <text x="410" y="95">data</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="410" y="140">0 -- 8 bytes</text>
  </g>

  <!-- CRC: 16 bits -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="500" y="60" width="110" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11">
    <text x="555" y="95">CRC</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="555" y="140">16 bits</text>
  </g>

  <!-- ACK: 2 bits -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="610" y="60" width="40" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11">
    <text x="630" y="95">ACK</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="630" y="140">2 bits</text>
  </g>

  <!-- EOF: 7 bits -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="650" y="60" width="70" height="60"/>
  </g>
  <g fill="currentColor" text-anchor="middle" font-size="11">
    <text x="685" y="95">EOF</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="685" y="140">7 bits</text>
  </g>

  <!-- Time arrow at top -->
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="40" y="40">earlier in time</text>
    <text x="640" y="40">later</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>The eight drawing primitives the Image class exposes -- draw_line, draw_rectangle, draw_circle, draw_ellipse, draw_cross, draw_arrow, draw_edges, and draw_string -- shown one per panel.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <line x1="40" y1="60" x2="175" y2="60"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="107" y="135">draw_line</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <rect x="240" y="35" width="110" height="60"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="295" y="135">draw_rectangle</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="475" cy="65" r="35"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="475" y="135">draw_circle</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <ellipse cx="655" cy="65" rx="60" ry="28"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="655" y="135">draw_ellipse</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <line x1="80" y1="215" x2="135" y2="215"/>
    <line x1="107" y1="190" x2="107" y2="240"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="107" y="285">draw_cross</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <line x1="225" y1="215" x2="345" y2="215"/>
  </g>
  <g fill="currentColor" stroke="none">
    <polygon points="337,209 337,221 345,215"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="285" y="285">draw_arrow</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <polygon points="430,190 525,205 515,250 420,235"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="475" y="285">draw_edges</text>
  </g>

  <g fill="currentColor" font-size="22" font-weight="bold" text-anchor="middle">
    <text x="655" y="225">hello</text>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.75">
    <text x="655" y="285">draw_string</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Ohm's law triangle</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Triangle -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <polygon points="200,50 320,250 80,250"/>
    <!-- horizontal divider between V (top) and I, R (bottom).
         Triangle edges at y=170 intersect at x=128 (left) and
         x=272 (right); use 128..272 to land exactly on them. -->
    <line x1="128" y1="170" x2="272" y2="170"/>
    <!-- vertical divider between I and R -->
    <line x1="200" y1="170" x2="200" y2="250"/>
  </g>

  <!-- Variables inside the triangle -->
  <g fill="currentColor" text-anchor="middle" font-size="28">
    <text x="200" y="140">V</text>
    <text x="160" y="220">I</text>
    <text x="240" y="220">R</text>
  </g>

  <!-- Rearranged forms around the triangle -->
  <g fill="currentColor" font-size="16">
    <text x="360" y="100">V = I &#215; R</text>
    <text x="360" y="160">I = V / R</text>
    <text x="360" y="220">R = V / I</text>
  </g>

  <!-- Hint: cover the unknown, read off the rest -->
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="200" y="280">cover the unknown letter; the other two read off as the formula</text>
  </g>
</svg>

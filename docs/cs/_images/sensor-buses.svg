<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 50 560 200"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>Sensor and MCU buses</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Sensor box -->
  <rect x="40" y="80" width="150" height="160"
        fill="none" stroke="currentColor" stroke-width="1.6"/>
  <text x="115" y="168" fill="currentColor" text-anchor="middle" font-size="14">sensor</text>

  <!-- MCU box -->
  <rect x="370" y="80" width="150" height="160"
        fill="none" stroke="currentColor" stroke-width="1.6"/>
  <text x="445" y="168" fill="currentColor" text-anchor="middle" font-size="14">MCU</text>

  <!-- I2C control bus: bidirectional arrows in upper region -->
  <g stroke="currentColor" stroke-width="1.2" fill="none">
    <line x1="190" y1="120" x2="370" y2="120"/>
    <polyline points="200,115 190,120 200,125"/>
    <polyline points="360,115 370,120 360,125"/>
  </g>
  <text x="280" y="110" fill="currentColor" text-anchor="middle" font-size="11">I2C (SCL, SDA)</text>

  <!-- Pixel data bus: thicker single-direction arrow in lower region.
       Tip ends at x=365 so it stops 5 px before the MCU box edge at
       x=370 rather than poking into it. -->
  <line x1="190" y1="200" x2="355" y2="200"
        stroke="currentColor" stroke-width="3" opacity="0.7"/>
  <polygon points="355,190 365,200 355,210"
           fill="currentColor" opacity="0.7"/>
  <text x="278" y="190" fill="currentColor" text-anchor="middle" font-size="11">parallel or MIPI</text>
</svg>

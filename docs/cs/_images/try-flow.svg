<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>try / except / else / finally flow</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrTry" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- try block -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="230" y="20" width="160" height="50" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="310" y="50">try body</text>
  </g>

  <!-- success branch -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrTry)">
    <line x1="280" y1="70" x2="180" y2="135"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="180" y="100" text-anchor="end">no exception</text>
  </g>

  <!-- exception branch -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrTry)" stroke-dasharray="4 3">
    <line x1="340" y1="70" x2="440" y2="135"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="440" y="100">raises</text>
  </g>

  <!-- else block -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="100" y="140" width="160" height="50" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="180" y="170">else block</text>
  </g>

  <!-- except block -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="360" y="140" width="160" height="50" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="440" y="170">except block</text>
  </g>

  <!-- both flow into finally -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrTry)">
    <line x1="180" y1="190" x2="280" y2="245"/>
    <line x1="440" y1="190" x2="340" y2="245"/>
  </g>

  <!-- uncaught path also enters finally -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrTry)" stroke-dasharray="4 3">
    <path d="M 520 165 C 580 165, 580 250, 395 250"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7">
    <text x="535" y="210">uncaught</text>
  </g>

  <!-- finally block -->
  <g stroke="currentColor" fill="none" stroke-width="1.5">
    <rect x="230" y="250" width="160" height="50" rx="8"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="310" y="280">finally block</text>
  </g>

  <!-- propagation arrow -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrTry)" stroke-dasharray="4 3">
    <line x1="310" y1="300" x2="310" y2="345"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="310" y="365">return / propagate</text>
  </g>
</svg>

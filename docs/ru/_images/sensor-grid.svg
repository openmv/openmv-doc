<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 50 560 240"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>Sensor pixel array and read-out order</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- 6 columns x 4 rows of pixel cells, each 40x40 px.
       Grid spans x=140..380, y=80..240. -->
  <g stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.6">
    <line x1="140" y1="80" x2="140" y2="240"/>
    <line x1="180" y1="80" x2="180" y2="240"/>
    <line x1="220" y1="80" x2="220" y2="240"/>
    <line x1="260" y1="80" x2="260" y2="240"/>
    <line x1="300" y1="80" x2="300" y2="240"/>
    <line x1="340" y1="80" x2="340" y2="240"/>
    <line x1="380" y1="80" x2="380" y2="240"/>
    <line x1="140" y1="80" x2="380" y2="80"/>
    <line x1="140" y1="120" x2="380" y2="120"/>
    <line x1="140" y1="160" x2="380" y2="160"/>
    <line x1="140" y1="200" x2="380" y2="200"/>
    <line x1="140" y1="240" x2="380" y2="240"/>
  </g>

  <!-- One right-pointing arrow along each row's vertical centre.
       Row 0 (bottom, read first) is at y=220, row 3 (top, read last)
       is at y=100. -->
  <g stroke="currentColor" stroke-width="1.4" fill="none">
    <line x1="150" y1="220" x2="365" y2="220"/>
    <polyline points="358,214 370,220 358,226"/>
    <line x1="150" y1="180" x2="365" y2="180"/>
    <polyline points="358,174 370,180 358,186"/>
    <line x1="150" y1="140" x2="365" y2="140"/>
    <polyline points="358,134 370,140 358,146"/>
    <line x1="150" y1="100" x2="365" y2="100"/>
    <polyline points="358,94 370,100 358,106"/>
  </g>

  <!-- "read first" marker on the bottom-left cell -->
  <circle cx="160" cy="220" r="5" fill="currentColor"/>
  <text x="160" y="265" fill="currentColor" text-anchor="middle" font-size="11">read first</text>

  <!-- "read last" label on the top-right cell -->
  <text x="360" y="72" fill="currentColor" text-anchor="middle" font-size="11">read last</text>

  <!-- "rows advance upward" indicator to the right of the grid -->
  <g stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.7">
    <line x1="410" y1="220" x2="410" y2="105"/>
    <polyline points="405,113 410,100 415,113"/>
  </g>
  <text x="420" y="164" fill="currentColor" font-size="11">rows advance</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 360"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>capacitor discharging curve with the RC time constant marked</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrRcD" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- X-axis (time) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrRcD)">
    <line x1="80" y1="280" x2="575" y2="280"/>
  </g>
  <g fill="currentColor">
    <text x="586" y="284">t</text>
  </g>

  <!-- Y-axis (voltage) -->
  <g stroke="currentColor" fill="none" stroke-width="1.5" marker-end="url(#arrRcD)">
    <line x1="80" y1="280" x2="80" y2="55"/>
  </g>
  <g fill="currentColor" text-anchor="end">
    <text x="74" y="50">V</text>
  </g>

  <!-- Vmax dashed horizontal line at the starting voltage -->
  <g stroke="currentColor" fill="none" stroke-width="1" stroke-dasharray="4 3" opacity="0.5">
    <line x1="80" y1="80" x2="560" y2="80"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="74" y="84">Vmax</text>
  </g>

  <!-- 0.37 Vmax dashed horizontal up to the tau intersection -->
  <g stroke="currentColor" fill="none" stroke-width="1" stroke-dasharray="4 3" opacity="0.6">
    <line x1="80" y1="206" x2="200" y2="206"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="74" y="210">0.37 Vmax</text>
  </g>

  <!-- Tau dashed vertical from x-axis up to the intersection -->
  <g stroke="currentColor" fill="none" stroke-width="1" stroke-dasharray="4 3" opacity="0.6">
    <line x1="200" y1="280" x2="200" y2="206"/>
  </g>
  <g fill="currentColor" font-size="13" opacity="0.95" text-anchor="middle">
    <text x="200" y="300">&#964;</text>
  </g>

  <!-- Discharge curve: exponential decay from (80, 80) approaching (560, 280) -->
  <g stroke="currentColor" fill="none" stroke-width="2.2">
    <path d="M 80,80 C 110,80 130,160 200,206 C 270,252 320,270 400,278 L 560,280"/>
  </g>

  <!-- Marker dot at the (tau, 0.37 Vmax) intersection -->
  <g fill="currentColor">
    <circle cx="200" cy="206" r="3.5"/>
  </g>

  <!-- Equation caption -->
  <g fill="currentColor" font-size="12" opacity="0.75" text-anchor="middle">
    <text x="320" y="338">V(t) = Vmax &#215; exp(&#8722;t/&#964;),  &#964; = R &#215; C</text>
  </g>
</svg>

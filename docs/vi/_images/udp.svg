<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
  <title>UDP datagrams travel independently; loss is silent</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Sender on left (taller, so the 3 lines have vertical room) -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="30" y="70" width="120" height="120"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="90" y="135">sender</text>
  </g>

  <!-- Receiver on right -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="570" y="70" width="120" height="120"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="630" y="135">receiver</text>
  </g>

  <!-- Three datagrams, lines spaced 40 px apart with 10 px gaps for labels -->

  <!-- datagram 1 - arrives (top line, y=95) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="150" y1="95" x2="564" y2="95"/>
    <polygon points="564,91 564,99 570,95" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="360" y="88">datagram 1</text>
  </g>

  <!-- datagram 2 - lost (middle line, dashed, X mid-flight, y=135) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="5,4">
    <line x1="150" y1="135" x2="350" y2="135"/>
  </g>
  <g fill="none" stroke="currentColor" stroke-width="2">
    <line x1="350" y1="125" x2="370" y2="145"/>
    <line x1="370" y1="125" x2="350" y2="145"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="250" y="128">datagram 2</text>
    <text x="360" y="160" opacity="0.6">(lost)</text>
  </g>

  <!-- datagram 3 - arrives (bottom line, y=175) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5">
    <line x1="150" y1="175" x2="564" y2="175"/>
    <polygon points="564,171 564,179 570,175" fill="currentColor"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="480" y="168">datagram 3</text>
  </g>

  <!-- Footer note, comfortably below the boxes -->
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="360" y="225">no handshake, no retry, no notification</text>
    <text x="360" y="241">sender keeps going regardless</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 50 560 220"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Field of view from sensor width and focal length</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Optical axis -->
  <g stroke="currentColor" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.4">
    <line x1="40" y1="160" x2="520" y2="160"/>
  </g>

  <!-- Lens (vertical oval) at x=300 -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <ellipse cx="300" cy="160" rx="10" ry="55"/>
  </g>

  <!-- Sensor at x=380, width S = 60 px (y=130..y=190) -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <line x1="380" y1="130" x2="380" y2="190"/>
    <line x1="375" y1="130" x2="385" y2="130"/>
    <line x1="375" y1="190" x2="385" y2="190"/>
  </g>

  <!-- Rays from sensor edges through lens centre into the scene -->
  <g stroke="currentColor" stroke-width="1.2" opacity="0.85">
    <!-- Top sensor edge (380,130) through (300,160) extended to (40, 257.5) -->
    <line x1="380" y1="130" x2="40" y2="257.5"/>
    <!-- Bottom sensor edge (380,190) through (300,160) extended to (40, 62.5) -->
    <line x1="380" y1="190" x2="40" y2="62.5"/>
  </g>

  <!-- S bracket beside the sensor -->
  <g stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.7">
    <line x1="395" y1="130" x2="405" y2="130"/>
    <line x1="395" y1="190" x2="405" y2="190"/>
    <line x1="400" y1="130" x2="400" y2="190"/>
  </g>
  <text x="415" y="164" fill="currentColor">S</text>

  <!-- f bracket between lens centre and sensor -->
  <g stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.7">
    <line x1="300" y1="232" x2="300" y2="242"/>
    <line x1="380" y1="232" x2="380" y2="242"/>
    <line x1="300" y1="237" x2="380" y2="237"/>
  </g>
  <text x="340" y="257" fill="currentColor" text-anchor="middle">f</text>

  <!-- FOV arc at the lens centre (drawn on the scene side) -->
  <g stroke="currentColor" stroke-width="1.2" fill="none">
    <path d="M 260 142.5 A 40 40 0 0 0 260 177.5"/>
  </g>
  <text x="220" y="164" fill="currentColor" text-anchor="middle">FOV</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Three columns comparing the engine and silicon stack for each cam family. Left column: H7 and RT1062 run TFLM dispatching CMSIS-NN kernels on a Cortex-M7. Middle column: AE3 runs TFLM dispatching CMSIS-NN and the Ethos-U operator on a Cortex-M55 with an Ethos-U55 NPU. Right column: N6 runs STAI on a Neural-ART NPU.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="currentColor" font-size="12" text-anchor="middle">
    <text x="140" y="25">H7 / RT1062</text>
    <text x="380" y="25">AE3</text>
    <text x="620" y="25">N6</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="30" y="50" width="220" height="70" rx="3"/>
    <rect x="270" y="50" width="220" height="70" rx="3"/>
    <rect x="510" y="50" width="220" height="70" rx="3"/>
  </g>

  <g fill="currentColor" text-anchor="middle">
    <text x="140" y="80" font-size="14">TFLM</text>
    <text x="140" y="102" font-size="11" opacity="0.7">CMSIS-NN kernels</text>

    <text x="380" y="80" font-size="14">TFLM</text>
    <text x="380" y="102" font-size="11" opacity="0.7">CMSIS-NN + Ethos-U op</text>

    <text x="620" y="80" font-size="14">STAI</text>
    <text x="620" y="102" font-size="11" opacity="0.7">Neural-ART runtime</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <line x1="140" y1="120" x2="140" y2="170"/>
    <polygon points="135,165 140,175 145,165" fill="currentColor" stroke="none"/>

    <line x1="380" y1="120" x2="380" y2="170"/>
    <polygon points="375,165 380,175 385,165" fill="currentColor" stroke="none"/>

    <line x1="620" y1="120" x2="620" y2="170"/>
    <polygon points="615,165 620,175 625,165" fill="currentColor" stroke="none"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1.4">
    <rect x="30" y="180" width="220" height="60" rx="3"/>
    <rect x="270" y="180" width="220" height="60" rx="3"/>
    <rect x="510" y="180" width="220" height="60" rx="3"/>
  </g>

  <g fill="currentColor" text-anchor="middle">
    <text x="140" y="215" font-size="13">Cortex-M7</text>
    <text x="380" y="215" font-size="13">Cortex-M55 + Ethos-U55</text>
    <text x="620" y="215" font-size="13">Neural-ART NPU</text>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.55">
    <text x="380" y="265">Each cam wires its own engine and kernels to its own silicon.</text>
  </g>
</svg>

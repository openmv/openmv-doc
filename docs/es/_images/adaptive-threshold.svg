<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Three image panels in a row. The input on the left shows a brightness gradient from light to dark with dark foreground marks scattered across at uniform brightness. The middle panel shows a global threshold result: the foreground is correctly classified on the bright side but the entire dark side reads as foreground because page and foreground both fall below the cutoff. The right panel shows an adaptive threshold result: the foreground is correctly classified across the whole frame.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#303030"/>
    </linearGradient>
  </defs>

  <g fill="currentColor" font-size="12" text-anchor="middle" opacity="0.85">
    <text x="130" y="60">input</text>
    <text x="380" y="60">global threshold</text>
    <text x="630" y="60">adaptive threshold</text>
  </g>

  <rect x="20" y="75" width="220" height="160" fill="url(#page)" stroke="currentColor" stroke-width="1.2"/>
  <g fill="#101010">
    <rect x="40" y="105" width="40" height="10"/>
    <rect x="90" y="140" width="55" height="10"/>
    <rect x="155" y="105" width="30" height="10"/>
    <rect x="190" y="180" width="40" height="10"/>
    <rect x="60" y="195" width="50" height="10"/>
    <rect x="155" y="175" width="30" height="10"/>
    <rect x="35" y="155" width="35" height="10"/>
    <rect x="120" y="115" width="20" height="10"/>
  </g>

  <rect x="270" y="75" width="220" height="160" fill="#101010" stroke="currentColor" stroke-width="1.2"/>
  <rect x="380" y="75" width="110" height="160" fill="#f5f5f5"/>
  <g fill="#f5f5f5">
    <rect x="290" y="105" width="40" height="10"/>
    <rect x="340" y="140" width="40" height="10"/>
    <rect x="290" y="155" width="35" height="10"/>
    <rect x="310" y="195" width="50" height="10"/>
    <rect x="370" y="115" width="10" height="10"/>
  </g>
  <g fill="#101010">
    <rect x="380" y="140" width="15" height="10"/>
    <rect x="405" y="105" width="30" height="10"/>
    <rect x="440" y="180" width="40" height="10"/>
    <rect x="405" y="175" width="30" height="10"/>
  </g>

  <rect x="520" y="75" width="220" height="160" fill="#101010" stroke="currentColor" stroke-width="1.2"/>
  <g fill="#f5f5f5">
    <rect x="540" y="105" width="40" height="10"/>
    <rect x="590" y="140" width="55" height="10"/>
    <rect x="655" y="105" width="30" height="10"/>
    <rect x="690" y="180" width="40" height="10"/>
    <rect x="560" y="195" width="50" height="10"/>
    <rect x="655" y="175" width="30" height="10"/>
    <rect x="535" y="155" width="35" height="10"/>
    <rect x="620" y="115" width="20" height="10"/>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="130" y="260">uneven illumination,</text>
    <text x="130" y="276">uniform foreground</text>
    <text x="380" y="260">misses foreground on</text>
    <text x="380" y="276">the dark side</text>
    <text x="630" y="260">cutoff follows local</text>
    <text x="630" y="276">brightness everywhere</text>
  </g>
</svg>

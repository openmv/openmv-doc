<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Bit-stream pulse encoding: a 0 bit and a 1 bit each as a high pulse followed by a low pulse</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Row 1: 0 bit -->
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="100" y="74">0 bit</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="110,80 150,80 150,120 360,120 360,80"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1" opacity="0.7">
    <line x1="110" y1="140" x2="150" y2="140"/>
    <line x1="110" y1="136" x2="110" y2="144"/>
    <line x1="150" y1="136" x2="150" y2="144"/>
    <line x1="150" y1="140" x2="360" y2="140"/>
    <line x1="360" y1="136" x2="360" y2="144"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="middle">
    <text x="130" y="158">high_0</text>
    <text x="255" y="158">low_0</text>
  </g>

  <!-- Row 2: 1 bit -->
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="100" y="194">1 bit</text>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="110,200 260,200 260,240 360,240 360,200"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1" opacity="0.7">
    <line x1="110" y1="260" x2="260" y2="260"/>
    <line x1="110" y1="256" x2="110" y2="264"/>
    <line x1="260" y1="256" x2="260" y2="264"/>
    <line x1="260" y1="260" x2="360" y2="260"/>
    <line x1="360" y1="256" x2="360" y2="264"/>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="middle">
    <text x="185" y="278">high_1</text>
    <text x="310" y="278">low_1</text>
  </g>

  <!-- Annotation: ws2812 example timings on the right -->
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="400" y="98">WS2812 example:</text>
    <text x="400" y="118">(400, 850, 800, 450)</text>
    <text x="400" y="138">ns each phase</text>
  </g>
</svg>

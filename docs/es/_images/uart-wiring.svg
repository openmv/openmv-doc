<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 320"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>UART wiring between two boards: TX cross-wired to RX, shared ground</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Board A on the left -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="40" y="60" width="140" height="180"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="110" y="90">Board A</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="175" y="134">TX</text>
    <text x="175" y="174">RX</text>
    <text x="175" y="214">GND</text>
  </g>

  <!-- Board B on the right -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="360" y="60" width="140" height="180"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="430" y="90">Board B</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.85">
    <text x="365" y="134">RX</text>
    <text x="365" y="174">TX</text>
    <text x="365" y="214">GND</text>
  </g>

  <!-- TX (A) -> RX (B): A_TX at y=130 to B_RX at y=130 -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="130" x2="360" y2="130"/>
  </g>

  <!-- TX (B) -> RX (A): B_TX at y=170 to A_RX at y=170 -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="170" x2="360" y2="170"/>
  </g>

  <!-- GND tied -->
  <g stroke="currentColor" fill="none" stroke-width="1.8">
    <line x1="180" y1="210" x2="360" y2="210"/>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 30 560 220"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>Bayer colour filter array</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- 6x4 grid of Bayer cells, each 40x40 px, at x=160..400, y=60..220.
       Row 0 (y=60-100): R G R G R G
       Row 1 (y=100-140): G B G B G B
       Row 2 (y=140-180): R G R G R G
       Row 3 (y=180-220): G B G B G B  -->

  <!-- Row 0 (R G R G R G) -->
  <rect x="160" y="60" width="40" height="40" fill="#c33"/>
  <rect x="200" y="60" width="40" height="40" fill="#5a5"/>
  <rect x="240" y="60" width="40" height="40" fill="#c33"/>
  <rect x="280" y="60" width="40" height="40" fill="#5a5"/>
  <rect x="320" y="60" width="40" height="40" fill="#c33"/>
  <rect x="360" y="60" width="40" height="40" fill="#5a5"/>

  <!-- Row 1 (G B G B G B) -->
  <rect x="160" y="100" width="40" height="40" fill="#5a5"/>
  <rect x="200" y="100" width="40" height="40" fill="#36c"/>
  <rect x="240" y="100" width="40" height="40" fill="#5a5"/>
  <rect x="280" y="100" width="40" height="40" fill="#36c"/>
  <rect x="320" y="100" width="40" height="40" fill="#5a5"/>
  <rect x="360" y="100" width="40" height="40" fill="#36c"/>

  <!-- Row 2 (R G R G R G) -->
  <rect x="160" y="140" width="40" height="40" fill="#c33"/>
  <rect x="200" y="140" width="40" height="40" fill="#5a5"/>
  <rect x="240" y="140" width="40" height="40" fill="#c33"/>
  <rect x="280" y="140" width="40" height="40" fill="#5a5"/>
  <rect x="320" y="140" width="40" height="40" fill="#c33"/>
  <rect x="360" y="140" width="40" height="40" fill="#5a5"/>

  <!-- Row 3 (G B G B G B) -->
  <rect x="160" y="180" width="40" height="40" fill="#5a5"/>
  <rect x="200" y="180" width="40" height="40" fill="#36c"/>
  <rect x="240" y="180" width="40" height="40" fill="#5a5"/>
  <rect x="280" y="180" width="40" height="40" fill="#36c"/>
  <rect x="320" y="180" width="40" height="40" fill="#5a5"/>
  <rect x="360" y="180" width="40" height="40" fill="#36c"/>

  <!-- Grid lines -->
  <g stroke="currentColor" stroke-width="1" fill="none" opacity="0.45">
    <line x1="160" y1="60" x2="400" y2="60"/>
    <line x1="160" y1="100" x2="400" y2="100"/>
    <line x1="160" y1="140" x2="400" y2="140"/>
    <line x1="160" y1="180" x2="400" y2="180"/>
    <line x1="160" y1="220" x2="400" y2="220"/>
    <line x1="160" y1="60" x2="160" y2="220"/>
    <line x1="200" y1="60" x2="200" y2="220"/>
    <line x1="240" y1="60" x2="240" y2="220"/>
    <line x1="280" y1="60" x2="280" y2="220"/>
    <line x1="320" y1="60" x2="320" y2="220"/>
    <line x1="360" y1="60" x2="360" y2="220"/>
    <line x1="400" y1="60" x2="400" y2="220"/>
  </g>

  <!-- Letter labels in white inside each cell -->
  <g fill="white" font-weight="bold" text-anchor="middle">
    <text x="180" y="88">R</text>
    <text x="220" y="88">G</text>
    <text x="260" y="88">R</text>
    <text x="300" y="88">G</text>
    <text x="340" y="88">R</text>
    <text x="380" y="88">G</text>
    <text x="180" y="128">G</text>
    <text x="220" y="128">B</text>
    <text x="260" y="128">G</text>
    <text x="300" y="128">B</text>
    <text x="340" y="128">G</text>
    <text x="380" y="128">B</text>
    <text x="180" y="168">R</text>
    <text x="220" y="168">G</text>
    <text x="260" y="168">R</text>
    <text x="300" y="168">G</text>
    <text x="340" y="168">R</text>
    <text x="380" y="168">G</text>
    <text x="180" y="208">G</text>
    <text x="220" y="208">B</text>
    <text x="260" y="208">G</text>
    <text x="300" y="208">B</text>
    <text x="340" y="208">G</text>
    <text x="380" y="208">B</text>
  </g>

  <!-- 2x2 repeating-tile highlight on the top-left -->
  <rect x="160" y="60" width="80" height="80"
        fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-dasharray="6 4"/>
  <text x="200" y="50" fill="currentColor" text-anchor="middle" font-size="11">smallest repeating tile</text>
</svg>

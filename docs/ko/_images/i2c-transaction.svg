<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>I2C transaction: start, one byte (address + R/W), ACK, stop</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Signal labels -->
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="70" y="84">SCL</text>
    <text x="70" y="164">SDA</text>
  </g>

  <!-- Region-boundary dashed guides:
       x=140 (SCL falls, end of START) / x=540 (start of ACK) / x=590 (end of ACK) -->
  <g stroke="currentColor" fill="none" stroke-width="1" opacity="0.35" stroke-dasharray="3 3">
    <line x1="140" y1="40" x2="140" y2="200"/>
    <line x1="540" y1="40" x2="540" y2="200"/>
    <line x1="590" y1="40" x2="590" y2="200"/>
  </g>

  <!-- SCL trace: idle high, 9 clock pulses (one per bit, including ACK), idle high again.
       Each pulse is 50 px: 25 px low then 25 px high. Sampling rising edges at
       165, 215, 265, 315, 365, 415, 465, 515, 565. -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,60 140,60 140,100 165,100 165,60 190,60 190,100 215,100 215,60 240,60 240,100 265,100 265,60 290,60 290,100 315,100 315,60 340,60 340,100 365,100 365,60 390,60 390,100 415,100 415,60 440,60 440,100 465,100 465,60 490,60 490,100 515,100 515,60 540,60 540,100 565,100 565,60 590,60 720,60"/>
  </g>

  <!-- SDA trace: idle high. START (SDA falls while SCL high) at x=120. Bits sent
       during each SCL low phase, stable during SCL high. Bits shown here:
       1,1,0,1,0,0,0,0 (address 0x68 with R/W=0) then 0 (ACK from peripheral).
       STOP (SDA rises while SCL high) at x=620. -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,140 128,140 128,180 152,180 152,140 252,140 252,180 302,180 302,140 352,140 352,180 620,180 620,140 720,140"/>
  </g>

  <!-- Annotations -->
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="middle">
    <text x="128" y="30">START</text>
    <text x="620" y="30">STOP</text>
  </g>

  <!-- Region labels under the SDA trace -->
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="middle">
    <text x="340" y="216">7-bit address + R/W (8 bits)</text>
    <text x="565" y="216">ACK</text>
  </g>

  <!-- Closing caption -->
  <g fill="currentColor" font-size="11" opacity="0.7" text-anchor="middle">
    <text x="380" y="248">multi-byte transactions repeat the 8-data-bits + 1-ACK pattern before STOP</text>
  </g>
</svg>

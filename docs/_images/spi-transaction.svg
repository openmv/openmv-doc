<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>SPI transaction: CS asserts, SCK clocks eight bits, MOSI and MISO carry one byte each</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- Signal labels on the left -->
  <g fill="currentColor" font-size="11" opacity="0.85" text-anchor="end">
    <text x="70" y="64">CS</text>
    <text x="70" y="144">SCK</text>
    <text x="70" y="224">MOSI</text>
    <text x="70" y="304">MISO</text>
  </g>

  <!-- CS trace: high idle, goes low at x=110 (start), high again at x=600 (end) -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,40 110,40 110,80 600,80 600,40 640,40"/>
  </g>

  <!-- SCK trace: 8 clock pulses between x=140 and x=580 (440 px = 8 cycles, 55 px per cycle).
       Each cycle: high half then low half. Polarity 0 = idle low. -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,160 140,160 140,120 167,120 167,160 195,160 195,120 222,120 222,160 250,160 250,120 277,120 277,160 305,160 305,120 332,120 332,160 360,160 360,120 387,120 387,160 415,160 415,120 442,120 442,160 470,160 470,120 497,120 497,160 525,160 525,120 552,120 552,160 580,160 640,160"/>
  </g>

  <!-- MOSI trace: bits 1,0,1,1,0,0,1,0. Data transitions on the SCK
       falling edge (or just after CS asserts for the first bit) so the
       bit is stable across the next SCK rising edge where it is sampled. -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,240 113,240 113,200 167,200 167,240 222,240 222,200 332,200 332,240 442,240 442,200 497,200 497,240 640,240"/>
  </g>

  <!-- MISO trace: bits 0,1,1,0,1,0,0,1. Same shifted timing as MOSI. -->
  <g stroke="currentColor" fill="none" stroke-width="2">
    <polyline points="80,320 167,320 167,280 277,280 277,320 332,320 332,280 387,280 387,320 497,320 497,280 640,280"/>
  </g>

  <!-- Bit markers / faint vertical guides at each SCK rising edge -->
  <g stroke="currentColor" fill="none" stroke-width="1" opacity="0.3" stroke-dasharray="3 3">
    <line x1="140" y1="100" x2="140" y2="340"/>
    <line x1="195" y1="100" x2="195" y2="340"/>
    <line x1="250" y1="100" x2="250" y2="340"/>
    <line x1="305" y1="100" x2="305" y2="340"/>
    <line x1="360" y1="100" x2="360" y2="340"/>
    <line x1="415" y1="100" x2="415" y2="340"/>
    <line x1="470" y1="100" x2="470" y2="340"/>
    <line x1="525" y1="100" x2="525" y2="340"/>
  </g>

  <!-- Annotations -->
  <g fill="currentColor" font-size="11" opacity="0.75" text-anchor="middle">
    <text x="100" y="30">idle</text>
    <text x="360" y="30">CS asserted (one byte)</text>
    <text x="620" y="30">idle</text>
    <text x="620" y="346">MSB first</text>
  </g>
</svg>

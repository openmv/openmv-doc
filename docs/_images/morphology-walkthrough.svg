<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Five panels in a row showing a noisy binary input region, and the result of applying dilate, erode, open, and close to it. Dilate grows the region and fills holes; erode shrinks the region and removes noise; open removes noise without significantly changing the region; close fills holes without significantly changing the region's outline.</title>

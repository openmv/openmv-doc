  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.65">
    <text x="70" y="190">noise + hole</text>
    <text x="220" y="190">bigger,</text>
    <text x="220" y="206">no hole</text>
    <text x="370" y="190">smaller,</text>
    <text x="370" y="206">no noise</text>
    <text x="520" y="190">noise gone,</text>
    <text x="520" y="206">hole preserved</text>
    <text x="670" y="190">noise preserved,</text>
    <text x="670" y="206">hole filled</text>

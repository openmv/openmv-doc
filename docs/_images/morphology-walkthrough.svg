<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Five panels in a row showing a noisy binary input region, and the result of applying dilate, erode, open, and close to it. The input is a solid square region with a one-pixel hole and three isolated noise pixels. Dilate grows the region, fills the hole, and grows the noise; erode shrinks the region, grows the hole, and removes the noise; open removes the noise while reproducing the region and its hole exactly; close fills the hole while reproducing the region outline and the noise pixels exactly.</title>

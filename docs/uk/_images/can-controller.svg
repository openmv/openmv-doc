<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>CAN controller block diagram: TX mailboxes and priority arbitration on the transmit side, acceptance filter and RX FIFO on the receive side</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <defs>
    <marker id="arrCan" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- ===== TX path (top half) ===== -->

  <!-- can.send() label -->
  <g fill="currentColor">
    <text x="40" y="120">can.send()</text>
  </g>

  <!-- Arrow from can.send() to TX mailbox column -->
  <g stroke="currentColor" fill="none" stroke-width="1.8" marker-end="url(#arrCan)">
    <line x1="135" y1="116" x2="178" y2="116"/>
  </g>

  <!-- TX mailbox 0 -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="180" y="60" width="140" height="32"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="250" y="80">TX mailbox 0</text>
  </g>

  <!-- TX mailbox 1 -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="180" y="100" width="140" height="32"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="250" y="120">TX mailbox 1</text>
  </g>

  <!-- TX mailbox 2 -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="180" y="140" width="140" height="32"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="250" y="160">TX mailbox 2</text>
  </g>

  <!-- Fan-in arrows from each mailbox to arbiter -->
  <g stroke="currentColor" fill="none" stroke-width="1.8" marker-end="url(#arrCan)">
    <line x1="320" y1="76"  x2="398" y2="116"/>
    <line x1="320" y1="116" x2="398" y2="116"/>
    <line x1="320" y1="156" x2="398" y2="116"/>
  </g>

  <!-- Priority arbiter -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="400" y="96" width="120" height="40"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="460" y="121">arbitrate</text>
  </g>

  <!-- Arrow from arbiter to bus -->
  <g stroke="currentColor" fill="none" stroke-width="1.8" marker-end="url(#arrCan)">
    <line x1="520" y1="116" x2="600" y2="116"/>
  </g>

  <!-- ===== Bus column (right side) ===== -->

  <g stroke="currentColor" fill="none" stroke-width="2">
    <line x1="600" y1="80" x2="600" y2="300"/>
  </g>
  <g fill="currentColor">
    <text x="610" y="84">CAN bus</text>
  </g>

  <!-- ===== RX path (bottom half) ===== -->

  <!-- Arrow from bus to filter -->
  <g stroke="currentColor" fill="none" stroke-width="1.8" marker-end="url(#arrCan)">
    <line x1="600" y1="260" x2="522" y2="260"/>
  </g>

  <!-- Acceptance filter -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="400" y="240" width="120" height="40"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="460" y="265">filter</text>
  </g>

  <!-- Arrow from filter to FIFO -->
  <g stroke="currentColor" fill="none" stroke-width="1.8" marker-end="url(#arrCan)">
    <line x1="400" y1="260" x2="382" y2="260"/>
  </g>

  <!-- RX FIFO box with 4 slot dividers -->
  <g fill="none" stroke="currentColor" stroke-width="1.8">
    <rect x="180" y="240" width="200" height="40"/>
  </g>
  <g stroke="currentColor" fill="none" stroke-width="1">
    <line x1="230" y1="240" x2="230" y2="280"/>
    <line x1="280" y1="240" x2="280" y2="280"/>
    <line x1="330" y1="240" x2="330" y2="280"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="280" y="230">RX FIFO</text>
  </g>
  <g fill="currentColor" font-size="11" opacity="0.75">
    <text x="180" y="302">oldest</text>
    <text x="380" y="302" text-anchor="end">newest</text>
  </g>

  <!-- Arrow from FIFO to can.recv() -->
  <g stroke="currentColor" fill="none" stroke-width="1.8" marker-end="url(#arrCan)">
    <line x1="180" y1="260" x2="135" y2="260"/>
  </g>

  <!-- can.recv() label -->
  <g fill="currentColor" text-anchor="end">
    <text x="130" y="264">can.recv()</text>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>The YOLOv8 output tensor laid out as a grid. Rows are channels, labelled top to bottom: cx, cy, w, h, score 0, vertical ellipsis, score N minus 1. Columns are anchor predictions, labelled anchor 0 through anchor A minus 1. One column is outlined more thickly to emphasise that one anchor's prediction is a single column down the channels: four box numbers and N class scores.</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.7">
    <text x="125" y="45">anchor 0</text>
    <text x="175" y="45">1</text>
    <text x="225" y="45">2</text>
    <text x="275" y="45">3</text>
    <text x="325" y="45">⋯</text>
    <text x="375" y="45">k</text>
    <text x="425" y="45">⋯</text>
    <text x="475" y="45">A-3</text>
    <text x="525" y="45">A-2</text>
    <text x="575" y="45">A-1</text>
  </g>

  <g fill="currentColor" font-size="12" text-anchor="end">
    <text x="90" y="75">cx</text>
    <text x="90" y="105">cy</text>
    <text x="90" y="135">w</text>
    <text x="90" y="165">h</text>
    <text x="90" y="195">score_0</text>
    <text x="90" y="221">⋮</text>
    <text x="90" y="247">score_(N-1)</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.5">
    <line x1="100" y1="55" x2="600" y2="55"/>
    <line x1="100" y1="85" x2="600" y2="85"/>
    <line x1="100" y1="115" x2="600" y2="115"/>
    <line x1="100" y1="145" x2="600" y2="145"/>
    <line x1="100" y1="175" x2="600" y2="175"/>
    <line x1="100" y1="205" x2="600" y2="205"/>
    <line x1="100" y1="235" x2="600" y2="235"/>
    <line x1="100" y1="260" x2="600" y2="260"/>

    <line x1="100" y1="55" x2="100" y2="260"/>
    <line x1="150" y1="55" x2="150" y2="260"/>
    <line x1="200" y1="55" x2="200" y2="260"/>
    <line x1="250" y1="55" x2="250" y2="260"/>
    <line x1="300" y1="55" x2="300" y2="260"/>
    <line x1="350" y1="55" x2="350" y2="260"/>
    <line x1="400" y1="55" x2="400" y2="260"/>
    <line x1="450" y1="55" x2="450" y2="260"/>
    <line x1="500" y1="55" x2="500" y2="260"/>
    <line x1="550" y1="55" x2="550" y2="260"/>
    <line x1="600" y1="55" x2="600" y2="260"/>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="2.2">
    <rect x="350" y="55" width="50" height="205"/>
  </g>

  <g fill="currentColor" font-size="11" text-anchor="middle" opacity="0.55">
    <text x="375" y="278">one anchor's prediction</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.5">
    <line x1="610" y1="55"  x2="625" y2="55"/>
    <line x1="610" y1="145" x2="625" y2="145"/>
    <line x1="625" y1="55"  x2="625" y2="145"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="start" opacity="0.6">
    <text x="635" y="105">4 box channels</text>
  </g>

  <g fill="none" stroke="currentColor" stroke-width="1" opacity="0.5">
    <line x1="610" y1="145" x2="625" y2="145"/>
    <line x1="610" y1="260" x2="625" y2="260"/>
    <line x1="625" y1="145" x2="625" y2="260"/>
  </g>
  <g fill="currentColor" font-size="11" text-anchor="start" opacity="0.6">
    <text x="635" y="205">N class scores</text>
  </g>
</svg>

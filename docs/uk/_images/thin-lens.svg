<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <title>Thin-lens model</title>
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) { svg { color: #eee; } }
  </style>

  <!-- =========================== TOP DIAGRAM ==========================
       Parallel rays from the left refract at the lens and converge to
       the focal point at distance f behind the lens.
       Lens at x=280, focal point at (380, 100). f = 100.           -->

  <!-- Top optical axis -->
  <g stroke="currentColor" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.4">
    <line x1="40" y1="100" x2="510" y2="100"/>
  </g>

  <!-- Lens (vertical thin oval) -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <ellipse cx="280" cy="100" rx="10" ry="55"/>
  </g>

  <!-- Three incoming parallel rays + their refracted continuations.
       Refracted segments end exactly at the focal point (380, 100). -->
  <g stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.8">
    <line x1="60" y1="65"  x2="280" y2="65"/>
    <line x1="280" y1="65" x2="380" y2="100"/>
    <line x1="60" y1="100" x2="280" y2="100"/>
    <line x1="280" y1="100" x2="380" y2="100"/>
    <line x1="60" y1="135" x2="280" y2="135"/>
    <line x1="280" y1="135" x2="380" y2="100"/>
  </g>

  <!-- Focal point dot with label placed BELOW the axis to avoid the
       dashed optical-axis line. -->
  <circle cx="380" cy="100" r="3" fill="currentColor"/>
  <text x="380" y="172" fill="currentColor" text-anchor="middle">F'</text>

  <!-- f bracket below the top diagram. Drawn at y=185 so it sits below
       the F' label at y=172 with comfortable clearance. -->
  <g stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.7">
    <line x1="280" y1="185" x2="280" y2="195"/>
    <line x1="380" y1="185" x2="380" y2="195"/>
    <line x1="280" y1="190" x2="380" y2="190"/>
  </g>
  <text x="330" y="210" fill="currentColor" text-anchor="middle">f</text>

  <!-- =========================== BOTTOM DIAGRAM ======================
       Thin-lens construction. Lens at x=280, f=100, so near focal
       point F at (180, 290), far focal point F' at (380, 290).
       Object at x=80 (u = 200), tip at y=260 (height 30 above axis).
       Image at x=480 (v = 200), tip at y=320 (height 30 below axis).
       Both construction rays from object tip arrive at image tip.  -->

  <!-- Bottom optical axis -->
  <g stroke="currentColor" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.4">
    <line x1="40" y1="290" x2="510" y2="290"/>
  </g>

  <!-- Lens -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <ellipse cx="280" cy="290" rx="10" ry="55"/>
  </g>

  <!-- Focal points marked on the optical axis. F is labelled BELOW
       the axis so it clears the centre-through dashed ray that crosses
       above the axis at x=180; F' is labelled ABOVE the axis so it
       clears the parallel-then-through-F' construction ray that
       descends to the axis at x=380. -->
  <circle cx="180" cy="290" r="3" fill="currentColor"/>
  <text x="180" y="308" fill="currentColor" text-anchor="middle" font-size="11">F</text>
  <circle cx="380" cy="290" r="3" fill="currentColor"/>
  <text x="380" y="272" fill="currentColor" text-anchor="middle" font-size="11">F'</text>

  <!-- Object arrow (up) at x=80, tip at (80, 260) -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <line x1="80" y1="290" x2="80" y2="260"/>
    <polygon points="80,253 75,266 85,266" fill="currentColor" stroke="none"/>
  </g>

  <!-- Image arrow (down) at x=480, tip at (480, 320) -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <line x1="480" y1="290" x2="480" y2="320"/>
    <polygon points="480,325 475,313 485,313" fill="currentColor" stroke="none"/>
  </g>

  <!-- Construction ray 1 (parallel, then through F'):
       (80, 260) -> (280, 260) -> (380, 290) -> (480, 320)         -->
  <g stroke="currentColor" stroke-width="1.2" opacity="0.85">
    <line x1="80" y1="260" x2="280" y2="260"/>
    <line x1="280" y1="260" x2="480" y2="320"/>
  </g>

  <!-- Construction ray 2 (straight through lens centre):
       (80, 260) -> (280, 290) -> (480, 320). Drawn as one line.  -->
  <g stroke="currentColor" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.75">
    <line x1="80" y1="260" x2="480" y2="320"/>
  </g>

  <!-- u and v brackets below the bottom diagram. Placed at y=360 so
       they sit below the lens (which ends at y=345) and below the
       image arrow tip area. -->
  <g stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.7">
    <line x1="80"  y1="362" x2="80"  y2="372"/>
    <line x1="280" y1="362" x2="280" y2="372"/>
    <line x1="80"  y1="367" x2="280" y2="367"/>
    <line x1="280" y1="362" x2="280" y2="372"/>
    <line x1="480" y1="362" x2="480" y2="372"/>
    <line x1="280" y1="367" x2="480" y2="367"/>
  </g>
  <g fill="currentColor" text-anchor="middle">
    <text x="180" y="388">u</text>
    <text x="380" y="388">v</text>
  </g>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OpenMV Documentation</title>
<!--
  GitHub Pages serves this file for any path it can't find. It routes:
    * /latest/<page>       -> /<newest-release>/<page>   (the "latest" alias)
    * /<alias>/<page>      -> /<snapshot>/<page>         (a firmware release that
                                                          reuses another's docs)
    * an OLD flat URL       -> /<newest-release>/<page>   (pre-versioning links)
    * a missing page under the newest release -> the same page on /dev/ when it
      exists there (a /latest/ link can point at a page newer than the release
      snapshot), else that channel's home
    * a missing page under any other channel -> that channel's home
  Everything is read from /versions.json so this file never needs regenerating.
  Redirect hops stay bounded: the dev fallback is probed with a HEAD request
  rather than blindly redirected, and everything else lands on a channel home,
  which always exists.
-->
<script>
(function () {
  var path = location.pathname;
  function go(t) { location.replace(t + location.search + location.hash); }

  fetch("/versions.json", { cache: "no-cache" })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (d) {
      var latest = (d && d.latest) ? d.latest : "dev";
      var versions = (d && d.versions) ? d.versions : [];
      var aliasMap = {};   // alias id -> snapshot folder
      var folders = [];    // real folders (versions without a snapshot)
      versions.forEach(function (v) {
        if (v.snapshot) aliasMap[v.id] = v.snapshot;
        else folders.push(v.id);
      });
      if (folders.indexOf("dev") === -1) folders.push("dev");

      var seg = path.split("/");           // ["", "<first>", ...rest]
      var first = seg[1] || "";

      if (first === "latest") {            // /latest/<rest> -> /<latest>/<rest>
        seg[1] = latest;
        go(seg.join("/"));
      } else if (aliasMap[first]) {        // /<alias>/<rest> -> /<snapshot>/<rest>
        seg[1] = aliasMap[first];
        go(seg.join("/"));
      } else if (folders.indexOf(first) !== -1) {
        // A real version channel but the page is missing. For the newest
        // release the page may simply be newer than the snapshot -- probe the
        // same path on dev and go there when it exists; otherwise (and for
        // every other channel) fall back to the channel home.
        if (first === latest && first !== "dev") {
          var devPath = "/dev" + path.slice(first.length + 1);
          fetch(devPath, { method: "HEAD", cache: "no-cache" })
            .then(function (r) { go(r.ok ? devPath : "/" + first + "/"); })
            .catch(function () { go("/" + first + "/"); });
        } else {
          go("/" + first + "/");
        }
      } else {
        // an old flat URL (no version prefix) -> the newest release
        go("/" + latest + path);
      }
    })
    .catch(function () { go("/dev/"); });
})();
</script>
</head>
<body>Redirecting…</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OpenMV Documentation</title>
<!--
  GitHub Pages serves this file for any path it can't find. It routes:
    * /latest/<page>      -> /<newest-release>/<page>   (the "latest" alias)
    * an OLD flat URL      -> /<newest-release>/<page>   (pre-versioning links)
    * a missing page under a real channel -> that channel's home
  The newest release is read from /versions.json so this file never needs
  regenerating. Bounded to at most two hops (an old/flat redirect that still
  misses lands on the channel home, which always exists).
-->
<script>
(function () {
  var path = location.pathname;
  function go(t) { location.replace(t + location.search + location.hash); }

  fetch("/versions.json", { cache: "no-cache" })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (d) {
      var latest = (d && d.latest) ? d.latest : "dev";
      var channels = (d && d.versions ? d.versions.map(function (v) { return v.id; }) : ["dev"]);
      var seg = path.split("/");           // ["", "<first>", ...rest]
      var first = seg[1] || "";

      if (first === "latest") {            // /latest/<rest> -> /<latest>/<rest>
        seg[1] = latest;
        go(seg.join("/"));
      } else if (channels.indexOf(first) !== -1) {
        // a real version channel but the page is missing -> channel home
        go("/" + first + "/");
      } else {
        // an old flat URL (no version prefix) -> the newest release
        go("/" + latest + path);
      }
    })
    .catch(function () { go("/dev/"); });
})();
</script>
</head>
<body>Redirecting…</body>
</html>
